async function chatSend(text) {
  const inp = document.getElementById('chat-input');
  const q = (text || (inp && inp.value) || '').trim();
  if (!q || chatState.loading) return;
  if (inp) inp.value = '';
  if (text) voiceMode = false; /* suggestion-click send (has text arg) resets voice mode */

  chatState.msgs.push({ role: 'user', content: q });
  chatState.loading = true;
  renderChat();

  try {
    const apiKey = getChatApiKey();
    if (!apiKey) {
      chatState.msgs.pop();
      chatState.loading = false;
      renderChat();
      return;
    }

    // Build request body
    let body;
    try {
      body = JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4096,
        system: getChatSystem(),
        messages: chatState.msgs.map(m => ({ role: m.role, content: m.content })),
      });
    } catch(jsonErr) {
      throw new Error('Failed to build request: ' + jsonErr.message);
    }

    // Use XMLHttpRequest for better cross-origin compatibility on Android Chrome
    const data = await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://api.anthropic.com/v1/messages', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('x-api-key', apiKey);
      xhr.setRequestHeader('anthropic-version', '2023-06-01');
      xhr.setRequestHeader('anthropic-dangerous-direct-browser-access', 'true');
      xhr.timeout = 60000; // 60 second timeout
      xhr.onload = () => {
        if (xhr.status === 401) { reject(new Error('Invalid API key (401). Tap ⚙️ to re-enter your key.')); return; }
        if (xhr.status === 429) { reject(new Error('Rate limit reached. Wait a moment and try again.')); return; }
        if (xhr.status >= 400) { reject(new Error('API error ' + xhr.status + ': ' + xhr.responseText.slice(0,150))); return; }
        try { resolve(JSON.parse(xhr.responseText)); }
        catch(e) { reject(new Error('Bad response from API: ' + e.message)); }
      };
      xhr.onerror = () => reject(new Error(
        'Network error — cannot reach api.anthropic.com\n' +
        '• Check your internet connection\n' +
        '• Try reloading the page\n' +
        '• Re-enter your API key via ⚙️ (it may have invisible characters)'
      ));
      xhr.ontimeout = () => reject(new Error('Request timed out (60s). Try again.'));
      xhr.send(body);
    });

    const reply = (data.content || []).find(b => b.type === 'text')?.text || '(no response)';
    chatState.msgs.push({ role: 'assistant', content: reply });
    chatState.loading = false;
    renderChat();
    /* Speak AFTER DOM settles — focus/render events kill Android TTS if spoken before */
    if (voiceMode) setTimeout(() => speakReply(reply), 300);
  } catch (e) {
    chatState.msgs.push({ role: 'assistant', content: '⚠️ ' + (e.message || String(e)) });
    chatState.loading = false;
    renderChat();
  }
}

function chatReset() {
  chatState.msgs = [];
  chatState.loading = false;
  renderChat();
}

/* Voice input — hi-IN used for dev/Sanskrit: outputs Devanagari script reliably */
const VOICE_LANGS = { en:'en-IN', dev:'hi-IN', hi:'hi-IN', kn:'kn-IN' };
const TTS_LANGS   = { en:'en-IN', dev:'hi-IN', hi:'hi-IN', kn:'kn-IN' };
let voiceRec = null;
let voiceUtterance = null;
let wakeLock = null;
let voiceMode = false;

async function acquireWakeLock() {
  if (!('wakeLock' in navigator) || wakeLock) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
function releaseWakeLock() {
  if (!wakeLock) return;
  wakeLock.release().catch(()=>{});
  wakeLock = null;
}

function stripForSpeech(text) {
  return text
    .replace(/#{1,6}\s*/g, '')          // ## headings
    .replace(/\*\*(.+?)\*\*/g, '$1')    // **bold**
    .replace(/\*(.+?)\*/g, '$1')        // *italic*
    .replace(/^>\s*/gm, '')             // > blockquotes
    .replace(/^-{3,}$/gm, '')           // --- dividers
    .replace(/\|{1,2}/g, ',')           // || or | (verse separators) → pause
    .replace(/^\s*[-*]\s+/gm, '')       // bullet points
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1') // [links](url)
    .replace(/`[^`]+`/g, '')            // `code`
    .replace(/\n{3,}/g, '\n\n')         // collapse excess blank lines
    .trim();
}

function setVoiceStatus(msg) {
  let el = document.getElementById('voice-status');
  if (!el) {
    el = document.createElement('div');
    el.id = 'voice-status';
    el.style.cssText = 'text-align:center;font-size:12px;color:#888;padding:4px 0;min-height:18px';
    const wrap = document.querySelector('.chat-input-wrap') || document.getElementById('chat-send')?.parentNode;
    if (wrap) wrap.parentNode.insertBefore(el, wrap);
  }
  el.textContent = msg || '';
}

function speakReply(text) {
  if (!window.speechSynthesis) { setVoiceStatus('TTS not supported'); return; }
  const synth = window.speechSynthesis;
  synth.cancel();

  const spokenText = stripForSpeech(text);
  if (!spokenText) { setVoiceStatus('Nothing to speak'); return; }

  /* Split into sentences — Android cuts off long utterances */
  const chunks = spokenText.match(/[^।.!?]+[।.!?]*/g)?.map(s => s.trim()).filter(Boolean) || [spokenText];

  const lang = TTS_LANGS[state.lang] || 'en-IN';
  const base = lang.split('-')[0];
  const mic = document.getElementById('chat-mic');

  function fireChunks(voices) {
    setVoiceStatus('Speaking…');
    if (mic) { mic.textContent = '🔊'; mic.title = 'Tap to stop'; }

    let idx = 0;
    function speakNext() {
      if (!voiceUtterance && idx > 0) return; /* stopped externally */
      if (idx >= chunks.length) {
        voiceUtterance = null;
        if (mic) { mic.textContent = '🎙'; mic.title = 'Voice input'; }
        setVoiceStatus('');
        setTimeout(() => startVoice(), 500);
        return;
      }
      const utt = new SpeechSynthesisUtterance(chunks[idx++]);
      utt.lang = lang;
      utt.rate = 0.92;
      utt.pitch = 1.0;
      utt.voice = voices.find(v => v.lang === lang)
               || voices.find(v => v.lang.startsWith(base))
               || voices.find(v => v.lang === 'hi-IN')
               || voices.find(v => v.lang.startsWith('hi'))
               || voices[0] || null;
      utt.onend = speakNext;
      utt.onerror = (e) => {
        if (e.error === 'interrupted' || e.error === 'canceled') return;
        setVoiceStatus('TTS error: ' + e.error);
        voiceUtterance = null;
        if (mic) { mic.textContent = '🎙'; mic.title = 'Voice input'; }
      };
      voiceUtterance = utt;
      synth.speak(utt);
    }
    speakNext();
  }

  setVoiceStatus('Loading voice…');
  let attempts = 0;
  function trySpeak() {
    const voices = synth.getVoices();
    setVoiceStatus('Loading voice… ' + voices.length + ' found');
    if (voices.length > 0 || attempts++ > 15) {
      fireChunks(voices);
    } else {
      setTimeout(trySpeak, 150);
    }
  }
  trySpeak();
}

function startVoice() {
  /* If TTS is currently speaking, stop it first */
  if (voiceUtterance) {
    window.speechSynthesis.cancel();
    voiceUtterance = null;
    const mic = document.getElementById('chat-mic');
    if (mic) { mic.textContent = '🎙'; mic.title = 'Voice input'; }
    releaseWakeLock();
    return;
  }
  acquireWakeLock();
  /* Prime Android speechSynthesis within user gesture — volume 0 so inaudible */
  if (window.speechSynthesis) {
    const primer = new SpeechSynthesisUtterance('.');
    primer.volume = 0;
    primer.rate = 10;
    window.speechSynthesis.speak(primer);
    /* Do NOT cancel — cancelling removes the unlock */
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    const inp = document.getElementById('chat-input');
    if (inp) { inp.placeholder = 'Voice not supported — type instead'; }
    return;
  }
  /* Stop if already recording */
  if (voiceRec) { try { voiceRec.stop(); } catch(e){} return; }

  const mic = document.getElementById('chat-mic');
  const inp = document.getElementById('chat-input');

  voiceRec = new SR();
  voiceRec.lang = VOICE_LANGS[state.lang] || 'en-IN';
  voiceRec.continuous = false;
  voiceRec.interimResults = true;
  voiceRec.maxAlternatives = 1;

  /* Simple error handler — reset mic state */
  voiceRec.onerror = (e) => {
    voiceRec = null;
    const mic2 = document.getElementById('chat-mic');
    if (mic2) { mic2.classList.remove('recording'); mic2.textContent = '🎙'; }
  };

  voiceRec.onstart = () => {
    if (mic) { mic.classList.add('recording'); mic.title = 'Tap to stop'; }
    if (inp) inp.placeholder = '🎙 Listening…';
  };
  voiceRec.onresult = (e) => {
    const t = Array.from(e.results).map(r => r[0].transcript).join('');
    if (inp) { inp.value = t; inp.dispatchEvent(new Event('input')); }
  };
  voiceRec.onend = () => {
    voiceRec = null;
    if (mic) { mic.classList.remove('recording'); mic.title = 'Voice input'; }
    const ui = CHAT_UI[state.lang] || CHAT_UI.en;
    if (inp) inp.placeholder = ui.placeholder;
    const send = document.getElementById('chat-send');
    if (send && inp) send.disabled = !inp.value.trim() || chatState.loading;
    /* Auto-submit if text was captured */
    if (inp && inp.value.trim()) {
      voiceMode = true;
      setTimeout(() => chatSend(), 100);
    } else {
      releaseWakeLock();
    }
  };
  voiceRec.onerror = (e) => {
    voiceRec = null;
    if (mic) { mic.classList.remove('recording'); mic.title = 'Voice input'; }
    const ui = CHAT_UI[state.lang] || CHAT_UI.en;
    if (inp) {
      inp.placeholder = e.error === 'not-allowed'
        ? '⚠️ Microphone permission denied'
        : e.error === 'network'
        ? '⚠️ Voice needs internet connection'
        : '⚠️ Voice error — try again';
    }
    setTimeout(() => { if (inp) inp.placeholder = (CHAT_UI[state.lang]||CHAT_UI.en).placeholder; }, 3000);
  };
  try { voiceRec.start(); }
  catch(e) {
    voiceRec = null;
    if (inp) inp.placeholder = '⚠️ Could not start mic — ' + e.message;
  }
}

function renderChat() {
  const ui = CHAT_UI[state.lang] || CHAT_UI.en;
  const root = document.getElementById('view-chat');
  root.style.display = 'flex';
  root.style.flexDirection = 'column';

  const msgsHTML = chatState.msgs.map(m =>
    `<div class="chat-bubble ${m.role==='user'?'user':'bot'}">${escapeHtml(m.content)}</div>`
  ).join('');

  const hasKey = !!getChatApiKey();
  const gearBtn = `<span onclick="chatToggleKey()" title="${hasKey?'API key set — click to change':'Set API key'}" style="position:absolute;top:14px;right:16px;cursor:pointer;font-size:16px;opacity:.5;user-select:none" aria-label="API key settings">${hasKey?'🔑':'⚙️'}</span>`;

  const noKeyMsg = `<div style="margin:auto;text-align:center;padding:24px 16px;color:var(--ink-soft);font-size:14px;line-height:1.8">
    <div style="font-size:32px;margin-bottom:12px">🔒</div>
    <div style="font-weight:600;margin-bottom:8px">Chat not available</div>
    <div>This feature requires an Anthropic API key.<br>Contact the app owner for access.</div>
  </div>`;

  const emptyHTML = chatState.msgs.length === 0
    ? (hasKey
        ? `<div class="chat-empty">${escapeHtml(ui.intro)}</div>
           <div class="chat-suggestions">${ui.sugg.map(s =>
             `<button class="chat-suggestion" data-q="${escapeHtml(s)}" onclick="chatSend(this.dataset.q)">${escapeHtml(s)}</button>`
           ).join('')}</div>`
        : noKeyMsg)
    : '';

  const typingHTML = chatState.loading ?
    `<div class="chat-typing"><span></span><span></span><span></span></div>` : '';

  const resetBtn = chatState.msgs.length > 0 ?
    `<button class="chat-reset" onclick="chatReset()">${escapeHtml(ui.newConv)}</button>` : '';

  root.style.position = 'relative';
  root.innerHTML = `
    ${gearBtn}
    <div class="chat-msgs" id="chat-msgs">
      ${emptyHTML}${msgsHTML}${typingHTML}
    </div>
    <div class="chat-input-wrap">
      <div style="flex:1;display:flex;flex-direction:column">
        ${resetBtn}
        <textarea id="chat-input" rows="2" placeholder="${escapeHtml(ui.placeholder)}"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chatSend()}"
          oninput="voiceMode=false;document.getElementById('chat-send').disabled=!this.value.trim()||chatState.loading"
        ></textarea>
      </div>
      <button id="chat-mic" class="chat-mic" onclick="startVoice()" title="Voice input">🎙</button>
      <button id="chat-send" class="chat-send" disabled onclick="chatSend()">➤</button>
    </div>`;

  const msgsEl = document.getElementById('chat-msgs');
  if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;
