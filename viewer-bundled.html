<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f4ead8">
<title>Bhagavad Gītā · Concept KG (Madhva)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600&family=Noto+Sans+Devanagari:wght@400;500;600&family=Noto+Sans+Kannada:wght@400;500;600&family=Tiro+Devanagari+Sanskrit:ital@0;1&family=Tiro+Kannada:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4ead8; --bg-2:#ebdfc7; --ink:#1f1a13; --ink-soft:#4a3f30; --ink-fade:#7a6c54;
  --rule:#d6c599; --rule-soft:#e6d8b0; --paper:#fbf5e6; --paper-2:#f6ecd2;
  --hl:#f9d57a;

  --t-paramartha:#8b1e1a; --t-tattva:#a83f1a; --t-kshetra:#b8702a;
  --t-guna:#c69e2a;       --t-yoga:#7b8d2e;    --t-sadhana:#3f7a4a;
  --t-antahkarana:#2f6e7a;--t-dharma:#3a4a7a;  --t-dosha:#5a3e6a;
  --t-phala:#7a1e5a;      --t-yajna:#6a2e2e;   --t-pratika:#3e3a32;

  --e-is-a:#5a5a5a;       --e-includes:#3a6a3a; --e-leads-to:#2e6a7a;
  --e-opposite-of:#8a3a3a; --e-antidote-to:#3a6a7a; --e-arises-from:#7a4a2a;
  --e-predicates-on:#4a3a7a; --e-transforms-into:#7a5a3a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;min-height:100svh;margin:0;padding:0}
body{
  background:
    radial-gradient(ellipse at 20% -10%, #f9efd9 0%, transparent 55%),
    radial-gradient(ellipse at 110% 110%, #ead9b3 0%, transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:contain;
}
.app{
  position:relative;z-index:1;
  max-width:840px;margin:0 auto;
  min-height:100svh;
  display:flex;flex-direction:column;
}

/* ============ HEADER ============ */
header.top{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;gap:8px;
  padding:max(10px,env(safe-area-inset-top,0)) 14px 10px;
  background:#f4ead8;
  border-bottom:1px solid var(--rule);
}
header .brand{flex:1;min-width:0;display:flex;align-items:baseline;gap:8px;overflow:hidden}
header .brand .name{
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:18px;line-height:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
header .brand .name em{font-style:italic;color:var(--ink-soft);font-weight:500}
header .brand .crumb{
  font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-fade);white-space:nowrap;flex:0 0 auto;
}
header .lang{
  display:flex;gap:0;background:var(--paper);border:1px solid var(--rule);
  border-radius:8px;overflow:hidden;font-size:11px;letter-spacing:.06em;
}
header .lang button{
  background:transparent;border:0;color:var(--ink-soft);
  padding:6px 8px;cursor:pointer;font:inherit;
}
header .lang button.on{background:var(--ink);color:var(--paper)}
header .lang button + button{border-left:1px solid var(--rule)}

/* ============ SUBHEADER / VIEW TABS ============ */
.subhead{
  display:flex;gap:0;border-bottom:1px solid var(--rule);background:#f4ead8;
  position:sticky;top:46px;z-index:9;
}
.subhead button{
  flex:1;padding:10px 4px;background:transparent;border:0;
  font:inherit;color:var(--ink-fade);font-size:12px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;
}
.subhead button.on{color:var(--ink);box-shadow:inset 0 -2px 0 var(--ink)}

/* ============ SEARCH ============ */
.search{padding:10px 14px;background:#f4ead8;border-bottom:1px solid var(--rule-soft);position:sticky;top:84px;z-index:8}
.search input{
  width:100%;padding:8px 10px;border:1px solid var(--rule);border-radius:6px;
  background:var(--paper);font:inherit;font-size:13px;color:var(--ink);
}
.search input:focus{outline:0;border-color:var(--ink-soft)}

/* ============ MAIN ============ */
main{flex:1;padding:8px 0 80px}

/* ============ BROWSE ============ */
.tier-section{padding:10px 14px 4px}
.tier-section .tier-head{
  display:flex;align-items:baseline;gap:8px;margin-bottom:6px;
}
.tier-section .tier-dot{
  display:inline-block;width:10px;height:10px;border-radius:50%;
}
.tier-section .tier-name{
  font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;
}
.tier-section .tier-gloss{font-size:11px;color:var(--ink-fade);letter-spacing:.04em}
.tier-section .tier-count{font-size:11px;color:var(--ink-fade);margin-left:auto}
ul.entry-list{list-style:none;margin:0;padding:0 14px 16px}
ul.entry-list li{
  padding:9px 10px;margin:4px 0;border-radius:8px;
  background:var(--paper);border:1px solid var(--rule-soft);
  display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;
  cursor:pointer;transition:transform .08s, border-color .08s;
}
ul.entry-list li:hover{border-color:var(--rule);transform:translateY(-1px)}
ul.entry-list li .label{
  font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--ink);
}
ul.entry-list li .sub{font-size:11px;color:var(--ink-fade);margin-top:2px}
ul.entry-list li .ref{font-size:10px;color:var(--ink-fade);letter-spacing:.04em}
ul.entry-list li.dev .label,
body.lang-dev ul.entry-list li .label{font-family:'Tiro Devanagari Sanskrit','Noto Sans Devanagari',serif;font-size:18px}
body.lang-hi ul.entry-list li .label{font-family:'Tiro Devanagari Hindi','Noto Sans Devanagari',serif;font-size:18px}
body.lang-kn ul.entry-list li .label{font-family:'Tiro Kannada','Noto Sans Kannada',serif;font-size:18px}
.hl{background:var(--hl);padding:0 1px;border-radius:2px}

/* ============ FOCUS ============ */
.focus-card{
  margin:10px 14px;padding:14px 16px;border-radius:10px;
  background:var(--paper);border:1px solid var(--rule);
}
.focus-card .tier-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-fade);
}
.focus-card .tier-badge::before{
  content:"";display:inline-block;width:8px;height:8px;border-radius:50%;
}
.focus-card h1{
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:28px;
  margin:6px 0 2px;line-height:1.1;
}
body.lang-dev .focus-card h1{font-family:'Tiro Devanagari Sanskrit',serif;font-size:30px}
body.lang-hi  .focus-card h1{font-family:'Tiro Devanagari Hindi',serif;font-size:30px}
body.lang-kn  .focus-card h1{font-family:'Tiro Kannada',serif;font-size:30px}
.focus-card .subtitle{font-size:13px;color:var(--ink-soft);font-style:italic;margin-bottom:8px}
.focus-card .note{font-size:14px;line-height:1.5;color:var(--ink);margin:8px 0}
.focus-card .madhva{
  font-size:13px;line-height:1.45;color:var(--ink-soft);
  padding:8px 10px;background:var(--paper-2);border-left:3px solid var(--t-paramartha);
  border-radius:0 6px 6px 0;margin-top:8px;
}
.focus-card .madhva .madhva-prefix{font-weight:600;color:var(--t-paramartha)}
.focus-card .refs{font-size:11px;letter-spacing:.06em;color:var(--ink-fade);margin-top:10px}

/* Shloka rendered INSIDE the focus card, between note/madhva and refs.
   Italicized in IAST mode; native script in dev/kn modes. Indented + ruled
   on the left to read as a quoted verse callout. */
.focus-card .focus-shloka{
  margin:12px 0 6px;padding:10px 14px;
  border-left:3px solid var(--rule);
  background:linear-gradient(180deg, var(--paper-2) 0%, var(--paper) 100%);
  border-radius:0 6px 6px 0;
}
.focus-card .focus-shloka .shloka-script{
  font-family:'Tiro Devanagari Sanskrit',serif;font-size:17px;line-height:1.55;
  white-space:pre-wrap;color:var(--ink);
}
body.lang-kn .focus-card .focus-shloka .shloka-script{font-family:'Tiro Kannada',serif}
body.lang-en .focus-card .focus-shloka .shloka-script{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;
}
.focus-card .focus-shloka .shloka-ref{
  font-size:10px;color:var(--ink-fade);margin-top:6px;
  letter-spacing:.06em;text-align:right;
}

.shloka{
  margin:0 14px 12px;padding:14px 16px;border-radius:10px;
  background:linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
  border:1px solid var(--rule);
}
.shloka .shloka-script{
  font-family:'Tiro Devanagari Sanskrit',serif;font-size:18px;line-height:1.6;white-space:pre-wrap;
  color:var(--ink);
}
body.lang-kn .shloka .shloka-script{font-family:'Tiro Kannada',serif}
body.lang-en .shloka .shloka-script{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px}
.shloka .shloka-ref{font-size:11px;color:var(--ink-fade);margin-top:6px;letter-spacing:.06em;text-align:right}

.relations{margin:0 14px 80px}
.relations h2{
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:16px;
  margin:14px 0 6px;color:var(--ink-soft);
  letter-spacing:.04em;
}
.relations ul{list-style:none;margin:0;padding:0}
.relations li{
  display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;
  padding:8px 10px;margin:3px 0;border-radius:6px;
  background:var(--paper);border:1px solid var(--rule-soft);cursor:pointer;
  transition:transform .08s, border-color .08s;
}
.relations li:hover{border-color:var(--rule);transform:translateX(2px)}
.relations li .edge-type{
  font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;color:#fff;font-weight:500;
}
.relations li .edge-label{font-size:13px;color:var(--ink-soft)}
.relations li .other{
  font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--ink);text-align:right;
}
body.lang-dev .relations li .other{font-family:'Tiro Devanagari Sanskrit',serif;font-size:17px}
body.lang-hi  .relations li .other{font-family:'Tiro Devanagari Hindi',serif;font-size:17px}
body.lang-kn  .relations li .other{font-family:'Tiro Kannada',serif;font-size:17px}

/* ============ MAP (full graph) ============ */
.map-wrap{padding:10px 8px 80px;overflow:auto}
.map-wrap svg{display:block;margin:0 auto;background:var(--paper);border:1px solid var(--rule);border-radius:8px}
.map-node circle{cursor:pointer;transition:r .1s, stroke-width .1s}
.map-node:hover circle{stroke-width:2.5}
.map-node text{font-family:'Cormorant Garamond',serif;font-size:10px;fill:var(--ink);pointer-events:none;text-anchor:middle}
.map-edge{fill:none;stroke-opacity:.45}

/* ============ FOOTER ============ */
footer{
  position:fixed;bottom:0;left:0;right:0;
  padding:8px 14px max(8px,env(safe-area-inset-bottom,0));
  background:rgba(244,234,216,.94);backdrop-filter:blur(8px);
  border-top:1px solid var(--rule);
  font-size:10px;color:var(--ink-fade);letter-spacing:.06em;text-align:center;
}
</style>
</head>
<body class="lang-en">
<div class="app">

<header class="top">
  <div class="brand">
    <span class="name">Bhagavad <em>Gītā</em> · Concept KG</span>
    <span class="crumb">Madhva</span>
  </div>
  <div class="lang" id="lang-tabs">
    <button data-lang="en" class="on">EN</button>
    <button data-lang="dev">देव</button>
    <button data-lang="hi">हिंदी</button>
    <button data-lang="kn">ಕನ್ನಡ</button>
  </div>
</header>

<nav class="subhead" id="view-tabs">
  <button data-view="browse" class="on">Browse</button>
  <button data-view="focus">Focus</button>
  <button data-view="map">Map</button>
</nav>

<section class="search" id="search-bar">
  <input id="q" type="search" placeholder="Search concepts, tiers, verses…" autocomplete="off" />
</section>

<main>
  <div id="view-browse"></div>
  <div id="view-focus" hidden></div>
  <div id="view-map" hidden></div>
</main>

</div>

<footer>
  <span id="stats"></span>
</footer>

<script>
/* === inlined from data.js === */
/* Bhagavad Gītā Concept Knowledge Graph — Madhva siddhānta reading
 *
 * Author intent: ontology of CONCEPTS taught in the Gītā, organized into 12 tiers,
 *                with every node anchored to a specific verse (or short verse range)
 *                and read through Madhva's commentary tradition (Gītā-bhāṣya +
 *                Bannanje Govindacharya's Kannada exposition).
 *
 * Tri-script: every node has IAST (en), Devanāgarī (dev), Kannada lipi (kn).
 *
 * Tiers (12) — see TIERS array below.
 */

const TIERS = [
  { id:'paramartha',   en:'Paramārtha',    dev:'परमार्थ',      kn:'ಪರಮಾರ್ಥ', hi:'परमार्थ',     gloss:'Ultimate reality — Hari, the sarvottama' },
  { id:'tattva',       en:'Tattva',        dev:'तत्त्व',         kn:'ತತ್ತ್ವ', hi:'तत्त्व',         gloss:'Metaphysical categories — jīva, prakṛti, kāla' },
  { id:'kshetra',      en:'Kṣetra-Kṣetrajña', dev:'क्षेत्र-क्षेत्रज्ञ', kn:'ಕ್ಷೇತ್ರ-ಕ್ಷೇತ್ರಜ್ಞ', hi:'क्षेत्र-क्षेत्रज्ञ', gloss:'Field & field-knower — body, knower, 24 elements (Ch 13)' },
  { id:'guna',         en:'Guṇa',          dev:'गुण',           kn:'ಗುಣ', hi:'गुण',          gloss:'The three modes of prakṛti — sattva, rajas, tamas' },
  { id:'yoga',         en:'Yoga',          dev:'योग',           kn:'ಯೋಗ', hi:'योग',         gloss:'Paths — karma, jñāna, bhakti, dhyāna, sannyāsa' },
  { id:'sadhana',      en:'Sādhanā',       dev:'साधना',         kn:'ಸಾಧನಾ', hi:'साधना',         gloss:'Practices — śraddhā, vairāgya, yajña, tapas, tyāga' },
  { id:'antahkarana',  en:'Antaḥkaraṇa',   dev:'अन्तःकरण',      kn:'ಅಂತಃಕರಣ', hi:'अंतःकरण',     gloss:'Inner instrument — manas, buddhi, ahaṅkāra, indriyas' },
  { id:'dharma',       en:'Dharma',        dev:'धर्म',           kn:'ಧರ್ಮ', hi:'धर्म',         gloss:'Ethics — svadharma, niṣkāma-karma, sthita-prajña' },
  { id:'dosha',        en:'Doṣa',          dev:'दोष',           kn:'ದೋಷ', hi:'दोष',          gloss:'Defects — kāma, krodha, lobha, moha, asat-saṅga' },
  { id:'phala',        en:'Phala',         dev:'फल',            kn:'ಫಲ', hi:'फल',           gloss:'Goals & states — mokṣa, paramagati, brāhmī-sthiti' },
  { id:'yajna',        en:'Yajña',         dev:'यज्ञ',           kn:'ಯಜ್ಞ', hi:'यज्ञ',          gloss:'Sacrifice varieties — dravya, tapo, jñāna, svādhyāya' },
  { id:'pratika',      en:'Pratīka',       dev:'प्रतीक',          kn:'ಪ್ರತೀಕ', hi:'प्रतीक',        gloss:'Symbols & metaphors — aśvattha, ratha, praṇava' },
];

const TIER_COLOR = {
  paramartha:'#8b1e1a', tattva:'#a83f1a', kshetra:'#b8702a',
  guna:'#c69e2a', yoga:'#7b8d2e', sadhana:'#3f7a4a',
  antahkarana:'#2f6e7a', dharma:'#3a4a7a', dosha:'#5a3e6a',
  phala:'#7a1e5a', yajna:'#6a2e2e', pratika:'#3e3a32',
};

const TIER_INDEX = Object.fromEntries(TIERS.map((t,i)=>[t.id,i]));

/* ============================================================================
 * NODES — concept entries
 * ============================================================================
 * Schema: { id, tier, en, dev, kn, title, note, refs, madhva (optional flag/note) }
 *   - id: stable slug, ascii-only
 *   - en / dev / kn: the label in each script
 *   - title: short subtitle (English; the script-specific HTMLs override)
 *   - note: 2-3 sentence doctrinal note from a Madhva angle
 *   - refs: anchor verse(s) — BG x.y format
 *   - madhva: short note where Madhva's reading is distinctive (optional)
 */

const NODES = [
  /* ---------------- Paramārtha (8) ---------------- */
  { id:'brahman', tier:'paramartha',
    en:'Brahman', dev:'ब्रह्मन्', kn:'ಬ್ರಹ್ಮನ್',
    title:{en:'Brahman — the Supreme',dev:"ब्रह्म — परतत्त्व",kn:"ಬ್ರಹ್ಮ — ಪರತತ್ತ್ವ",hi:"ब्रह्म — परम तत्त्व"},
    note:{en:"For Madhva, Brahman names Viṣṇu/Nārāyaṇa alone — sarvottama, the puruṣottama beyond kṣara and akṣara. Not a generic 'absolute'.",dev:"मध्व-सिद्धान्ते ब्रह्म इति शब्दः केवलं विष्णोः (नारायणस्य) वाचकः — सर्वोत्तमः, क्षराक्षरातीतः पुरुषोत्तमः। न तु निर्विशेष-निरुपाधि-सामान्य-तत्त्ववाचकः।",kn:"ಮಧ್ವ-ಸಿದ್ಧಾಂತದಲ್ಲಿ ಬ್ರಹ್ಮ ಎಂಬ ಶಬ್ದವು ಕೇವಲ ವಿಷ್ಣುವಿನ (ನಾರಾಯಣನ) ವಾಚಕ — ಸರ್ವೋತ್ತಮ, ಕ್ಷರಾಕ್ಷರಾತೀತ ಪುರುಷೋತ್ತಮ। ನಿರ್ವಿಶೇಷ-ನಿರುಪಾಧಿ-ಸಾಮಾನ್ಯ-ತತ್ತ್ವವಾಚಕ ಅಲ್ಲ.",hi:"मध्व-सिद्धांत में 'ब्रह्म' शब्द केवल विष्णु/नारायण का नाम है — सर्वोत्तम, क्षर और अक्षर से परे पुरुषोत्तम। यह कोई सामान्य 'निरपेक्ष तत्त्व' नहीं है।"},
    refs:'BG 8.3 · 14.27 · 15.18',
    madhva:{en:'Brahman = Viṣṇu (not nirguṇa absolute as in Advaita).',dev:"ब्रह्म = विष्णुः (न तु अद्वैत-मते निर्गुणं तत्त्वम्)।",kn:"ಬ್ರಹ್ಮ = ವಿಷ್ಣು (ಅದ್ವೈತ-ಮತದ ನಿರ್ಗುಣ ತತ್ತ್ವವಲ್ಲ).",hi:"ब्रह्म = विष्णु (अद्वैत मत के निर्गुण निरपेक्ष ब्रह्म नहीं)।"} },
  { id:'paramatman', tier:'paramartha',
    en:'Paramātman', dev:'परमात्मन्', kn:'ಪರಮಾತ್ಮನ್',
    title:{en:'Paramātman — the indweller',dev:"परमात्मा — अन्तर्यामी",kn:"ಪರಮಾತ್ಮಾ — ಅಂತರ್ಯಾಮಿ",hi:"परमात्मा — अंतर्यामी"},
    note:{en:"The 'highest Self' standing in every body as the witness, sustainer, ordainer. Distinct from jīva (BG 15.17).",dev:"सर्वदेहेषु साक्षि-भर्ता-नियन्तृ-रूपेण स्थितः परम आत्मा। जीवात् अत्यन्तं भिन्नः (गी॰ १५।१७)।",kn:"ಸರ್ವ ದೇಹಗಳಲ್ಲಿ ಸಾಕ್ಷಿ-ಭರ್ತೃ-ನಿಯಂತೃ ರೂಪದಲ್ಲಿ ಸ್ಥಿತನಾದ ಪರಮ ಆತ್ಮಾ. ಜೀವಕ್ಕಿಂತ ಅತ್ಯಂತ ಭಿನ್ನ (ಗೀ॰ ೧೫।೧೭).",hi:"'परम आत्मा' — हर शरीर में साक्षी, भर्ता और नियामक के रूप में स्थित। जीव से अत्यंत भिन्न (गीता १५.१७)।"},
    refs:'BG 13.22 · 15.17',
    madhva:{en:'Always tri-vidha — different from kṣara (perishable) and akṣara (jīva).',dev:"सर्वदा त्रिविधः — क्षरात् (नश्वर-जगतः) अक्षरात् (जीवात्) च भिन्नः।",kn:"ಸರ್ವದಾ ತ್ರಿವಿಧ — ಕ್ಷರದಿಂದ (ನಶ್ವರ-ಜಗತ್ತಿನಿಂದ) ಮತ್ತು ಅಕ್ಷರದಿಂದ (ಜೀವದಿಂದ) ಭಿನ್ನ.",hi:"सदा त्रिविध — क्षर (नश्वर जगत) से और अक्षर (जीव) से भी अलग।"} },
  { id:'purushottama', tier:'paramartha',
    en:'Puruṣottama', dev:'पुरुषोत्तम', kn:'ಪುರುಷೋತ್ತಮ',
    title:{en:'Puruṣottama — the supreme person',dev:"पुरुषोत्तम — परमः पुरुषः",kn:"ಪುರುಷೋತ್ತಮ — ಪರಮ ಪುರುಷ",hi:"पुरुषोत्तम — सर्वोच्च पुरुष"},
    note:{en:"Krishna's self-designation as the puruṣa beyond the perishable and the imperishable. The hermeneutic center of Ch 15.",dev:"क्षराक्षरयोः अतीतः उत्तमः पुरुषः इति कृष्णस्य आत्म-निरूपणम्। पञ्चदशाध्यायस्य हर्मेन्यूतिक-केन्द्रम्।",kn:"ಕ್ಷರಾಕ್ಷರಗಳಿಗಿಂತ ಅತೀತನಾದ ಉತ್ತಮ ಪುರುಷ ಎಂಬುದು ಕೃಷ್ಣನ ಆತ್ಮ-ನಿರೂಪಣೆ. ಹದಿನೈದನೆಯ ಅಧ್ಯಾಯದ ಹರ್ಮೆನ್ಯೂಟಿಕ್ ಕೇಂದ್ರ.",hi:"कृष्ण का स्वयं को क्षर और अक्षर दोनों से परे ‘पुरुषोत्तम’ कहना — पंद्रहवें अध्याय का सार बिंदु।"},
    refs:'BG 15.18–19',
    madhva:{en:'Strictly = Hari. Not jīva-paramātman aikya as Advaita reads.',dev:"पुरुषोत्तमः = हरिः एव। न तु अद्वैतमते जीव-परमात्म-ऐक्यम्।",kn:"ಪುರುಷೋತ್ತಮ = ಹರಿಯೇ. ಅದ್ವೈತ-ಮತದ ಜೀವ-ಪರಮಾತ್ಮ-ಐಕ್ಯ ಅಲ್ಲ.",hi:"सख्ती से = हरि। अद्वैत के ‘जीव-परमात्मा ऐक्य’ का अर्थ नहीं।"} },
  { id:'ksara_purusha', tier:'paramartha',
    en:'Kṣara-puruṣa', dev:'क्षरपुरुष', kn:'ಕ್ಷರಪುರುಷ',
    title:{en:'The perishable puruṣa',dev:"क्षरपुरुषः — नश्वरः",kn:"ಕ್ಷರಪುರುಷ — ನಶ್ವರ",hi:"क्षर पुरुष — नश्वर"},
    note:{en:"The collectivity of bound jīvas in saṃsāra — 'all beings' subject to change. Lower step in the Ch 15 ladder.",dev:"संसार-बद्ध-जीव-समष्टिः — \"सर्वाणि भूतानि\" इति विकार-गोचराः। पञ्चदश-अध्याय-सोपानस्य अधर-पदम्।",kn:"ಸಂಸಾರ-ಬದ್ಧ ಜೀವ-ಸಮಷ್ಟಿ — \"ಸರ್ವಾಣಿ ಭೂತಾನಿ\" ಎಂಬ ವಿಕಾರ-ಗೋಚರ. ಹದಿನೈದನೆಯ ಅಧ್ಯಾಯದ ಸೋಪಾನದ ಅಧರ ಪದ.",hi:"संसार में बँधे जीवों का समूह — ‘सब प्राणी’ जो परिवर्तन के अधीन हैं। पंद्रहवें अध्याय के क्रम का निचला पायदान।"},
    refs:'BG 15.16' },
  { id:'akshara_purusha', tier:'paramartha',
    en:'Akṣara-puruṣa', dev:'अक्षरपुरुष', kn:'ಅಕ್ಷರಪುರುಷ',
    title:{en:'The imperishable puruṣa',dev:"अक्षरपुरुषः — कूटस्थः",kn:"ಅಕ್ಷರಪುರುಷ — ಕೂಟಸ್ಥ",hi:"अक्षर पुरुष — कूटस्थ"},
    note:{en:"The kūṭa-stha — for Madhva, Lakṣmī, the eternally-liberated jīva-gaṇa-mukhya. Sarvottama after Hari.",dev:"कूटस्थः अक्षरः — मध्व-मते लक्ष्मीः, नित्य-मुक्त-जीव-गण-मुख्या। हरेः अनन्तरं सर्वोत्तमा।",kn:"ಕೂಟಸ್ಥ ಅಕ್ಷರ — ಮಧ್ವ-ಮತದಲ್ಲಿ ಲಕ್ಷ್ಮೀ, ನಿತ್ಯ-ಮುಕ್ತ-ಜೀವ-ಗಣ-ಮುಖ್ಯಾ. ಹರಿಯ ನಂತರ ಸರ್ವೋತ್ತಮಾ.",hi:"कूटस्थ अक्षर — मध्व के अनुसार यह लक्ष्मी हैं, नित्य-मुक्त जीवों की मुख्या। हरि के बाद सर्वोत्तम।"},
    refs:'BG 15.16',
    madhva:{en:'Madhva: akṣara = Śrī/Lakṣmī, not impersonal Brahman as Advaita reads.',dev:"मध्व-मते अक्षरः = श्रीः/लक्ष्मीः, न तु अद्वैतोक्तं निर्विशेष-ब्रह्म।",kn:"ಮಧ್ವ-ಮತದಲ್ಲಿ ಅಕ್ಷರ = ಶ್ರೀ/ಲಕ್ಷ್ಮೀ, ಅದ್ವೈತೋಕ್ತ ನಿರ್ವಿಶೇಷ ಬ್ರಹ್ಮ ಅಲ್ಲ.",hi:"मध्व का मत: अक्षर = श्री/लक्ष्मी, अद्वैत के अव्यक्त ब्रह्म जैसा नहीं।"} },
  { id:'avatara', tier:'paramartha',
    en:'Avatāra', dev:'अवतार', kn:'ಅವತಾರ',
    title:{en:'Divine descent',dev:"अवतार — दिव्य-अवतरणम्",kn:"ಅವತಾರ — ದಿವ್ಯ-ಅವತರಣ",hi:"अवतार — दिव्य उतार"},
    note:{en:"Hari assumes form in age after age to restore dharma and protect the sādhus. The body is sva-icchā, not karma-bound.",dev:"हरिः युगे युगे रूपं स्वीकृत्य धर्म-संस्थापनाय साधु-परित्राणाय च अवतरति। तदीयं शरीरं स्व-इच्छा-निर्मितम्, न कर्म-बद्धम्।",kn:"ಹರಿಯು ಯುಗ-ಯುಗದಲ್ಲಿ ರೂಪವನ್ನು ಸ್ವೀಕರಿಸಿ ಧರ್ಮ-ಸಂಸ್ಥಾಪನೆಗಾಗಿ ಮತ್ತು ಸಾಧು-ಪರಿತ್ರಾಣಕ್ಕಾಗಿ ಅವತರಿಸುತ್ತಾನೆ. ಅವನ ಶರೀರ ಸ್ವ-ಇಚ್ಛಾ-ನಿರ್ಮಿತ, ಕರ್ಮ-ಬದ್ಧವಲ್ಲ.",hi:"हरि युग-युग में स्वयं रूप धारण करके धर्म की स्थापना और साधुओं की रक्षा के लिए उतरते हैं। यह शरीर इच्छा से लिया जाता है, कर्म से बद्ध नहीं।"},
    refs:'BG 4.6–8' },
  { id:'svarupa_aikya', tier:'paramartha',
    en:'Svarūpa-aikya', dev:'स्वरूपैक्य', kn:'ಸ್ವರೂಪೈಕ್ಯ',
    title:{en:'Identity of Hari\'s forms',dev:"स्वरूपैक्यम् — हरि-रूपाणाम्",kn:"ಸ್ವರೂಪೈಕ್ಯ — ಹರಿಯ ರೂಪಗಳ",hi:"हरि के रूपों की एकता"},
    note:{en:"Krishna, Viṣṇu, Nārāyaṇa, Vāsudeva — no svarūpa-bheda. One paramātman with multiple manifestation-forms (vyūha).",dev:"कृष्णः, विष्णुः, नारायणः, वासुदेवः — एषु स्वरूप-भेदः नास्ति। एक एव परमात्मा अनेक-व्यूह-रूपैः प्रकटः।",kn:"ಕೃಷ್ಣ, ವಿಷ್ಣು, ನಾರಾಯಣ, ವಾಸುದೇವ — ಇವರಲ್ಲಿ ಸ್ವರೂಪ-ಭೇದವಿಲ್ಲ. ಒಬ್ಬನೇ ಪರಮಾತ್ಮ ಅನೇಕ ವ್ಯೂಹ-ರೂಪಗಳಲ್ಲಿ ಪ್ರಕಟ.",hi:"कृष्ण, विष्णु, नारायण, वासुदेव — इनके स्वरूप में कोई भेद नहीं। एक ही परमात्मा कई प्रकट रूपों (व्यूह) में हैं।"},
    refs:'BG 10.20 · 11.24',
    madhva:{en:'Madhva-distinctive: rejects panentheism, preserves form-realism.',dev:"मध्व-वैशिष्ट्यम् — सर्व-व्याप्ति-वादं निरस्य रूप-वास्तविकत्वं रक्षति।",kn:"ಮಧ್ವ-ವೈಶಿಷ್ಟ್ಯ — ಸರ್ವ-ವ್ಯಾಪ್ತಿ-ವಾದವನ್ನು ನಿರಸನ ಮಾಡಿ ರೂಪ-ವಾಸ್ತವಿಕತ್ವವನ್ನು ರಕ್ಷಿಸುತ್ತದೆ.",hi:"मध्व-विशिष्ट: सर्व-व्याप्ति-वाद को अस्वीकार करते हुए रूप की वास्तविकता बनाए रखता है।"} },
  { id:'sarvottamatva', tier:'paramartha',
    en:'Sarvottamatva', dev:'सर्वोत्तमत्व', kn:'ಸರ್ವೋತ್ತಮತ್ವ',
    title:{en:'Hari\'s absolute supremacy',dev:"सर्वोत्तमत्वम् — हरेः",kn:"ಸರ್ವೋತ್ತಮತ್ವ — ಹರಿಯ",hi:"हरि की पूर्ण सर्वोच्चता"},
    note:{en:"The axiom anchoring tāratamya: Hari is highest, no one his equal or superior. Every other being is strictly subordinate.",dev:"तारतम्यस्य मूलाधार-सिद्धान्तः — हरिः सर्वोत्कृष्टः, न तस्य समः न अधिकः। सर्वम् इतरत् तत्-परतन्त्रम्।",kn:"ತಾರತಮ್ಯದ ಮೂಲಾಧಾರ-ಸಿದ್ಧಾಂತ — ಹರಿಯು ಸರ್ವೋತ್ಕೃಷ್ಟ, ಅವನಿಗೆ ಸಮಾನನಿಲ್ಲ ಅಧಿಕನಿಲ್ಲ. ಎಲ್ಲವೂ ಇತರ ಅವನ ಪರತಂತ್ರ.",hi:"तारतम्य की मूल धुरी: हरि सर्वोच्च हैं, उनके बराबर या उनसे ऊपर कोई नहीं। बाकी सब उन पर निर्भर।"},
    refs:'BG 7.7 · 11.43 · 18.65',
    madhva:{en:'Foundational Madhva siddhānta — pañca-bheda starts here.',dev:"मध्व-सिद्धान्तस्य आधार-शिला — पञ्च-भेद-व्यवस्था अत एव प्रारभते।",kn:"ಮಧ್ವ-ಸಿದ್ಧಾಂತದ ಆಧಾರ-ಶಿಲೆ — ಪಂಚ-ಭೇದ-ವ್ಯವಸ್ಥೆಯು ಇದರಿಂದಲೇ ಪ್ರಾರಂಭವಾಗುತ್ತದೆ.",hi:"मध्व-सिद्धांत की नींव — पंचभेद यहीं से शुरू होता है।"} },
  { id:'taratamya', tier:'paramartha',
    en:'Tāratamya', dev:'तारतम्य', kn:'ತಾರತಮ್ಯ',
    title:{en:'Gradation of being',dev:"तारतम्यम् — सत्ता-क्रमः",kn:"ತಾರತಮ್ಯ — ಸತ್ತಾ-ಕ್ರಮ",hi:"सत्ता की क्रमिकता"},
    note:{en:"The strict hierarchy of all reality under Hari — every soul has a definite, irreversible rank. The architectural principle of Madhva metaphysics.",dev:"हरि-अधीनस्य समस्त-सत्तायाः कठोर-क्रम-व्यवस्था — प्रत्येक-जीवस्य निश्चितः अपरिवर्तनीयः च पद-क्रमः। मध्व-तत्त्व-शास्त्रस्य रचना-तत्त्वम्।",kn:"ಹರಿ-ಅಧೀನ ಸಮಸ್ತ ಸತ್ತೆಯ ಕಠೋರ ಕ್ರಮ-ವ್ಯವಸ್ಥೆ — ಪ್ರತಿ ಜೀವಕ್ಕೂ ನಿಶ್ಚಿತ ಮತ್ತು ಅಪರಿವರ್ತನೀಯ ಪದ-ಕ್ರಮ. ಮಧ್ವ-ತತ್ತ್ವ-ಶಾಸ್ತ್ರದ ರಚನಾ-ತತ್ತ್ವ.",hi:"हरि के अधीन समस्त सत्ता का सख्त क्रम — हर आत्मा का एक निश्चित, अपरिवर्तनीय स्थान। मध्व-तत्त्वशास्त्र का स्थापत्य सिद्धांत।"},
    refs:'BG 7.7 · 15.16–18',
    madhva:{en:'Distinctively Madhva. Underwrites pañca-bheda and the gradations of mukti.',dev:"विशिष्टं मध्व-तत्त्वम्। पञ्च-भेद-व्यवस्थां मुक्ति-तारतम्यं च आधारयति।",kn:"ವಿಶಿಷ್ಟ ಮಧ್ವ-ತತ್ತ್ವ. ಪಂಚ-ಭೇದ-ವ್ಯವಸ್ಥೆ ಮತ್ತು ಮುಕ್ತಿ-ತಾರತಮ್ಯವನ್ನು ಆಧರಿಸುತ್ತದೆ.",hi:"विशेष रूप से मध्व का। पंचभेद और मुक्ति की श्रेणियों का आधार।"} },
  { id:'pancha_bheda', tier:'paramartha',
    en:'Pañca-bheda', dev:'पञ्चभेद', kn:'ಪಂಚಭೇದ',
    title:{en:'Five real differences',dev:"पञ्चभेदः — पञ्च-वास्तविक-भेदाः",kn:"ಪಂಚಭೇದ — ಐದು ವಾಸ್ತವಿಕ ಭೇದಗಳು",hi:"पाँच असली भेद"},
    note:{en:"Hari-jīva, Hari-jaḍa, jīva-jaḍa, jīva-jīva, jaḍa-jaḍa — five eternal differences that Madhva siddhānta defends as ontologically real.",dev:"हरि-जीव, हरि-जड, जीव-जड, जीव-जीव, जड-जड — एते पञ्च नित्य-भेदाः मध्व-सिद्धान्तेन सत्ता-तन्त्र-वास्तविकाः इति प्रतिपाद्यन्ते।",kn:"ಹರಿ-ಜೀವ, ಹರಿ-ಜಡ, ಜೀವ-ಜಡ, ಜೀವ-ಜೀವ, ಜಡ-ಜಡ — ಈ ಐದು ನಿತ್ಯ-ಭೇದಗಳು ಮಧ್ವ-ಸಿದ್ಧಾಂತದಿಂದ ಸತ್ತಾ-ತಂತ್ರ-ವಾಸ್ತವಿಕ ಎಂದು ಪ್ರತಿಪಾದ್ಯವಾಗುತ್ತವೆ.",hi:"हरि-जीव, हरि-जड़, जीव-जड़, जीव-जीव, जड़-जड़ — पाँच नित्य भेद, जिन्हें मध्व-सिद्धांत वैचारिक सत्य के रूप में स्थापित करता है।"},
    refs:'BG 7.4–5 · 15.7 · 15.16–18',
    madhva:{en:'Madhva-defining. Each bheda is anchored in BG (jīva 15.7, jīva-jīva-bheda implicit in svabhāva 18.41ff).',dev:"मध्व-निर्णायकम्। प्रत्येक-भेदः गीतायां प्रतिष्ठितः (जीवांश-वाक्यं गी॰ १५।७; जीव-जीव-भेदः स्वभाव-वाक्ये गी॰ १८।४१ इत्यादिषु अन्तर्निहितः)।",kn:"ಮಧ್ವ-ನಿರ್ಣಾಯಕ. ಪ್ರತಿ ಭೇದವೂ ಗೀತೆಯಲ್ಲಿ ಪ್ರತಿಷ್ಠಿತ (ಜೀವಾಂಶ-ವಾಕ್ಯ ಗೀ॰ ೧೫।೭; ಜೀವ-ಜೀವ-ಭೇದ ಸ್ವಭಾವ-ವಾಕ್ಯ ಗೀ॰ ೧೮।೪೧ ಇತ್ಯಾದಿಗಳಲ್ಲಿ ಅಂತರ್ನಿಹಿತ).",hi:"मध्व-परिभाषा-सूत्र। हर भेद गीता में निहित है (जीव १५.७; जीव-जीव-भेद १८.४१ के स्वभाव-वर्णन में)।"} },

  /* ---------------- Tattva (8) ---------------- */
  { id:'jiva', tier:'tattva',
    en:'Jīva', dev:'जीव', kn:'ಜೀವ',
    title:{en:'The embodied self',dev:"जीवः — देहस्थः आत्मा",kn:"ಜೀವ — ದೇಹಸ್ಥ ಆತ್ಮ",hi:"जीव — देहधारी आत्मा"},
    note:{en:"An eternal aṃśa of Hari (BG 15.7) — real, distinct, plural, never merged with Brahman. Bound by avidyā until released.",dev:"हरेः नित्यः अंशः (गी॰ १५।७) — सत्यः, भिन्नः, बहुविधः, कदापि ब्रह्मणि लीनं न प्राप्नोति। मुक्ति-पर्यन्तम् अविद्यया बद्धः।",kn:"ಹರಿಯ ನಿತ್ಯ ಅಂಶ (ಗೀ॰ ೧೫।೭) — ಸತ್ಯ, ಭಿನ್ನ, ಬಹುವಿಧ, ಎಂದಿಗೂ ಬ್ರಹ್ಮದಲ್ಲಿ ಲೀನವಾಗುವುದಿಲ್ಲ. ಮುಕ್ತಿ-ಪರ್ಯಂತ ಅವಿದ್ಯೆಯಿಂದ ಬದ್ಧ.",hi:"हरि का नित्य अंश (गीता १५.७) — असली, अलग, अनेक, ब्रह्म में कभी विलीन नहीं। अविद्या से बँधा रहता है, मुक्ति तक।"},
    refs:'BG 15.7',
    madhva:{en:'Jīva-bheda is real (pañca-bheda #1). Plurality of jīvas is eternal.',dev:"जीव-भेदः वास्तविकः (पञ्च-भेदेषु प्रथमः)। जीव-बहुत्वं नित्यम्।",kn:"ಜೀವ-ಭೇದ ವಾಸ್ತವಿಕ (ಪಂಚ-ಭೇದಗಳಲ್ಲಿ ಮೊದಲನೆಯದು). ಜೀವ-ಬಹುತ್ವ ನಿತ್ಯ.",hi:"जीव-भेद वास्तविक है (पंचभेद का पहला)। जीवों की बहुलता नित्य है।"} },
  { id:'isvara', tier:'tattva',
    en:'Īśvara', dev:'ईश्वर', kn:'ಈಶ್ವರ',
    title:{en:'The Lord as ordainer',dev:"ईश्वरः — नियन्ता",kn:"ಈಶ್ವರ — ನಿಯಂತಾ",hi:"ईश्वर — विधाता"},
    note:{en:"Hari as antaryāmī — stands in every heart and directs (yantra-ārūḍha-māyā) the jīvas as if mounted on a machine.",dev:"हरिः अन्तर्यामि-रूपेण सर्व-हृदये तिष्ठन् यन्त्रारूढ-मायया जीवान् भ्रामयति।",kn:"ಹರಿಯು ಅಂತರ್ಯಾಮಿ ರೂಪದಲ್ಲಿ ಸರ್ವ-ಹೃದಯದಲ್ಲಿ ನಿಂತು ಯಂತ್ರಾರೂಢ-ಮಾಯೆಯಿಂದ ಜೀವಗಳನ್ನು ಭ್ರಮಿಸುತ್ತಾನೆ.",hi:"हरि अंतर्यामी रूप में — हर हृदय में बैठकर जीवों को ‘यंत्र पर चढ़े’ की तरह माया द्वारा घुमाते हैं।"},
    refs:'BG 18.61' },
  { id:'prakriti', tier:'tattva',
    en:'Prakṛti', dev:'प्रकृति', kn:'ಪ್ರಕೃತಿ',
    title:{en:'Material nature',dev:"प्रकृतिः — मूल-जडम्",kn:"ಪ್ರಕೃತಿ — ಮೂಲ-ಜಡ",hi:"प्रकृति — भौतिक प्रकृति"},
    note:{en:"Hari's own lower nature — eightfold: earth, water, fire, air, ether, manas, buddhi, ahaṅkāra. The womb of all forms.",dev:"हरेः अपरा-प्रकृतिः अष्टधा — भूमि, आपः, अनलः, वायुः, खम्, मनः, बुद्धिः, अहङ्कारः। सर्व-रूप-योनिः।",kn:"ಹರಿಯ ಅಪರಾ-ಪ್ರಕೃತಿ ಎಂಟು ವಿಧ — ಭೂಮಿ, ಆಪಃ, ಅನಲ, ವಾಯು, ಖಂ, ಮನಃ, ಬುದ್ಧಿ, ಅಹಂಕಾರ. ಸರ್ವ-ರೂಪಗಳ ಯೋನಿ.",hi:"हरि की अपनी निम्न प्रकृति — अष्टधा: पृथ्वी, जल, अग्नि, वायु, आकाश, मन, बुद्धि, अहंकार। सब रूपों की कोख।"},
    refs:'BG 7.4–5 · 9.10',
    madhva:{en:'Prakṛti is real, dependent on Hari (not māyā as illusion).',dev:"प्रकृतिः सत्या, हरि-पराधीना (न तु अद्वैतोक्तं माया-मिथ्या-तत्त्वम्)।",kn:"ಪ್ರಕೃತಿ ಸತ್ಯ, ಹರಿ-ಪರಾಧೀನ (ಅದ್ವೈತೋಕ್ತ ಮಾಯಾ-ಮಿಥ್ಯಾ-ತತ್ತ್ವ ಅಲ್ಲ).",hi:"प्रकृति वास्तविक है, हरि पर निर्भर (अद्वैत की माया-भ्रम जैसी नहीं)।"} },
  { id:'para_prakriti', tier:'tattva',
    en:'Para-prakṛti', dev:'पराप्रकृति', kn:'ಪರಾಪ್ರಕೃತಿ',
    title:{en:'The higher nature',dev:"पराप्रकृतिः — उच्च-तत्त्वम्",kn:"ಪರಾಪ್ರಕೃತಿ — ಉಚ್ಚ-ತತ್ತ್ವ",hi:"परा प्रकृति — उच्चतर"},
    note:{en:"The jīva-bhūta — Hari's higher nature by which the universe is upheld. Distinct from the eightfold material prakṛti.",dev:"जीव-भूता हरेः परा प्रकृतिः — यया इदं सर्वं जगत् धार्यते। अष्टधा-अपरा-प्रकृतेः भिन्ना।",kn:"ಜೀವ-ಭೂತ ಹರಿಯ ಪರಾ ಪ್ರಕೃತಿ — ಯಾವುದರಿಂದ ಈ ಸಮಸ್ತ ಜಗತ್ತು ಧಾರಣವಾಗುತ್ತದೆ. ಎಂಟು-ವಿಧ ಅಪರಾ-ಪ್ರಕೃತಿಯಿಂದ ಭಿನ್ನ.",hi:"जीवभूता — हरि की उच्चतर प्रकृति, जिससे संपूर्ण जगत धारण होता है। अष्टधा भौतिक प्रकृति से अलग।"},
    refs:'BG 7.5' },
  { id:'kala', tier:'tattva',
    en:'Kāla', dev:'काल', kn:'ಕಾಲ',
    title:{en:'Time as Hari',dev:"कालः — हरेः शक्तिः",kn:"ಕಾಲ — ಹರಿಯ ಶಕ್ತಿ",hi:"काल — हरि के रूप में"},
    note:{en:"'I am time, the destroyer of worlds' (BG 11.32). Kāla is Hari's instrumentality of dissolution — not an independent tattva.",dev:"\"कालोऽस्मि लोकक्षयकृत्\" (गी॰ ११।३२) — कालः हरेः संहार-कार्ये साधन-स्वरूपम्, न तु स्वतन्त्रं तत्त्वम्।",kn:"\"ಕಾಲೋಽಸ್ಮಿ ಲೋಕಕ್ಷಯಕೃತ್\" (ಗೀ॰ ೧೧।೩೨) — ಕಾಲವು ಹರಿಯ ಸಂಹಾರ-ಕಾರ್ಯದಲ್ಲಿ ಸಾಧನ-ಸ್ವರೂಪ, ಸ್ವತಂತ್ರ ತತ್ತ್ವವಲ್ಲ.",hi:"‘मैं काल हूँ, लोकों का संहार करने वाला’ (गीता ११.३२)। काल हरि के विघटन का साधन है — कोई स्वतंत्र तत्त्व नहीं।"},
    refs:'BG 10.30 · 11.32' },
  { id:'karma_tattva', tier:'tattva',
    en:'Karma', dev:'कर्म', kn:'ಕರ್ಮ',
    title:{en:'Action as principle',dev:"कर्म — सिद्धान्त-रूपेण",kn:"ಕರ್ಮ — ಸಿದ್ಧಾಂತ-ರೂಪದಲ್ಲಿ",hi:"कर्म — सिद्धांत के रूप में"},
    note:{en:"All embodied beings act unceasingly under the guṇas (BG 3.5). Karma binds when attached, frees when offered.",dev:"सर्वः देही गुणैः नित्यं प्रवर्तते (गी॰ ३।५)। आसक्ति-सहितं कर्म बध्नाति, समर्पितं तु मोचयति।",kn:"ಎಲ್ಲ ದೇಹಿಗಳೂ ಗುಣಗಳಿಂದ ನಿತ್ಯ ಪ್ರವರ್ತಿಸುತ್ತಾರೆ (ಗೀ॰ ೩।೫). ಆಸಕ್ತಿ-ಸಹಿತ ಕರ್ಮ ಬಂಧಿಸುತ್ತದೆ, ಸಮರ್ಪಿತ ಕರ್ಮ ಮುಕ್ತಗೊಳಿಸುತ್ತದೆ.",hi:"सब देहधारी निरंतर गुणों के वश में कर्म करते हैं (गीता ३.५)। आसक्ति होने पर कर्म बाँधता है, अर्पण होने पर मुक्त करता है।"},
    refs:'BG 3.5 · 4.17' },
  { id:'svabhava', tier:'tattva',
    en:'Svabhāva', dev:'स्वभाव', kn:'ಸ್ವಭಾವ',
    title:{en:'Innate nature',dev:"स्वभावः — सहज-प्रकृतिः",kn:"ಸ್ವಭಾವ — ಸಹಜ-ಪ್ರಕೃತಿ",hi:"स्वभाव — अंतर्निहित प्रकृति"},
    note:{en:"Each jīva has a beginningless intrinsic nature (sva-rūpa-yogyatā in Madhva). Determines varṇa, capacities, and ultimate destination.",dev:"प्रत्येक-जीवस्य अनादिः सहजः स्वभावः (मध्व-मते स्वरूप-योग्यता)। वर्णं सामर्थ्यं अन्तिम-गतिं च निर्धारयति।",kn:"ಪ್ರತಿ ಜೀವದ ಅನಾದಿ ಸಹಜ ಸ್ವಭಾವ (ಮಧ್ವ-ಮತದಲ್ಲಿ ಸ್ವರೂಪ-ಯೋಗ್ಯತಾ). ವರ್ಣ, ಸಾಮರ್ಥ್ಯ ಮತ್ತು ಅಂತಿಮ ಗತಿಯನ್ನು ನಿರ್ಧರಿಸುತ್ತದೆ.",hi:"हर जीव की अनादि अंतर्निहित प्रकृति (मध्व में ‘स्वरूप-योग्यता’)। यह वर्ण, सामर्थ्य और अंतिम गति निर्धारित करती है।"},
    refs:'BG 5.14 · 8.3 · 18.41',
    madhva:{en:'Sva-rūpa-yogyatā is eternal — explains tri-vidha jīva (mukti / nitya-saṃsārin / tamoyogya).',dev:"स्वरूप-योग्यता नित्या — त्रिविध-जीव-व्यवस्थां (मुक्ति-योग्य / नित्य-संसारिणः / तमोयोग्यः) व्याख्याति।",kn:"ಸ್ವರೂಪ-ಯೋಗ್ಯತೆ ನಿತ್ಯ — ತ್ರಿವಿಧ-ಜೀವ-ವ್ಯವಸ್ಥೆಯನ್ನು (ಮುಕ್ತಿ-ಯೋಗ್ಯ / ನಿತ್ಯ-ಸಂಸಾರಿ / ತಮೋಯೋಗ್ಯ) ವ್ಯಾಖ್ಯಾನಿಸುತ್ತದೆ.",hi:"स्वरूप-योग्यता नित्य है — त्रिविध जीव (मुक्ति-योग्य / नित्य-संसारी / तमोयोग्य) का स्पष्टीकरण।"} },
  { id:'aksharam_param_brahma', tier:'tattva',
    en:'Akṣaraṃ Brahma', dev:'अक्षरं ब्रह्म', kn:'ಅಕ್ಷರಂ ಬ್ರಹ್ಮ',
    title:{en:'The imperishable Brahman',dev:"अक्षरं ब्रह्म — परम-अक्षरम्",kn:"ಅಕ್ಷರಂ ಬ್ರಹ್ಮ — ಪರಮ ಅಕ್ಷರ",hi:"अक्षर परब्रह्म"},
    note:{en:"'tad akṣaraṃ paramaṃ brahma' — the supreme imperishable, designated as Brahman; identifiable with Hari in His akṣara aspect.",dev:"\"तद् अक्षरं परमं ब्रह्म\" — परमं अक्षरं ब्रह्म-शब्दाभिधेयम्, हरेः अक्षर-स्वरूपेण अभिन्नम्।",kn:"\"ತದ್ ಅಕ್ಷರಂ ಪರಮಂ ಬ್ರಹ್ಮ\" — ಪರಮ ಅಕ್ಷರ ಬ್ರಹ್ಮ-ಶಬ್ದದಿಂದ ಅಭಿಧೇಯ, ಹರಿಯ ಅಕ್ಷರ-ಸ್ವರೂಪದೊಡನೆ ಅಭಿನ್ನ.",hi:"‘तद् अक्षरं परमं ब्रह्म’ — सर्वोच्च अक्षर, ब्रह्म कहा गया; हरि के अक्षर पक्ष से अभिन्न।"},
    refs:'BG 8.3 · 8.21' },

  /* ---------------- Kṣetra-Kṣetrajña (8) ---------------- */
  { id:'kshetra_field', tier:'kshetra',
    en:'Kṣetra', dev:'क्षेत्र', kn:'ಕ್ಷೇತ್ರ',
    title:{en:'The field (body)',dev:"क्षेत्रम् — शरीरम्",kn:"ಕ್ಷೇತ್ರ — ಶರೀರ",hi:"क्षेत्र — शरीर"},
    note:{en:"This body, with its 24 elements (mahābhūtas, ahaṅkāra, buddhi, avyakta, indriyas, mind, viṣayas, will, dveṣa, sukha, duḥkha, saṅghāta, cetanā, dhṛti).",dev:"इदं शरीरं चतुर्विंशति-तत्त्व-संघातः — महाभूतानि, अहङ्कारः, बुद्धिः, अव्यक्तम्, इन्द्रियाणि, मनः, विषयाः, इच्छा, द्वेषः, सुखं, दुःखं, सङ्घातः, चेतना, धृतिः।",kn:"ಈ ಶರೀರವು ಇಪ್ಪತ್ತನಾಲ್ಕು ತತ್ತ್ವಗಳ ಸಂಘಾತ — ಮಹಾಭೂತಗಳು, ಅಹಂಕಾರ, ಬುದ್ಧಿ, ಅವ್ಯಕ್ತ, ಇಂದ್ರಿಯಗಳು, ಮನಸ್ಸು, ವಿಷಯಗಳು, ಇಚ್ಛಾ, ದ್ವೇಷ, ಸುಖ, ದುಃಖ, ಸಂಘಾತ, ಚೇತನಾ, ಧೃತಿ.",hi:"यह शरीर अपने २४ तत्त्वों (महाभूत, अहंकार, बुद्धि, अव्यक्त, इंद्रियाँ, मन, विषय, इच्छा, द्वेष, सुख, दुख आदि) सहित — गीता १३.१–६ में ‘क्षेत्र’ है।"},
    refs:'BG 13.1 · 13.5–6' },
  { id:'kshetrajna', tier:'kshetra',
    en:'Kṣetrajña', dev:'क्षेत्रज्ञ', kn:'ಕ್ಷೇತ್ರಜ್ಞ',
    title:{en:'The field-knower',dev:"क्षेत्रज्ञः — क्षेत्र-वेत्ता",kn:"ಕ್ಷೇತ್ರಜ್ಞ — ಕ್ಷೇತ್ರ-ವೇತ್ತ",hi:"क्षेत्रज्ञ — शरीर का ज्ञाता"},
    note:{en:"The witness who knows the field. Krishna: 'kṣetrajñaṃ cāpi māṃ viddhi sarva-kṣetreṣu bhārata' — Hari is the highest kṣetrajña.",dev:"क्षेत्रं वेत्ति यः सः क्षेत्रज्ञः। कृष्ण-वचनम् — \"क्षेत्रज्ञं चापि मां विद्धि सर्व-क्षेत्रेषु भारत\" — हरिः परमः क्षेत्रज्ञः।",kn:"ಕ್ಷೇತ್ರವನ್ನು ಬಲ್ಲವನು ಕ್ಷೇತ್ರಜ್ಞ. ಕೃಷ್ಣ-ವಚನ — \"ಕ್ಷೇತ್ರಜ್ಞಂ ಚಾಪಿ ಮಾಂ ವಿದ್ಧಿ ಸರ್ವ-ಕ್ಷೇತ್ರೇಷು ಭಾರತ\" — ಹರಿಯೇ ಪರಮ ಕ್ಷೇತ್ರಜ್ಞ.",hi:"क्षेत्र को जानने वाला साक्षी। कृष्ण कहते हैं: ‘क्षेत्रज्ञं चापि मां विद्धि सर्व-क्षेत्रेषु भारत’ — सर्व क्षेत्रों में हरि ही परम क्षेत्रज्ञ।"},
    refs:'BG 13.2',
    madhva:{en:'Two kṣetrajñas: jīva (limited knower) and Hari (universal knower). Never identical.',dev:"द्वौ क्षेत्रज्ञौ — जीवः (परिमित-ज्ञाता) हरिः च (सार्वत्रिक-ज्ञाता)। कदापि अभिन्नौ न।",kn:"ಎರಡು ಕ್ಷೇತ್ರಜ್ಞರು — ಜೀವ (ಪರಿಮಿತ-ಜ್ಞಾತೃ) ಮತ್ತು ಹರಿ (ಸಾರ್ವತ್ರಿಕ-ಜ್ಞಾತೃ). ಎಂದಿಗೂ ಅಭಿನ್ನರಲ್ಲ.",hi:"दो क्षेत्रज्ञ हैं: जीव (सीमित ज्ञाता) और हरि (सर्व-ज्ञाता)। दोनों कभी एक नहीं।"} },
  { id:'mahabhutas', tier:'kshetra',
    en:'Mahābhūtas', dev:'महाभूतानि', kn:'ಮಹಾಭೂತಗಳು',
    title:{en:'The five gross elements',dev:"महाभूतानि — पञ्च-स्थूल-तत्त्वानि",kn:"ಮಹಾಭೂತಗಳು — ಐದು ಸ್ಥೂಲ ತತ್ತ್ವಗಳು",hi:"पाँच महाभूत"},
    note:{en:"Earth, water, fire, air, ether — first five of the 24 kṣetra constituents.",dev:"पृथिवी, अप्, तेजः, वायुः, आकाशः — चतुर्विंशति-क्षेत्र-तत्त्वेषु प्रथमानि पञ्च।",kn:"ಪೃಥಿವೀ, ಆಪ್, ತೇಜ, ವಾಯು, ಆಕಾಶ — ಇಪ್ಪತ್ತನಾಲ್ಕು ಕ್ಷೇತ್ರ-ತತ್ತ್ವಗಳಲ್ಲಿ ಮೊದಲ ಐದು.",hi:"पृथ्वी, जल, अग्नि, वायु, आकाश — २४ क्षेत्र-घटकों में पहले पाँच।"},
    refs:'BG 13.5' },
  { id:'avyakta', tier:'kshetra',
    en:'Avyakta', dev:'अव्यक्त', kn:'ಅವ್ಯಕ್ತ',
    title:{en:'The unmanifest',dev:"अव्यक्तम् — मूल-प्रकृतिः",kn:"ಅವ್ಯಕ್ತ — ಮೂಲ-ಪ್ರಕೃತಿ",hi:"अव्यक्त"},
    note:{en:"Mūla-prakṛti before evolutes. From it emerge mahat, ahaṅkāra, and the tanmātras.",dev:"विकार-पूर्ववर्ती मूल-प्रकृतिः। ततः महान्, अहङ्कारः, तन्मात्राणि च प्रवर्तन्ते।",kn:"ವಿಕಾರಗಳಿಗೆ ಮೊದಲಿನ ಮೂಲ-ಪ್ರಕೃತಿ. ಅದರಿಂದ ಮಹತ್, ಅಹಂಕಾರ ಮತ್ತು ತನ್ಮಾತ್ರಗಳು ಪ್ರವರ್ತಿಸುತ್ತವೆ.",hi:"विकास से पहले की मूल प्रकृति। इसी से महत्, अहंकार और तन्मात्राएँ निकलती हैं।"},
    refs:'BG 13.5 · 8.18' },
  { id:'indriyas', tier:'kshetra',
    en:'Indriyas', dev:'इन्द्रियाणि', kn:'ಇಂದ್ರಿಯಗಳು',
    title:{en:'The eleven senses',dev:"इन्द्रियाणि — एकादश-इन्द्रियाणि",kn:"ಇಂದ್ರಿಯಗಳು — ಹನ್ನೊಂದು ಇಂದ್ರಿಯಗಳು",hi:"ग्यारह इंद्रियाँ"},
    note:{en:"Five jñānendriyas (eye/ear/nose/skin/tongue), five karmendriyas (voice/hand/foot/anus/genitals), and manas as the eleventh.",dev:"पञ्च ज्ञानेन्द्रियाणि (चक्षुः, श्रोत्रं, घ्राणं, त्वक्, रसना), पञ्च कर्मेन्द्रियाणि (वाक्, पाणी, पादौ, पायुः, उपस्थः), मनश्च एकादशं — एवं एकादश इन्द्रियाणि।",kn:"ಐದು ಜ್ಞಾನೇಂದ್ರಿಯಗಳು (ಚಕ್ಷುಸ್, ಶ್ರೋತ್ರ, ಘ್ರಾಣ, ತ್ವಕ್, ರಸನಾ), ಐದು ಕರ್ಮೇಂದ್ರಿಯಗಳು (ವಾಕ್, ಪಾಣಿ, ಪಾದ, ಪಾಯು, ಉಪಸ್ಥ), ಮತ್ತು ಹನ್ನೊಂದನೆಯದು ಮನಸ್ಸು — ಹೀಗೆ ಹನ್ನೊಂದು ಇಂದ್ರಿಯಗಳು.",hi:"पाँच ज्ञानेंद्रियाँ (आँख/कान/नाक/त्वचा/जीभ), पाँच कर्मेंद्रियाँ (वाक्/हाथ/पैर/गुदा/उपस्थ), और मन — मिलाकर ग्यारह।"},
    refs:'BG 13.6 · 15.7' },
  { id:'icchā_dveṣa', tier:'kshetra',
    en:'Icchā–Dveṣa', dev:'इच्छा-द्वेष', kn:'ಇಚ್ಛಾ-ದ್ವೇಷ',
    title:{en:'Desire and aversion',dev:"इच्छा-द्वेषौ — राग-विरागौ",kn:"ಇಚ್ಛಾ-ದ್ವೇಷ — ರಾಗ-ವಿರಾಗ",hi:"इच्छा-द्वेष — राग और विराग"},
    note:{en:"Listed among kṣetra-vikāras: liking and disliking — the affective pair from which most karma issues.",dev:"क्षेत्र-विकारेषु परिगणितौ — रुचिः अरुचिश्च। प्रायः सर्व-कर्मणः उत्थापक-द्वन्द्वम्।",kn:"ಕ್ಷೇತ್ರ-ವಿಕಾರಗಳಲ್ಲಿ ಪರಿಗಣಿತ — ಇಷ್ಟ ಮತ್ತು ಅನಿಷ್ಟ. ಬಹುತೇಕ ಎಲ್ಲ ಕರ್ಮಗಳ ಉತ್ಥಾಪಕ ದ್ವಂದ್ವ.",hi:"क्षेत्र-विकारों में गिने गए — पसंद और नापसंद। प्रायः सब कर्म इसी द्वंद्व से उत्पन्न होते हैं।"},
    refs:'BG 13.6 · 7.27' },
  { id:'sanghata_cetana_dhrti', tier:'kshetra',
    en:'Saṅghāta-Cetanā-Dhṛti', dev:'सङ्घात-चेतना-धृति', kn:'ಸಂಘಾತ-ಚೇತನಾ-ಧೃತಿ',
    title:{en:'Aggregate, consciousness, fortitude',dev:"सङ्घात-चेतना-धृतयः",kn:"ಸಂಘಾತ-ಚೇತನಾ-ಧೃತಿಗಳು",hi:"संघात, चेतना, धृति"},
    note:{en:"Three subtle vikāras of the kṣetra — bodily aggregate, vital consciousness, sustaining will. Distinguish jīva from inert kṣetra.",dev:"क्षेत्रस्य त्रयः सूक्ष्म-विकाराः — शरीर-सङ्घातः, प्राण-चेतना, धारक-धृतिः। एते जीवं जड-क्षेत्रात् व्यवच्छिन्दन्ति।",kn:"ಕ್ಷೇತ್ರದ ಮೂರು ಸೂಕ್ಷ್ಮ ವಿಕಾರಗಳು — ಶರೀರ-ಸಂಘಾತ, ಪ್ರಾಣ-ಚೇತನಾ, ಧಾರಕ-ಧೃತಿ. ಇವು ಜೀವವನ್ನು ಜಡ-ಕ್ಷೇತ್ರದಿಂದ ವ್ಯವಚ್ಛೇದಿಸುತ್ತವೆ.",hi:"क्षेत्र के तीन सूक्ष्म विकार — शारीरिक संघात, प्राण-चेतना, सहायक धृति। ये जीव को जड़ से अलग करते हैं।"},
    refs:'BG 13.6' },
  { id:'kshetra_jnana', tier:'kshetra',
    en:'Kṣetra-jñāna', dev:'क्षेत्र-ज्ञान', kn:'ಕ್ಷೇತ್ರ-ಜ್ಞಾನ',
    title:{en:'Discrimination of field from knower',dev:"क्षेत्र-ज्ञानम् — क्षेत्र-क्षेत्रज्ञ-विवेकः",kn:"ಕ್ಷೇತ್ರ-ಜ್ಞಾನ — ಕ್ಷೇತ್ರ-ಕ್ಷೇತ್ರಜ್ಞ-ವಿವೇಕ",hi:"क्षेत्र और क्षेत्रज्ञ का विवेक"},
    note:{en:"The capstone insight of Ch 13: knowing kṣetra and kṣetrajña as distinct, with Hari as the highest kṣetrajña, is the supreme jñāna.",dev:"त्रयोदशाध्यायस्य निष्कर्ष-ज्ञानम् — क्षेत्रं क्षेत्रज्ञं च भिन्नं विदित्वा हरिं परम-क्षेत्रज्ञं इति ज्ञानम् एव सर्वोत्तमं ज्ञानम्।",kn:"ಹದಿಮೂರನೆಯ ಅಧ್ಯಾಯದ ನಿಷ್ಕರ್ಷ ಜ್ಞಾನ — ಕ್ಷೇತ್ರ ಮತ್ತು ಕ್ಷೇತ್ರಜ್ಞರನ್ನು ಬೇರೆ ಬೇರೆಯಾಗಿ ತಿಳಿದು ಹರಿಯನ್ನು ಪರಮ-ಕ್ಷೇತ್ರಜ್ಞ ಎಂದು ತಿಳಿಯುವುದೇ ಸರ್ವೋತ್ತಮ ಜ್ಞಾನ.",hi:"तेरहवें अध्याय की चरम अंतर्दृष्टि: क्षेत्र और क्षेत्रज्ञ को अलग जानना, और हरि को परम क्षेत्रज्ञ मानना — यही सर्वोच्च ज्ञान।"},
    refs:'BG 13.2 · 13.34' },

  /* ---------------- Guṇa (8) ---------------- */
  { id:'sattva', tier:'guna',
    en:'Sattva', dev:'सत्त्व', kn:'ಸತ್ತ್ವ',
    title:{en:'Mode of clarity',dev:"प्रकाशस्य गुणः",kn:"ಪ್ರಕಾಶಸ್ಯ ಗುಣಃ",hi:"सत्त्व — प्रकाश का गुण"},
    note:{en:"Light, luminous, healthful — binds the jīva through attachment to happiness and knowledge. Predominates in the wise.",dev:"लघु, प्रकाशकम्, अनामयम् — सुखसङ्गेन ज्ञानसङ्गेन च जीवं बध्नाति। विवेकिषु प्रबलः।",kn:"ಲಘು, ಪ್ರಕಾಶಕಂ, ಅನಾಮಯಮ್ — ಸುಖಸಂಗೇನ ಜ್ಞಾನಸಂಗೇನ ಚ ಜೀವಂ ಬಧ್ನಾತಿ। ವಿವೇಕಿಷು ಪ್ರಬಲಃ।",hi:"हल्का, प्रकाशमय, स्वस्थ — जीव को सुख और ज्ञान की आसक्ति से बाँधता है। विद्वानों में प्रमुख।"},
    refs:'BG 14.6 · 14.11' },
  { id:'rajas', tier:'guna',
    en:'Rajas', dev:'रजस्', kn:'ರಜಸ್',
    title:{en:'Mode of passion',dev:"रागस्य गुणः",kn:"ರಾಗಸ್ಯ ಗುಣಃ",hi:"रजस् — रागात्मक गुण"},
    note:{en:"Of the nature of craving and attachment; born of thirst (tṛṣṇā) and clinging (saṅga). Drives ceaseless action.",dev:"रागात्मकं सङ्गात्मकं — तृष्णासङ्गयोः समुद्भवम्। अनवरतकर्मप्रवर्तकम्।",kn:"ರಾಗಾತ್ಮಕಂ ಸಂಗಾತ್ಮಕಂ — ತೃಷ್ಣಾಸಂಗಯೋಃ ಸಮುದ್ಭವಮ್। ಅನವರತಕರ್ಮಪ್ರವರ್ತಕಮ್।",hi:"लालसा और आसक्ति की प्रकृति का; तृष्णा और संग से उत्पन्न। निरंतर कर्म की प्रेरणा देता है।"},
    refs:'BG 14.7 · 14.12' },
  { id:'tamas', tier:'guna',
    en:'Tamas', dev:'तमस्', kn:'ತಮಸ್',
    title:{en:'Mode of darkness',dev:"अन्धकारस्य गुणः",kn:"ಅಂಧಕಾರಸ್ಯ ಗುಣಃ",hi:"तमस् — अंधकार का गुण"},
    note:{en:"Born of ajñāna — deludes all embodied beings; binds through negligence, indolence, sleep.",dev:"अज्ञानजं — सर्वान् देहिनो मोहयति; प्रमादालस्यनिद्राभिर्बध्नाति।",kn:"ಅಜ್ಞಾನಜಂ — ಸರ್ವಾನ್ ದೇಹಿನೋ ಮೋಹಯತಿ; ಪ್ರಮಾದಾಲಸ್ಯನಿದ್ರಾಭಿರ್ಬಧ್ನಾತಿ।",hi:"अज्ञान से जन्मा — सब देहधारियों को मोह में डालता है; प्रमाद, आलस्य और नींद से बाँधता है।"},
    refs:'BG 14.8 · 14.13' },
  { id:'gunatita', tier:'guna',
    en:'Guṇātīta', dev:'गुणातीत', kn:'ಗುಣಾತೀತ',
    title:{en:'Beyond the guṇas',dev:"गुणानामतीतः",kn:"ಗುಣಾನಾಮತೀತಃ",hi:"गुणातीत"},
    note:{en:"One in whom no guṇa-impulse arises by attachment; treats friend and foe alike; abandons all undertakings.",dev:"यस्मिन् सङ्गाद् गुणप्रवृत्तिर्न जायते; मित्रारिषु समः; सर्वारम्भपरित्यागी।",kn:"ಯಸ್ಮಿನ್ ಸಂಗಾದ್ ಗುಣಪ್ರವೃತ್ತಿರ್ನ ಜಾಯತೇ; ಮಿತ್ರಾರಿಷು ಸಮಃ; ಸರ್ವಾರಂಭಪರಿತ್ಯಾಗೀ।",hi:"जिसमें आसक्ति से कोई गुण-आवेग नहीं उठता; जो मित्र और शत्रु को समान देखता है; जो सभी प्रयासों को त्याग देता है।"},
    refs:'BG 14.22–25' },
  { id:'sattvika_jnana', tier:'guna',
    en:'Sāttvika jñāna', dev:'सात्त्विकं ज्ञानम्', kn:'ಸಾತ್ತ್ವಿಕ ಜ್ಞಾನ',
    title:{en:'Knowledge in sattva',dev:"सात्त्विकं ज्ञानम्",kn:"ಸಾತ್ತ್ವಿಕ ಜ್ಞಾನ",hi:"सात्त्विक ज्ञान"},
    note:{en:"That by which one sees the one imperishable being in all beings, undivided in the divided — the highest knowledge.",dev:"येन सर्वभूतेषु एकमेव अव्ययं भावम् ईक्षते, विभक्तेषु अविभक्तम् — तत् सात्त्विकं ज्ञानं परमम्।",kn:"ಯೇನ ಸರ್ವಭೂತೇಷು ಏಕಮೇವ ಅವ್ಯಯಂ ಭಾವಮ್ ಈಕ್ಷತೇ, ವಿಭಕ್ತೇಷು ಅವಿಭಕ್ತಮ್ — ತತ್ ಸಾತ್ತ್ವಿಕಂ ಜ್ಞಾನಂ ಪರಮಮ್।",hi:"जिसके द्वारा एक अविनाशी सत्ता को सब प्राणियों में, विभाजितों में अविभाजित देखा जाता है — सर्वोच्च ज्ञान।"},
    refs:'BG 18.20' },
  { id:'sattvika_karma', tier:'guna',
    en:'Sāttvika karma', dev:'सात्त्विकं कर्म', kn:'ಸಾತ್ತ್ವಿಕ ಕರ್ಮ',
    title:{en:'Action in sattva',dev:"सात्त्विकं कर्म",kn:"ಸಾತ್ತ್ವಿಕ ಕರ್ಮ",hi:"सात्त्विक कर्म"},
    note:{en:"Action prescribed, without attachment, done without rāga-dveṣa, by one not desiring its fruit.",dev:"नियतं कर्म, सङ्गरहितं, अरागद्वेषतः कृतम्, अफलप्रेप्सुना अनुष्ठितम् — तत् सात्त्विकम्।",kn:"ನಿಯತಂ ಕರ್ಮ, ಸಂಗರಹಿತಂ, ಅರಾಗದ್ವೇಷತಃ ಕೃತಮ್, ಅಫಲಪ್ರೇಪ್ಸುನಾ ಅನುಷ್ಠಿತಮ್ — ತತ್ ಸಾತ್ತ್ವಿಕಮ್।",hi:"नियत कर्म, आसक्ति रहित, राग-द्वेष के बिना, फल की इच्छा न रखने वाले के द्वारा।"},
    refs:'BG 18.23' },
  { id:'sattvika_karta', tier:'guna',
    en:'Sāttvika kartā', dev:'सात्त्विकः कर्ता', kn:'ಸಾತ್ತ್ವಿಕ ಕರ್ತಾ',
    title:{en:'The agent in sattva',dev:"सात्त्विकः कर्ता",kn:"ಸಾತ್ತ್ವಿಕ ಕರ್ತಾ",hi:"सात्त्विक कर्ता"},
    note:{en:"Free from attachment, non-egoistic, full of fortitude and zeal, unmoved by success or failure.",dev:"सङ्गरहितः, अनहंवादी, धृत्युत्साहसमन्वितः, सिद्ध्यसिद्ध्योर्निर्विकारः।",kn:"ಸಂಗರಹಿತಃ, ಅನಹಂವಾದೀ, ಧೃತ್ಯುತ್ಸಾಹಸಮನ್ವಿತಃ, ಸಿದ್ಧ್ಯಸಿದ್ಧ್ಯೋರ್ನಿರ್ವಿಕಾರಃ।",hi:"आसक्ति से मुक्त, अहंकार रहित, धैर्य और उत्साह से भरा, सफलता-असफलता से अविचलित।"},
    refs:'BG 18.26' },
  { id:'triguna_atita', tier:'guna',
    en:'Trairguṇya-viṣayā vedāḥ', dev:'त्रैगुण्यविषया वेदाः', kn:'ತ್ರೈಗುಣ್ಯವಿಷಯಾ ವೇದಾಃ',
    title:{en:'Vedas\' guṇa-domain & beyond',dev:"त्रैगुण्यविषयो वेदः",kn:"ತ್ರೈಗುಣ್ಯವಿಷಯೋ ವೇದಃ",hi:"त्रिगुणातीत — वेदों से परे"},
    note:{en:"Krishna: 'be free of the three guṇas, free of the pairs of opposites, established in pure sattva, indifferent to possessions, self-possessed.'",dev:"श्रीकृष्ण: 'निस्त्रैगुण्यो भव, निर्द्वन्द्वः, नित्यसत्त्वस्थः, निर्योगक्षेमः, आत्मवान् भव।' (गी॰ २।४५)",kn:"ಶ್ರೀಕೃಷ್ಣ: 'ನಿಸ್ತ್ರೈಗುಣ್ಯೋ ಭವ, ನಿರ್ದ್ವಂದ್ವಃ, ನಿತ್ಯಸತ್ತ್ವಸ್ಥಃ, ನಿರ್ಯೋಗಕ್ಷೇಮಃ, ಆತ್ಮವಾನ್ ಭವ।' (ಗೀ॰ ೨।೪೫)",hi:"कृष्ण: ‘तीन गुणों से मुक्त हो, द्वंद्वों से मुक्त हो, शुद्ध सत्त्व में स्थित, संपत्ति-संग्रह के प्रति उदासीन’ (गीता २.४५)। यह आगे आने वाले गुणातीत का बीज है।"},
    refs:'BG 2.45' },

  /* — Threefold by guṇa: faith & food (Ch 17) — */
  { id:'sattvika_shraddha', tier:'guna',
    en:'Sāttvika śraddhā', dev:'सात्त्विकी श्रद्धा', kn:'ಸಾತ್ತ್ವಿಕೀ ಶ್ರದ್ಧಾ',
    title:{en:'Faith in sattva',dev:"सात्त्विकी श्रद्धा",kn:"ಸಾತ್ತ್ವಿಕೀ ಶ್ರದ್ಧಾ",hi:"सात्त्विक श्रद्धा"},
    note:{en:"Faith directed at the devas — the highest of the three. Whatever a person's faith is, that they are.",dev:"देवानुद्दिश्य प्रवृत्ता — त्रिविधश्रद्धासु उत्तमा। यो यच्छ्रद्धः स एव सः।",kn:"ದೇವಾನುದ್ದಿಶ್ಯ ಪ್ರವೃತ್ತಾ — ತ್ರಿವಿಧಶ್ರದ್ಧಾಸು ಉತ್ತಮಾ। ಯೋ ಯಚ್ಛ್ರದ್ಧಃ ಸ ಏವ ಸಃ।",hi:"देवताओं की ओर निर्देशित श्रद्धा — तीनों में सर्वोच्च। जिस मनुष्य की जैसी श्रद्धा हो, वह वैसा ही होता है।"},
    refs:'BG 17.2–4' },
  { id:'rajasa_shraddha', tier:'guna',
    en:'Rājasa śraddhā', dev:'राजसी श्रद्धा', kn:'ರಾಜಸೀ ಶ್ರದ್ಧಾ',
    title:{en:'Faith in rajas',dev:"राजसी श्रद्धा",kn:"ರಾಜಸೀ ಶ್ರದ್ಧಾ",hi:"राजसी श्रद्धा"},
    note:{en:"Faith directed at yakṣas and rakṣas — driven by the impulse to power and acquisition.",dev:"यक्षरक्षःसु प्रवृत्ता श्रद्धा — ऐश्वर्यलाभेच्छाप्रेरिता।",kn:"ಯಕ್ಷರಕ್ಷಃಸು ಪ್ರವೃತ್ತಾ ಶ್ರದ್ಧಾ — ಐಶ್ವರ್ಯಲಾಭೇಚ್ಛಾಪ್ರೇರಿತಾ।",hi:"यक्षों और राक्षसों की ओर निर्देशित श्रद्धा — शक्ति और प्राप्ति की आवेग से प्रेरित।"},
    refs:'BG 17.4' },
  { id:'tamasa_shraddha', tier:'guna',
    en:'Tāmasa śraddhā', dev:'तामसी श्रद्धा', kn:'ತಾಮಸೀ ಶ್ರದ್ಧಾ',
    title:{en:'Faith in tamas',dev:"तामसी श्रद्धा",kn:"ತಾಮಸೀ ಶ್ರದ್ಧಾ",hi:"तामसी श्रद्धा"},
    note:{en:"Faith directed at ghosts and the hosts of bhūtas — clouded by ignorance, indifferent to the dharma the Vedas teach.",dev:"प्रेतान् भूतगणांश्च उद्दिश्य प्रवृत्ता — अज्ञानावृता, वैदिकधर्मविमुखी।",kn:"ಪ್ರೇತಾನ್ ಭೂತಗಣಾಂಶ್ಚ ಉದ್ದಿಶ್ಯ ಪ್ರವೃತ್ತಾ — ಅಜ್ಞಾನಾವೃತಾ, ವೈದಿಕಧರ್ಮವಿಮುಖೀ।",hi:"भूत-प्रेतों और भूतगणों की ओर निर्देशित श्रद्धा — अज्ञान से धुँधली, वेद की धर्म-शिक्षा से उदासीन।"},
    refs:'BG 17.4' },
  { id:'sattvika_ahara', tier:'guna',
    en:'Sāttvika āhāra', dev:'सात्त्विक आहार', kn:'ಸಾತ್ತ್ವಿಕ ಆಹಾರ',
    title:{en:'Food in sattva',dev:"सात्त्विक आहारः",kn:"ಸಾತ್ತ್ವಿಕ ಆಹಾರಃ",hi:"सात्त्विक आहार"},
    note:{en:"Foods that increase life, vitality, strength, health, happiness — juicy, soft, nourishing. The threefold āhāra-vargas of Ch 17.7-10 carry their guṇa into the eater.",dev:"आयुःसत्त्वबलारोग्यसुखप्रीतिविवर्धनाः — रस्याः, स्निग्धाः, स्थिराः, हृद्याः। गी॰ १७।७–१० उक्ता त्रिविधाहारवर्गाः स्वगुणं भोक्तरि सञ्चारयन्ति।",kn:"ಆಯುಃಸತ್ತ್ವಬಲಾರೋಗ್ಯಸುಖಪ್ರೀತಿವಿವರ್ಧನಾಃ — ರಸ್ಯಾಃ, ಸ್ನಿಗ್ಧಾಃ, ಸ್ಥಿರಾಃ, ಹೃದ್ಯಾಃ। ಗೀ॰ ೧೭।೭–೧೦ ಉಕ್ತಾ ತ್ರಿವಿಧಾಹಾರವರ್ಗಾಃ ಸ್ವಗುಣಂ ಭೋಕ್ತರಿ ಸಂಚಾರಯಂತಿ।",hi:"आयु, सत्त्व, बल, स्वास्थ्य, सुख बढ़ाने वाले आहार — रसमय, स्निग्ध, स्थिर, हृदय को प्रिय। गीता १७.७–१० के तीन आहार-वर्गों में सर्वोच्च।"},
    refs:'BG 17.7–10' },

  /* ---------------- Yoga (9) ---------------- */
  { id:'karma_yoga', tier:'yoga',
    en:'Karma-yoga', dev:'कर्मयोग', kn:'ಕರ್ಮಯೋಗ',
    title:{en:'Path of selfless action',dev:"निष्कामकर्मणो मार्गः",kn:"ನಿಷ್ಕಾಮಕರ್ಮಣೋ ಮಾರ್ಗಃ",hi:"कर्म-योग — निष्काम कर्म का मार्ग"},
    note:{en:"Doing one's duty as an offering to Hari, surrendering all fruits. The path Krishna prescribes most often to Arjuna.",dev:"स्वकीयं कर्तव्यं हरये अर्पणं कृत्वा, सर्वफलं तस्मै समर्प्य आचरणम्। श्रीकृष्णस्य अर्जुनाय प्रमुखोपदेशः।",kn:"ಸ್ವಕೀಯಂ ಕರ್ತವ್ಯಂ ಹರಯೇ ಅರ್ಪಣಂ ಕೃತ್ವಾ, ಸರ್ವಫಲಂ ತಸ್ಮೈ ಸಮರ್ಪ್ಯ ಆಚರಣಮ್। ಶ್ರೀಕೃಷ್ಣಸ್ಯ ಅರ್ಜುನಾಯ ಪ್ರಮುಖೋಪದೇಶಃ।",hi:"अपने कर्तव्य को हरि को अर्पण करते हुए, फल का त्याग करके निभाना। यह वह मार्ग है जो कृष्ण अर्जुन को सबसे अधिक बार सुझाते हैं।"},
    refs:'BG 3.3 · 3.19 · 5.2' },
  { id:'jnana_yoga', tier:'yoga',
    en:'Jñāna-yoga', dev:'ज्ञानयोग', kn:'ಜ್ಞಾನಯೋಗ',
    title:{en:'Path of discriminative knowledge',dev:"विवेकज्ञानमार्गः",kn:"ವಿವೇಕಜ್ಞಾನಮಾರ್ಗಃ",hi:"ज्ञान-योग — विवेक का मार्ग"},
    note:{en:"Knowing Hari as supreme, jīva as His aṃśa, world as His dependent reality. The means for the qualified.",dev:"हरिं परं ज्ञात्वा, जीवं तदंशं, जगच्च तदधीनं सत्यं ज्ञात्वा प्रवृत्तिः। अधिकारिणां साधनम्।",kn:"ಹರಿಂ ಪರಂ ಜ್ಞಾತ್ವಾ, ಜೀವಂ ತದಂಶಂ, ಜಗಚ್ಚ ತದಧೀನಂ ಸತ್ಯಂ ಜ್ಞಾತ್ವಾ ಪ್ರವೃತ್ತಿಃ। ಅಧಿಕಾರಿಣಾಂ ಸಾಧನಮ್।",hi:"हरि को परम जानना, जीव को उनका अंश मानना, जगत को उनकी निर्भर वास्तविकता समझना। अधिकारी साधक के लिए यही साधन।"},
    refs:'BG 3.3 · 4.33–38' },
  { id:'bhakti_yoga', tier:'yoga',
    en:'Bhakti-yoga', dev:'भक्तियोग', kn:'ಭಕ್ತಿಯೋಗ',
    title:{en:'Path of devotion',dev:"भक्तिमार्गः",kn:"ಭಕ್ತಿಮಾರ್ಗಃ",hi:"भक्ति-योग — प्रेम का मार्ग"},
    note:{en:"Loving knowledge of Hari that exceeds all other knowledge. For Madhva, bhakti is sthira-jñāna-pūrvika-prema — the indispensable cause of mokṣa.",dev:"हरौ प्रेमपूर्वकं ज्ञानं — सर्वज्ञानातिशायि। मध्वमते भक्तिः स्थिरज्ञानपूर्विकाप्रेमरूपा, मोक्षस्य अनिवार्यः हेतुः।",kn:"ಹರೌ ಪ್ರೇಮಪೂರ್ವಕಂ ಜ್ಞಾನಂ — ಸರ್ವಜ್ಞಾನಾತಿಶಾಯಿ। ಮಧ್ವಮತೇ ಭಕ್ತಿಃ ಸ್ಥಿರಜ್ಞಾನಪೂರ್ವಿಕಾಪ್ರೇಮರೂಪಾ, ಮೋಕ್ಷಸ್ಯ ಅನಿವಾರ್ಯಃ ಹೇತುಃ।",hi:"हरि का प्रेममय ज्ञान, जो अन्य सभी ज्ञानों से ऊपर है। मध्व के अनुसार भक्ति ‘स्थिर-ज्ञान-पूर्विका-प्रेम’ है — मोक्ष का अनिवार्य कारण।"},
    refs:'BG 9.22 · 11.54 · 18.55',
    madhva:{en:'Madhva: bhakti is both means and constituent of mokṣa.',dev:"मध्व: भक्तिः मोक्षस्य साधनं तथा स्वरूपाङ्गं च।",kn:"ಮಧ್ವ: ಭಕ್ತಿಃ ಮೋಕ್ಷಸ್ಯ ಸಾಧನಂ ತಥಾ ಸ್ವರೂಪಾಂಗಂ ಚ।",hi:"मध्व: भक्ति मोक्ष का साधन भी है और मोक्ष का अंग भी।"} },
  { id:'dhyana_yoga', tier:'yoga',
    en:'Dhyāna-yoga', dev:'ध्यानयोग', kn:'ಧ್ಯಾನಯೋಗ',
    title:{en:'Path of meditation',dev:"ध्यानमार्गः",kn:"ಧ್ಯಾನಮಾರ್ಗಃ",hi:"ध्यान-योग — एकाग्रता का मार्ग"},
    note:{en:"Seated, body erect and still, senses withdrawn, mind fixed on Hari alone. Ch 6 lays the technique.",dev:"समासीनः, स्थिरकायः, इन्द्रियनिगृहीतः, मनसा हरावेव एकाग्रः। ध्यानप्रक्रिया षष्ठेऽध्याये निरूपिता।",kn:"ಸಮಾಸೀನಃ, ಸ್ಥಿರಕಾಯಃ, ಇಂದ್ರಿಯನಿಗೃಹೀತಃ, ಮನಸಾ ಹರಾವೇವ ಏಕಾಗ್ರಃ। ಧ್ಯಾನಪ್ರಕ್ರಿಯಾ ಷಷ್ಠೇಽಧ್ಯಾಯೇ ನಿರೂಪಿತಾ।",hi:"सीधा बैठकर, शरीर स्थिर, इंद्रियाँ अंतर्मुख, मन केवल हरि पर एकाग्र। छठा अध्याय इसकी प्रक्रिया बताता है।"},
    refs:'BG 6.10–15' },
  { id:'sannyasa_yoga', tier:'yoga',
    en:'Sannyāsa-yoga', dev:'सन्न्यासयोग', kn:'ಸನ್ನ್ಯಾಸಯೋಗ',
    title:{en:'Path of renunciation',dev:"सन्न्यासमार्गः",kn:"ಸನ್ನ್ಯಾಸಮಾರ್ಗಃ",hi:"संन्यास-योग — त्याग का मार्ग"},
    note:{en:"Not abandoning action (which is impossible while embodied), but abandoning attachment to the fruit. Identical in goal to karma-yoga.",dev:"कर्मणस्त्यागो न — देहधारणे तदसम्भवात्; अपि तु फलसङ्गत्यागः। कर्मयोगेन समानफलः।",kn:"ಕರ್ಮಣಸ್ತ್ಯಾಗೋ ನ — ದೇಹಧಾರಣೇ ತದಸಂಭವಾತ್; ಅಪಿ ತು ಫಲಸಂಗತ್ಯಾಗಃ। ಕರ್ಮಯೋಗೇನ ಸಮಾನಫಲಃ।",hi:"कर्म का त्याग नहीं (जो देहधारी के लिए असंभव है), बल्कि फल की आसक्ति का त्याग। लक्ष्य में कर्मयोग के समान।"},
    refs:'BG 5.2 · 6.1–2 · 18.2' },
  { id:'buddhi_yoga', tier:'yoga',
    en:'Buddhi-yoga', dev:'बुद्धियोग', kn:'ಬುದ್ಧಿಯೋಗ',
    title:{en:'Yoga of discriminating intellect',dev:"बुद्धियोगः",kn:"ಬುದ್ಧಿಯೋಗಃ",hi:"बुद्धि-योग — विवेक-बुद्धि का योग"},
    note:{en:"Equipoise of intellect — neither elated by success nor crushed by failure. The interior foundation of karma-yoga.",dev:"सिद्धौ असिद्धौ च बुद्धेः समत्वम् — न सिद्ध्या उत्कर्षः, न असिद्ध्या विषादः। कर्मयोगस्य अन्तरङ्गाधिष्ठानम्।",kn:"ಸಿದ್ಧೌ ಅಸಿದ್ಧೌ ಚ ಬುದ್ಧೇಃ ಸಮತ್ವಮ್ — ನ ಸಿದ್ಧ್ಯಾ ಉತ್ಕರ್ಷಃ, ನ ಅಸಿದ್ಧ್ಯಾ ವಿಷಾದಃ। ಕರ್ಮಯೋಗಸ್ಯ ಅಂತರಂಗಾಧಿಷ್ಠಾನಮ್।",hi:"बुद्धि का समत्व — सफलता पर हर्ष नहीं, असफलता पर खेद नहीं। कर्मयोग की भीतरी आधार-शिला।"},
    refs:'BG 2.49 · 10.10' },
  { id:'abhyasa_vairagya', tier:'yoga',
    en:'Abhyāsa & Vairāgya', dev:'अभ्यास-वैराग्य', kn:'ಅಭ್ಯಾಸ-ವೈರಾಗ್ಯ',
    title:{en:'Practice & dispassion',dev:"अभ्यासवैराग्ये",kn:"ಅಭ್ಯಾಸವೈರಾಗ್ಯೇ",hi:"अभ्यास और वैराग्य"},
    note:{en:"The two wings of yoga — repeated discipline + detachment from sense-objects. Krishna prescribes both to Arjuna.",dev:"योगस्य द्वौ पक्षौ — पुनःपुनः अनुष्ठानम् अभ्यासः, विषयेभ्यो विरक्तिः वैराग्यम्। उभयं श्रीकृष्ण: अर्जुनाय निर्दिशति।",kn:"ಯೋಗಸ್ಯ ದ್ವೌ ಪಕ್ಷೌ — ಪುನಃಪುನಃ ಅನುಷ್ಠಾನಮ್ ಅಭ್ಯಾಸಃ, ವಿಷಯೇಭ್ಯೋ ವಿರಕ್ತಿಃ ವೈರಾಗ್ಯಮ್। ಉಭಯಂ ಶ್ರೀಕೃಷ್ಣ: ಅರ್ಜುನಾಯ ನಿರ್ದಿಶತಿ।",hi:"योग के दो पंख — बार-बार साधना + विषयों से अनासक्ति। कृष्ण अर्जुन को दोनों का परामर्श देते हैं।"},
    refs:'BG 6.35' },
  { id:'samatva', tier:'yoga',
    en:'Samatva', dev:'समत्व', kn:'ಸಮತ್ವ',
    title:{en:'Equanimity as yoga',dev:"समत्वं योगः",kn:"ಸಮತ್ವಂ ಯೋಗಃ",hi:"समत्व — योग की परिभाषा"},
    note:{en:"'samatvaṃ yoga ucyate' — the defining moment of the BG. Yoga is balance of mind in pleasure and pain alike.",dev:"'समत्वं योग उच्यते' — गीतायाः मूललक्षणम्। सुखे दुःखे च मनसः समत्वमेव योगः।",kn:"'ಸಮತ್ವಂ ಯೋಗ ಉಚ್ಯತೇ' — ಗೀತಾಯಾಃ ಮೂಲಲಕ್ಷಣಮ್। ಸುಖೇ ದುಃಖೇ ಚ ಮನಸಃ ಸಮತ್ವಮೇವ ಯೋಗಃ।",hi:"‘समत्वं योग उच्यते’ — गीता का परिभाषक क्षण। योग है सुख और दुख दोनों में मन का संतुलन।"},
    refs:'BG 2.48' },
  { id:'sharanagati', tier:'yoga',
    en:'Śaraṇāgati', dev:'शरणागति', kn:'ಶರಣಾಗತಿ',
    title:{en:'Self-surrender to Hari',dev:"हरौ शरणागतिः",kn:"ಹರೌ ಶರಣಾಗತಿಃ",hi:"शरणागति — हरि के प्रति आत्मसमर्पण"},
    note:{en:"'sarva-dharmān parityajya mām ekaṃ śaraṇaṃ vraja' — the closing teaching. Total taking-of-refuge in Hari, who then absolves all sin.",dev:"'सर्वधर्मान् परित्यज्य मामेकं शरणं व्रज' — गीतायाः चरमोपदेशः। हरिं सर्वशरणं कृत्वा सर्वपापमोचनम्।",kn:"'ಸರ್ವಧರ್ಮಾನ್ ಪರಿತ್ಯಜ್ಯ ಮಾಮೇಕಂ ಶರಣಂ ವ್ರಜ' — ಗೀತಾಯಾಃ ಚರಮೋಪದೇಶಃ। ಹರಿಂ ಸರ್ವಶರಣಂ ಕೃತ್ವಾ ಸರ್ವಪಾಪಮೋಚನಮ್।",hi:"‘सर्व-धर्मान् परित्यज्य मामेकं शरणं व्रज’ — समापन-उपदेश। हरि की पूर्ण शरण, जो फिर सब पापों से छुड़ाते हैं।"},
    refs:'BG 18.66',
    madhva:{en:'Madhva: the carama-śloka — distilled mokṣa-upadeśa.',dev:"मध्व: चरमश्लोकः — मोक्षोपदेशस्य सारः।",kn:"ಮಧ್ವ: ಚರಮಶ್ಲೋಕಃ — ಮೋಕ್ಷೋಪದೇಶಸ್ಯ ಸಾರಃ।",hi:"मध्व: यह चरम-श्लोक है — सर्वथा निचोड़ा हुआ मोक्ष-उपदेश।"} },

  /* ---------------- Sādhanā (9) ---------------- */
  { id:'shraddha', tier:'sadhana',
    en:'Śraddhā', dev:'श्रद्धा', kn:'ಶ್ರದ್ಧಾ',
    title:{en:'Faith',dev:"श्रद्धा",kn:"ಶ್ರದ್ಧಾ",hi:"श्रद्धा"},
    note:{en:"Faith follows one's nature; one is what one's faith is. Threefold by guṇa — sāttvika in gods, rājasa in yakṣas, tāmasa in spirits.",dev:"श्रद्धा स्वभावानुगा — यो यच्छ्रद्धः स एव सः। गुणतस्त्रिविधा — देवेषु सात्त्विकी, यक्षरक्षःसु राजसी, भूतप्रेतेषु तामसी।",kn:"ಶ್ರದ್ಧಾ ಸ್ವಭಾವಾನುಗಾ — ಯೋ ಯಚ್ಛ್ರದ್ಧಃ ಸ ಏವ ಸಃ। ಗುಣತಸ್ತ್ರಿವಿಧಾ — ದೇವೇಷು ಸಾತ್ತ್ವಿಕೀ, ಯಕ್ಷರಕ್ಷಃಸು ರಾಜಸೀ, ಭೂತಪ್ರೇತೇಷು ತಾಮಸೀ।",hi:"श्रद्धा स्वभाव से उठती है; मनुष्य जैसी श्रद्धा रखता है, वैसा ही होता है। गुण के अनुसार तीन — सात्त्विक देवों में, राजसी यक्षों में, तामसी भूतों में।"},
    refs:'BG 17.2–3' },
  { id:'vairagya', tier:'sadhana',
    en:'Vairāgya', dev:'वैराग्य', kn:'ವೈರಾಗ್ಯ',
    title:{en:'Dispassion',dev:"वैराग्यम्",kn:"ವೈರಾಗ್ಯಮ್",hi:"वैराग्य — अनासक्ति"},
    note:{en:"Detachment from sense-objects — not life-rejection but the seeing-through of binding attractions.",dev:"विषयेभ्यो विरक्तिः — न जीवननिषेधः, अपि तु बन्धनप्रदाकर्षणानां विवेकेन दर्शनम्।",kn:"ವಿಷಯೇಭ್ಯೋ ವಿರಕ್ತಿಃ — ನ ಜೀವನನಿಷೇಧಃ, ಅಪಿ ತು ಬಂಧನಪ್ರದಾಕರ್ಷಣಾನಾಂ ವಿವೇಕೇನ ದರ್ಶನಮ್।",hi:"विषयों से अनासक्ति — जीवन का त्याग नहीं, बल्कि बंधन रचने वाले आकर्षणों को ठीक से पहचान लेना।"},
    refs:'BG 6.35 · 13.8–11' },
  { id:'abhyasa', tier:'sadhana',
    en:'Abhyāsa', dev:'अभ्यास', kn:'ಅಭ್ಯಾಸ',
    title:{en:'Repeated practice',dev:"अभ्यासः",kn:"ಅಭ್ಯಾಸಃ",hi:"अभ्यास — पुनः-पुनः साधना"},
    note:{en:"The 'samādhi-abhyāsa' — bringing back the wandering mind, again and again, to Hari.",dev:"समाध्यभ्यासः — चञ्चलं मनः पुनःपुनः निवर्त्य हरौ नियमनम्।",kn:"ಸಮಾಧ್ಯಭ್ಯಾಸಃ — ಚಂಚಲಂ ಮನಃ ಪುನಃಪುನಃ ನಿವರ್ತ್ಯ ಹರೌ ನಿಯಮನಮ್।",hi:"‘समाधि-अभ्यास’ — भटकते मन को बार-बार हरि की ओर वापस लाना।"},
    refs:'BG 6.26 · 12.9' },
  { id:'tapas', tier:'sadhana',
    en:'Tapas', dev:'तपस्', kn:'ತಪಸ್',
    title:{en:'Austerity (3-fold)',dev:"तपः (त्रिविधम्)",kn:"ತಪಃ (ತ್ರಿವಿಧಮ್)",hi:"तपस् — तीन प्रकार का"},
    note:{en:"Tapas of body (worship/cleanliness/celibacy), of speech (truth/kindness/study), of mind (serenity/silence/self-control). All threefold by guṇa.",dev:"देहस्य तपः (पूजा/शौच/ब्रह्मचर्य), वाचिकं (सत्य/प्रिय/स्वाध्याय), मानसिकं (प्रसाद/मौन/आत्मनिग्रह)। त्रयं गुणभेदात् त्रिविधम्।",kn:"ದೇಹಸ್ಯ ತಪಃ (ಪೂಜಾ/ಶೌಚ/ಬ್ರಹ್ಮಚರ್ಯ), ವಾಚಿಕಂ (ಸತ್ಯ/ಪ್ರಿಯ/ಸ್ವಾಧ್ಯಾಯ), ಮಾನಸಿಕಂ (ಪ್ರಸಾದ/ಮೌನ/ಆತ್ಮನಿಗ್ರಹ)। ತ್ರಯಂ ಗುಣಭೇದಾತ್ ತ್ರಿವಿಧಮ್।",hi:"शरीर का तप (पूजा/शुद्धता/ब्रह्मचर्य), वाणी का तप (सत्य/मधुरता/स्वाध्याय), मन का तप (शांति/मौन/आत्म-संयम)। तीनों गुण-भेद से त्रिविध।"},
    refs:'BG 17.14–19' },
  { id:'dana', tier:'sadhana',
    en:'Dāna', dev:'दान', kn:'ದಾನ',
    title:{en:'Giving (3-fold)',dev:"दानम् (त्रिविधम्)",kn:"ದಾನಮ್ (ತ್ರಿವಿಧಮ್)",hi:"दान — तीन प्रकार का"},
    note:{en:"Sāttvika dāna: to the worthy, in proper place and time, without expecting return. Rājasa: with expectation. Tāmasa: in wrong place/time/recipient.",dev:"सात्त्विकं दानम् — पात्रे, देशे काले च, प्रत्युपकाराभावेन दत्तम्। राजसं — प्रत्युपकाराकाङ्क्षया। तामसं — अयोग्यदेशे काले पात्रे च।",kn:"ಸಾತ್ತ್ವಿಕಂ ದಾನಮ್ — ಪಾತ್ರೇ, ದೇಶೇ ಕಾಲೇ ಚ, ಪ್ರತ್ಯುಪಕಾರಾಭಾವೇನ ದತ್ತಮ್। ರಾಜಸಂ — ಪ್ರತ್ಯುಪಕಾರಾಕಾಂಕ್ಷಯಾ। ತಾಮಸಂ — ಅಯೋಗ್ಯದೇಶೇ ಕಾಲೇ ಪಾತ್ರೇ ಚ।",hi:"सात्त्विक दान: योग्य पात्र को, उचित स्थान-काल में, बिना प्रत्युपकार की आशा से। राजसी: प्रत्युपकार की आशा से। तामसी: गलत पात्र/स्थान/काल में।"},
    refs:'BG 17.20–22' },
  { id:'tyaga', tier:'sadhana',
    en:'Tyāga', dev:'त्याग', kn:'ತ್ಯಾಗ',
    title:{en:'Renunciation of fruit',dev:"फलत्यागः",kn:"ಫಲತ್ಯಾಗಃ",hi:"त्याग — फल का त्याग"},
    note:{en:"Distinguished from sannyāsa: tyāga is renouncing the fruit while continuing to act. The whole of Ch 18 turns on this distinction.",dev:"सन्न्यासाद् भिन्नः — कर्म त्यक्त्वा न, अपि तु कर्म कुर्वन्नेव फलं त्यजति। अष्टादशेऽध्याये अयं विवेकः प्रधानम्।",kn:"ಸನ್ನ್ಯಾಸಾದ್ ಭಿನ್ನಃ — ಕರ್ಮ ತ್ಯಕ್ತ್ವಾ ನ, ಅಪಿ ತು ಕರ್ಮ ಕುರ್ವನ್ನೇವ ಫಲಂ ತ್ಯಜತಿ। ಅಷ್ಟಾದಶೇಽಧ್ಯಾಯೇ ಅಯಂ ವಿವೇಕಃ ಪ್ರಧಾನಮ್।",hi:"संन्यास से अलग: त्याग है कर्म करते हुए फल को छोड़ देना। पूरा अठारहवाँ अध्याय इसी अंतर पर टिका है।"},
    refs:'BG 18.2–11' },
  { id:'indriya_nigraha', tier:'sadhana',
    en:'Indriya-nigraha', dev:'इन्द्रियनिग्रह', kn:'ಇಂದ್ರಿಯನಿಗ್ರಹ',
    title:{en:'Restraint of senses',dev:"इन्द्रियनिग्रहः",kn:"ಇಂದ್ರಿಯನಿಗ್ರಹಃ",hi:"इंद्रिय-निग्रह"},
    note:{en:"Withdrawing the senses from their objects as a tortoise withdraws its limbs — the sthita-prajña\'s mark.",dev:"कूर्म इव अङ्गानि स्वविषयेभ्य इन्द्रियाणि सन्निवर्त्य धारणम् — स्थितप्रज्ञस्य लक्षणम्।",kn:"ಕೂರ್ಮ ಇವ ಅಂಗಾನಿ ಸ್ವವಿಷಯೇಭ್ಯ ಇಂದ್ರಿಯಾಣಿ ಸನ್ನಿವರ್ತ್ಯ ಧಾರಣಮ್ — ಸ್ಥಿತಪ್ರಜ್ಞಸ್ಯ ಲಕ್ಷಣಮ್।",hi:"जैसे कछुआ अपने अंग समेट लेता है, वैसे ही इंद्रियों को विषयों से हटाना — स्थितप्रज्ञ का लक्षण।"},
    refs:'BG 2.58 · 2.67–68' },
  { id:'samadhi', tier:'sadhana',
    en:'Samādhi', dev:'समाधि', kn:'ಸಮಾಧಿ',
    title:{en:'Absorption in Hari',dev:"हरौ समाधिः",kn:"ಹರೌ ಸಮಾಧಿಃ",hi:"समाधि — हरि में लीनता"},
    note:{en:"The mind 'fixed in samādhi by yoga' — undisturbed, single-pointed, established in the Self.",dev:"योगेन समाधौ निश्चलं मनः — अविक्षिप्तम्, एकाग्रम्, आत्मनि प्रतिष्ठितम्।",kn:"ಯೋಗೇನ ಸಮಾಧೌ ನಿಶ್ಚಲಂ ಮನಃ — ಅವಿಕ್ಷಿಪ್ತಮ್, ಏಕಾಗ್ರಮ್, ಆತ್ಮನಿ ಪ್ರತಿಷ್ಠಿತಮ್।",hi:"‘योग द्वारा समाधि में स्थापित’ मन — अविचलित, एकाग्र, आत्मा में प्रतिष्ठित।"},
    refs:'BG 2.53 · 6.13–15' },
  { id:'svadhyaya', tier:'sadhana',
    en:'Svādhyāya', dev:'स्वाध्याय', kn:'ಸ್ವಾಧ್ಯಾಯ',
    title:{en:'Recitation of scripture',dev:"स्वाध्यायः",kn:"ಸ್ವಾಧ್ಯಾಯಃ",hi:"स्वाध्याय — शास्त्र-पाठ"},
    note:{en:"Recitation of the Veda — listed among the vāṅmaya tapas. Madhva tradition treats svādhyāya as continuous Hari-smaraṇa.",dev:"वेदपाठः — वाङ्मयतपस्सु अन्तर्भूतः। माध्वसम्प्रदाये स्वाध्यायो निरन्तरहरिस्मरणरूपः।",kn:"ವೇದಪಾಠಃ — ವಾಙ್ಮಯತಪಸ್ಸು ಅಂತರ್ಭೂತಃ। ಮಾಧ್ವಸಂಪ್ರದಾಯೇ ಸ್ವಾಧ್ಯಾಯೋ ನಿರಂತರಹರಿಸ್ಮರಣರೂಪಃ।",hi:"वेद का पाठ — वाङ्मय तप में गिना जाता है। मध्व परंपरा स्वाध्याय को निरंतर हरि-स्मरण मानती है।"},
    refs:'BG 17.15' },

  /* — Jñāna-aṅgas from BG 13.7-11 — */
  { id:'jnana_angas', tier:'sadhana',
    en:'Jñāna-aṅgas', dev:'ज्ञानाङ्गानि', kn:'ಜ್ಞಾನಾಂಗಗಳು',
    title:{en:'The 20 constituents of knowledge',dev:"ज्ञानाङ्गानि (विंशतिः)",kn:"ಜ್ಞಾನಾಂಗಗಳು (ಇಪ್ಪತ್ತು)",hi:"ज्ञान के २० अंग"},
    note:{en:"Krishna's BG 13.7-11 enumeration of what 'knowledge' actually is — twenty virtues from amānitva to tattva-jñānārtha-darśana. Together they constitute jñāna; their opposite is ajñāna.",dev:"गी॰ १३।७–११ श्रीकृष्णेन उक्ता विंशतिः ज्ञाननिर्वचकगुणाः — अमानित्वादारभ्य तत्त्वज्ञानार्थदर्शनपर्यन्ताः। समवायेन ज्ञानम्; तद्विपर्ययोऽज्ञानम्।",kn:"ಗೀ॰ ೧೩।೭–೧೧ ಶ್ರೀಕೃಷ್ಣೇನ ಉಕ್ತಾ ಇಪ್ಪತ್ತು ಜ್ಞಾನನಿರ್ವಚಕಗುಣಾಃ — ಅಮಾನಿತ್ವಾದಾರಭ್ಯ ತತ್ತ್ವಜ್ಞಾನಾರ್ಥದರ್ಶನಪರ್ಯಂತಾಃ। ಸಮವಾಯೇನ ಜ್ಞಾನಮ್; ತದ್ವಿಪರ್ಯಯೋಽಜ್ಞಾನಮ್।",hi:"गीता १३.७–११ में कृष्ण की सूची — अमानित्व से तत्त्व-ज्ञानार्थ-दर्शन तक बीस गुण। मिलकर ये ज्ञान बनते हैं; इनका विपरीत अज्ञान है।"},
    refs:'BG 13.7–11' },
  { id:'amanitva', tier:'sadhana',
    en:'Amānitva', dev:'अमानित्व', kn:'ಅಮಾನಿತ್ವ',
    title:{en:'Humility',dev:"अमानित्वम्",kn:"ಅಮಾನಿತ್ವಮ್",hi:"अमानित्व — विनम्रता"},
    note:{en:"Absence of self-importance — the first virtue Krishna names when defining knowledge. Without it, all other practice carries an ahaṅkāra-tail.",dev:"अहंकाररहितत्वम् — ज्ञाननिरूपणे श्रीकृष्णेन प्रथमं निर्दिष्टम्। एतद्विना सर्वा साधना अहङ्कारानुबद्धा भवति।",kn:"ಅಹಂಕಾರರಹಿತತ್ವಮ್ — ಜ್ಞಾನನಿರೂಪಣೇ ಶ್ರೀಕೃಷ್ಣೇನ ಪ್ರಥಮಂ ನಿರ್ದಿಷ್ಟಮ್। ಏತದ್ವಿನಾ ಸರ್ವಾ ಸಾಧನಾ ಅಹಂಕಾರಾನುಬದ್ಧಾ ಭವತಿ।",hi:"आत्म-गौरव की अनुपस्थिति — कृष्ण की ज्ञान-परिभाषा का पहला गुण। इसके बिना बाकी सब साधना अहंकार से जुड़ी रहती है।"},
    refs:'BG 13.7' },
  { id:'arjava', tier:'sadhana',
    en:'Ārjava', dev:'आर्जव', kn:'ಆರ್ಜವ',
    title:{en:'Uprightness · straightforwardness',dev:"आर्जवम्",kn:"ಆರ್ಜವಮ್",hi:"आर्जव — सरलता"},
    note:{en:"Inner and outer alignment — thought, speech, and act in one line. Listed in jñāna-aṅgas and again in śārīra-tapas.",dev:"मनोवाक्कायानाम् ऐकरूप्यम् — चिन्ता वाक् क्रिया च एकलक्षणाः। ज्ञानाङ्गेषु तथा शारीरतपसि च निर्दिष्टम्।",kn:"ಮನೋವಾಕ್ಕಾಯಾನಾಮ್ ಐಕರೂಪ್ಯಮ್ — ಚಿಂತಾ ವಾಕ್ ಕ್ರಿಯಾ ಚ ಏಕಲಕ್ಷಣಾಃ। ಜ್ಞಾನಾಂಗೇಷು ತಥಾ ಶಾರೀರತಪಸಿ ಚ ನಿರ್ದಿಷ್ಟಮ್।",hi:"भीतर-बाहर एक रहना — विचार, वाणी और कर्म एक पंक्ति में। ज्ञान-अंग और शारीर-तप दोनों में गिना गया।"},
    refs:'BG 13.7 · 17.14' },
  { id:'shauca', tier:'sadhana',
    en:'Śauca', dev:'शौच', kn:'ಶೌಚ',
    title:{en:'Purity — outer & inner',dev:"शौचम् (बाह्याभ्यन्तरम्)",kn:"ಶೌಚಮ್ (ಬಾಹ್ಯಾಭ್ಯಂತರಮ್)",hi:"शौच — बाह्य व आंतरिक शुद्धि"},
    note:{en:"Bāhya-śauca (cleanliness of body, surroundings) and ābhyantara-śauca (clarity of mind). One of the divine virtues.",dev:"बाह्यशौचं देहस्य परिसरस्य च निर्मलत्वम्; आभ्यन्तरशौचं चित्तस्य निर्मलता। दैवीसम्पदान्तर्गतम्।",kn:"ಬಾಹ್ಯಶೌಚಂ ದೇಹಸ್ಯ ಪರಿಸರಸ್ಯ ಚ ನಿರ್ಮಲತ್ವಮ್; ಆಭ್ಯಂತರಶೌಚಂ ಚಿತ್ತಸ್ಯ ನಿರ್ಮಲತಾ। ದೈವೀಸಂಪದಾಂತರ್ಗತಮ್।",hi:"बाह्य-शौच (शरीर, परिवेश की स्वच्छता) और आभ्यंतर-शौच (मन की निर्मलता)। दैवी सम्पद् के गुणों में से एक।"},
    refs:'BG 13.7 · 16.3 · 17.14' },
  { id:'ksanti', tier:'sadhana',
    en:'Kṣānti', dev:'क्षान्ति', kn:'ಕ್ಷಾಂತಿ',
    title:{en:'Forbearance',dev:"क्षान्तिः",kn:"ಕ್ಷಾಂತಿಃ",hi:"क्षांति — सहनशीलता"},
    note:{en:"Patient endurance under provocation — letting the other's words not bite. Listed both in jñāna-aṅgas (13.7) and divine endowment (16.3).",dev:"परप्रकोपे सहनशीलत्वम् — परस्य वचनं न दशेत्। ज्ञानाङ्गेषु (१३।७) दैवीसम्पदि (१६।३) च निर्दिष्टा।",kn:"ಪರಪ್ರಕೋಪೇ ಸಹನಶೀಲತ್ವಮ್ — ಪರಸ್ಯ ವಚನಂ ನ ದಶೇತ್। ಜ್ಞಾನಾಂಗೇಷು (೧೩।೭) ದೈವೀಸಂಪದಿ (೧೬।೩) ಚ ನಿರ್ದಿಷ್ಟಾ।",hi:"उद्दीपन की स्थिति में धैर्य से सहना — दूसरे के शब्दों को अपने मन तक न पहुँचने देना। १३.७ और १६.३ दोनों में सूचीबद्ध।"},
    refs:'BG 13.7 · 16.3' },
  { id:'ananya_yoga', tier:'sadhana',
    en:'Ananya-yoga', dev:'अनन्ययोग', kn:'ಅನನ್ಯಯೋಗ',
    title:{en:'Undeviating devotion',dev:"अनन्ययोगः",kn:"ಅನನ್ಯಯೋಗಃ",hi:"अनन्य-योग — अविचल भक्ति"},
    note:{en:"Bhakti directed at Hari alone, with no second object. Among the jñāna-aṅgas of Ch 13, and repeated in Ch 9.22 as the form of bhakti Hari himself sustains.",dev:"हरौ एव अनन्यविषया भक्तिः — द्वितीयविषयरहिता। त्रयोदशे ज्ञानाङ्गेषु, नवमे (९।२२) च हरिणा स्वयं योगक्षेमवहनार्हा भक्तिः।",kn:"ಹರೌ ಏವ ಅನನ್ಯವಿಷಯಾ ಭಕ್ತಿಃ — ದ್ವಿತೀಯವಿಷಯರಹಿತಾ। ತ್ರಯೋದಶೇ ಜ್ಞಾನಾಂಗೇಷು, ನವಮೇ (೯।೨೨) ಚ ಹರಿಣಾ ಸ್ವಯಂ ಯೋಗಕ್ಷೇಮವಹನಾರ್ಹಾ ಭಕ್ತಿಃ।",hi:"केवल हरि की ओर निर्देशित भक्ति, बिना किसी दूसरे लक्ष्य के। तेरहवें के ज्ञान-अंगों में और ९.२२ में फिर — हरि स्वयं ऐसे भक्त का योग-क्षेम वहन करते हैं।"},
    refs:'BG 9.22 · 13.10 · 12.6–7' },
  { id:'vivikta_seva', tier:'sadhana',
    en:'Vivikta-deśa-sevitvam', dev:'विविक्तदेशसेवित्व', kn:'ವಿವಿಕ್ತದೇಶಸೇವಿತ್ವ',
    title:{en:'Resort to solitary places',dev:"विविक्तदेशसेवित्वम्",kn:"ವಿವಿಕ್ತದೇಶಸೇವಿತ್ವಮ್",hi:"विविक्त-सेवा — एकांत-वास"},
    note:{en:"Cultivating solitude — for dhyāna, for svādhyāya, for the inner work the marketplace can't host.",dev:"एकान्तस्थानं भजनम् — ध्यानाय, स्वाध्यायाय, अन्तरङ्गकर्मणे च। जनसङ्कुलं तदर्थम् अनुकूलं न।",kn:"ಏಕಾಂತಸ್ಥಾನಂ ಭಜನಮ್ — ಧ್ಯಾನಾಯ, ಸ್ವಾಧ್ಯಾಯಾಯ, ಅಂತರಂಗಕರ್ಮಣೇ ಚ। ಜನಸಂಕುಲಂ ತದರ್ಥಮ್ ಅನುಕೂಲಂ ನ।",hi:"एकांत का सेवन — ध्यान, स्वाध्याय और उस आंतरिक कार्य के लिए जो बाज़ार में नहीं हो सकता।"},
    refs:'BG 13.10' },
  { id:'adhyatma_jnana_nityatvam', tier:'sadhana',
    en:'Adhyātma-jñāna-nityatvam', dev:'अध्यात्मज्ञाननित्यत्व', kn:'ಅಧ್ಯಾತ್ಮಜ್ಞಾನನಿತ್ಯತ್ವ',
    title:{en:'Constancy in self-knowledge',dev:"अध्यात्मज्ञाननित्यत्वम्",kn:"ಅಧ್ಯಾತ್ಮಜ್ಞಾನನಿತ್ಯತ್ವಮ್",hi:"अध्यात्म-ज्ञान-नित्यत्व"},
    note:{en:"Steadiness in turning to ātma-knowledge — not as occasional study but as continuous orientation. Penultimate jñāna-aṅga.",dev:"आत्मज्ञाने नित्यप्रवृत्तिः — न कदाचित्कोऽध्ययनः, अपि तु अविरतमनुसन्धानम्। ज्ञानाङ्गेषु उपान्त्यम्।",kn:"ಆತ್ಮಜ್ಞಾನೇ ನಿತ್ಯಪ್ರವೃತ್ತಿಃ — ನ ಕದಾಚಿತ್ಕೋಽಧ್ಯಯನಃ, ಅಪಿ ತು ಅವಿರತಮನುಸಂಧಾನಮ್। ಜ್ಞಾನಾಂಗೇಷು ಉಪಾಂತ್ಯಮ್।",hi:"आत्म-ज्ञान की ओर स्थिर मुड़ाव — कभी-कभार के अध्ययन के रूप में नहीं, निरंतर दृष्टि के रूप में। अंत से एक पहले का ज्ञान-अंग।"},
    refs:'BG 13.11' },
  { id:'tattva_jnanartha_darshanam', tier:'sadhana',
    en:'Tattva-jñānārtha-darśanam', dev:'तत्त्वज्ञानार्थदर्शन', kn:'ತತ್ತ್ವಜ್ಞಾನಾರ್ಥದರ್ಶನ',
    title:{en:'Seeing the goal of true knowledge',dev:"तत्त्वज्ञानार्थदर्शनम्",kn:"ತತ್ತ್ವಜ್ಞಾನಾರ್ಥದರ್ಶನಮ್",hi:"तत्त्व-ज्ञानार्थ-दर्शन"},
    note:{en:"Looking always toward the goal — knowing for what (mokṣa, Hari), not knowing for its own sake. The capstone jñāna-aṅga in Krishna's list.",dev:"ज्ञानस्य प्रयोजनदर्शनम् — किमर्थं ज्ञायते (मोक्षाय, हरये) इति नित्यानुसन्धानम्। ज्ञानाङ्गानां शिखरम्।",kn:"ಜ್ಞಾನಸ್ಯ ಪ್ರಯೋಜನದರ್ಶನಮ್ — ಕಿಮರ್ಥಂ ಜ್ಞಾಯತೇ (ಮೋಕ್ಷಾಯ, ಹರಯೇ) ಇತಿ ನಿತ್ಯಾನುಸಂಧಾನಮ್। ಜ್ಞಾನಾಂಗಾನಾಂ ಶಿಖರಮ್।",hi:"सदा लक्ष्य की ओर देखना — किसलिए जानना है (मोक्ष, हरि), न कि ज्ञान केवल ज्ञान के लिए। कृष्ण की सूची का चूड़ांत ज्ञान-अंग।"},
    refs:'BG 13.11' },

  /* ---------------- Antaḥkaraṇa (6) ---------------- */
  { id:'manas', tier:'antahkarana',
    en:'Manas', dev:'मनस्', kn:'ಮನಸ್',
    title:{en:'Mind',dev:"मनस्",kn:"ಮನಸ್",hi:"मन — ग्यारहवीं इंद्रिय"},
    note:{en:"The eleventh indriya. Restless, turbulent, hard to subdue — but Krishna affirms it is conquerable by abhyāsa and vairāgya.",dev:"एकादशम् इन्द्रियम्। चञ्चलं प्रमाथि दुर्निग्रहम् — तथापि कृष्णः कथयति यद् अभ्यासेन वैराग्येण च तद् निगृह्यते।",kn:"ಏಕಾದಶಮ್ ಇಂದ್ರಿಯಮ್। ಚಂಚಲಂ ಪ್ರಮಾಥಿ ದುರ್ನಿಗ್ರಹಮ್ — ತಥಾಪಿ ಕೃಷ್ಣಃ ಕಥಯತಿ ಯದ್ ಅಭ್ಯಾಸೇನ ವೈರಾಗ್ಯೇಣ ಚ ತದ್ ನಿಗೃಹ್ಯತೇ।",hi:"ग्यारहवीं इंद्रिय। चंचल, अशांत, वश में लाना कठिन — पर कृष्ण कहते हैं कि अभ्यास और वैराग्य से इसे जीता जा सकता है।"},
    refs:'BG 6.34–35 · 3.6–7' },
  { id:'buddhi', tier:'antahkarana',
    en:'Buddhi', dev:'बुद्धि', kn:'ಬುದ್ಧಿ',
    title:{en:'Discriminating intellect',dev:"बुद्धिः",kn:"ಬುದ್ಧಿಃ",hi:"बुद्धि — विवेक-शक्ति"},
    note:{en:"That faculty which discriminates duty from non-duty, what to do from what not to do. Sāttvika buddhi knows pravṛtti and nivṛtti.",dev:"कार्याकार्य-विवेचनी वृत्तिः। साात्त्विकी बुद्धिः प्रवृत्तिं निवृत्तिं च जानाति।",kn:"ಕಾರ್ಯಾಕಾರ್ಯ-ವಿವೇಚನೀ ವೃತ್ತಿಃ। ಸಾತ್ತ್ವಿಕೀ ಬುದ್ಧಿಃ ಪ್ರವೃತ್ತಿಂ ನಿವೃತ್ತಿಂ ಚ ಜಾನಾತಿ।",hi:"वह शक्ति जो कर्तव्य और अकर्तव्य, करने योग्य और न करने योग्य का विवेक करती है। सात्त्विक बुद्धि प्रवृत्ति और निवृत्ति को जानती है।"},
    refs:'BG 18.30–32' },
  { id:'ahankara', tier:'antahkarana',
    en:'Ahaṅkāra', dev:'अहङ्कार', kn:'ಅಹಂಕಾರ',
    title:{en:'I-maker',dev:"अहङ्कारः",kn:"ಅಹಂಕಾರಃ",hi:"अहंकार — मैंपन"},
    note:{en:"The sense of being the doer. 'kartāham iti manyate' — when the puruṣa is bewildered by ahaṅkāra he thinks himself the agent.",dev:"कर्तृत्व-अभिमानः। \"कर्ताहम् इति मन्यते\" — अहङ्कार-विमूढात्मा पुरुषः स्वम् कर्तारं मन्यते।",kn:"ಕರ್ತೃತ್ವ-ಅಭಿಮಾನಃ। \"ಕರ್ತಾಹಮ್ ಇತಿ ಮನ್ಯತೇ\" — ಅಹಂಕಾರ-ವಿಮೂಢಾತ್ಮಾ ಪುರುಷಃ ಸ್ವಮ್ ಕರ್ತಾರಂ ಮನ್ಯತೇ।",hi:"कर्ता होने का बोध। ‘कर्ताहम् इति मन्यते’ — जब पुरुष अहंकार से मोहित होता है, तब वह स्वयं को कर्ता मान बैठता है।"},
    refs:'BG 3.27 · 7.4' },
  { id:'citta', tier:'antahkarana',
    en:'Citta', dev:'चित्त', kn:'ಚಿತ್ತ',
    title:{en:'Reflective consciousness',dev:"चित्तम्",kn:"ಚಿತ್ತಮ್",hi:"चित्त — चिंतनशील चेतना"},
    note:{en:"The stream of conscious states. To be made cala (steady) and ekāgra (one-pointed) on Hari.",dev:"चेतन-वृत्ति-प्रवाहः। हरौ स्थिरम् एकाग्रं च कर्तव्यम्।",kn:"ಚೇತನ-ವೃತ್ತಿ-ಪ್ರವಾಹಃ। ಹರೌ ಸ್ಥಿರಮ್ ಏಕಾಗ್ರಂ ಚ ಕರ್ತವ್ಯಮ್।",hi:"सचेत अवस्थाओं की धारा। इसे चल नहीं, स्थिर और हरि पर एकाग्र बनाना है।"},
    refs:'BG 8.7 · 12.9' },
  { id:'antaryamin', tier:'antahkarana',
    en:'Antaryāmin', dev:'अन्तर्यामिन्', kn:'ಅಂತರ್ಯಾಮಿನ್',
    title:{en:'Indweller — Hari within',dev:"अन्तर्यामी — हृदये हरिः",kn:"ಅಂತರ್ಯಾಮೀ — ಹೃದಯೇ ಹರಿಃ",hi:"अंतर्यामी — हृदय-स्थित हरि"},
    note:{en:"'īśvaraḥ sarva-bhūtānāṃ hṛd-deśe tiṣṭhati' — the Lord stands in the heart of every being, directing them.",dev:"\"ईश्वरः सर्व-भूतानां हृद्देशेऽर्जुन तिष्ठति\" — भगवान् सर्वेषां प्राणिनां हृदये स्थित्वा तान् सञ्चालयति।",kn:"\"ಈಶ್ವರಃ ಸರ್ವ-ಭೂತಾನಾಂ ಹೃದ್ದೇಶೇಽರ್ಜುನ ತಿಷ್ಠತಿ\" — ಭಗವಾನ್ ಸರ್ವೇಷಾಂ ಪ್ರಾಣಿನಾಂ ಹೃದಯೇ ಸ್ಥಿತ್ವಾ ತಾನ್ ಸಂಚಾಲಯತಿ।",hi:"‘ईश्वरः सर्व-भूतानां हृद्-देशे तिष्ठति’ — हरि हर प्राणी के हृदय में स्थित होकर उसे चलाते हैं।"},
    refs:'BG 18.61',
    madhva:{en:'A primary Madhva theme — Hari as antaryāmin without identity-merger.',dev:"अयं माध्व-सिद्धान्तस्य मुख्यः सिद्धान्तः — हरिः अन्तर्यामी, परं तादात्म्य-रहितः, जीवात् भिन्नः सन् नियामकः।",kn:"ಅಯಂ ಮಾಧ್ವ-ಸಿದ್ಧಾಂತಸ್ಯ ಮುಖ್ಯಃ ಸಿದ್ಧಾಂತಃ — ಹರಿಃ ಅಂತರ್ಯಾಮೀ, ಪರಂ ತಾದಾತ್ಮ್ಯ-ರಹಿತಃ, ಜೀವಾತ್ ಭಿನ್ನಃ ಸನ್ ನಿಯಾಮಕಃ।",hi:"मध्व का प्रमुख विषय — हरि अंतर्यामी हैं, पर बिना तादात्म्य के।"} },
  { id:'jnanendriyas_karmendriyas', tier:'antahkarana',
    en:'Jñāna- & Karma-indriyas', dev:'ज्ञान-कर्म-इन्द्रियाणि', kn:'ಜ್ಞಾನ-ಕರ್ಮ-ಇಂದ್ರಿಯಗಳು',
    title:{en:'Senses of knowing & acting',dev:"ज्ञान-कर्म-इन्द्रियाणि",kn:"ಜ್ಞಾನ-ಕರ್ಮ-ಇಂದ್ರಿಯಾಣಿ",hi:"ज्ञानेंद्रिय व कर्मेंद्रिय"},
    note:{en:"Five each: eye/ear/nose/skin/tongue and voice/hand/foot/anus/genitals. Their objects move in their domains (BG 3.28).",dev:"पञ्च ज्ञानेन्द्रियाणि — चक्षुः-श्रोत्र-घ्राण-त्वक्-रसना; पञ्च कर्मेन्द्रियाणि — वाक्-पाणि-पाद-पायु-उपस्थानि। इन्द्रियाणि इन्द्रियार्थेषु वर्तन्ते (BG ३.२८)।",kn:"ಪಂಚ ಜ್ಞಾನೇಂದ್ರಿಯಾಣಿ — ಚಕ್ಷುಃ-ಶ್ರೋತ್ರ-ಘ್ರಾಣ-ತ್ವಕ್-ರಸನಾ; ಪಂಚ ಕರ್ಮೇಂದ್ರಿಯಾಣಿ — ವಾಕ್-ಪಾಣಿ-ಪಾದ-ಪಾಯು-ಉಪಸ್ಥಾನಿ। ಇಂದ್ರಿಯಾಣಿ ಇಂದ್ರಿಯಾರ್ಥೇಷು ವರ್ತಂತೇ (BG ೩.೨೮)।",hi:"पाँच-पाँच: आँख/कान/नाक/त्वचा/जीभ और वाक्/हाथ/पैर/गुदा/उपस्थ। ये अपने-अपने विषयों में चलती हैं (गीता ३.२८)।"},
    refs:'BG 3.28 · 15.9' },

  /* ---------------- Dharma (8) ---------------- */
  { id:'svadharma', tier:'dharma',
    en:'Svadharma', dev:'स्वधर्म', kn:'ಸ್ವಧರ್ಮ',
    title:{en:'One\'s own duty',dev:"स्वधर्मः",kn:"ಸ್ವಧರ್ಮಃ",hi:"स्वधर्म — अपना धर्म"},
    note:{en:"'better one\'s own dharma poorly done than another\'s well done' — performing the duty arising from one\'s svabhāva.",dev:"\"श्रेयान् स्वधर्मो विगुणः परधर्मात् स्वनुष्ठितात्\" — स्व-स्वभाव-जातं कर्म एव अनुष्ठेयम्।",kn:"\"ಶ್ರೇಯಾನ್ ಸ್ವಧರ್ಮೋ ವಿಗುಣಃ ಪರಧರ್ಮಾತ್ ಸ್ವನುಷ್ಠಿತಾತ್\" — ಸ್ವ-ಸ್ವಭಾವ-ಜಾತಂ ಕರ್ಮ ಏವ ಅನುಷ್ಠೇಯಮ್।",hi:"‘अपना धर्म ठीक से न निभाने पर भी पराये धर्म से अच्छा है’ — स्वभाव से उत्पन्न कर्तव्य का पालन।"},
    refs:'BG 3.35 · 18.47' },
  { id:'varnashrama', tier:'dharma',
    en:'Varṇa-svabhāva', dev:'वर्णस्वभाव', kn:'ವರ್ಣಸ್ವಭಾವ',
    title:{en:'Duties by intrinsic nature',dev:"वर्ण-स्वभावः",kn:"ವರ್ಣ-ಸ್ವಭಾವಃ",hi:"वर्णाश्रम-धर्म"},
    note:{en:"Brāhmaṇa, kṣatriya, vaiśya, śūdra — duties arising from guṇa-karma-vibhāga. Madhva: rooted in eternal sva-rūpa-yogyatā.",dev:"ब्राह्मण-क्षत्रिय-वैश्य-शूद्राः — गुण-कर्म-विभागेन उद्भूताः कर्तव्याः। माध्वमते एते जीवानां नित्य-स्वरूप-योग्यतायां निहिताः।",kn:"ಬ್ರಾಹ್ಮಣ-ಕ್ಷತ್ರಿಯ-ವೈಶ್ಯ-ಶೂದ್ರಾಃ — ಗುಣ-ಕರ್ಮ-ವಿಭಾಗೇನ ಉದ್ಭೂತಾಃ ಕರ್ತವ್ಯಾಃ। ಮಾಧ್ವಮತೇ ಏತೇ ಜೀವಾನಾಂ ನಿತ್ಯ-ಸ್ವರೂಪ-ಯೋಗ್ಯತಾಯಾಂ ನಿಹಿತಾಃ।",hi:"ब्राह्मण, क्षत्रिय, वैश्य, शूद्र — गुण-कर्म-विभाग से उत्पन्न कर्तव्य। मध्व: यह नित्य स्वरूप-योग्यता पर आधारित।"},
    refs:'BG 4.13 · 18.41–44' },
  { id:'nishkama_karma', tier:'dharma',
    en:'Niṣkāma karma', dev:'निष्कामकर्म', kn:'ನಿಷ್ಕಾಮ-ಕರ್ಮ',
    title:{en:'Desireless action',dev:"निष्कामकर्म",kn:"ನಿಷ್ಕಾಮ-ಕರ್ಮ",hi:"निष्काम कर्म"},
    note:{en:"Action performed without desire for its result. The signature ethical demand of the BG.",dev:"फलाकाङ्क्षां विना अनुष्ठितं कर्म। गीतायाः मुख्यः नैतिकः आदेशः।",kn:"ಫಲಾಕಾಂಕ್ಷಾಂ ವಿನಾ ಅನುಷ್ಠಿತಂ ಕರ್ಮ। ಗೀತಾಯಾಃ ಮುಖ್ಯಃ ನೈತಿಕಃ ಆದೇಶಃ।",hi:"फल की कामना के बिना किया गया कर्म। गीता की सबसे विशिष्ट नैतिक माँग।"},
    refs:'BG 2.47 · 4.20' },
  { id:'sthitaprajna', tier:'dharma',
    en:'Sthita-prajña', dev:'स्थितप्रज्ञ', kn:'ಸ್ಥಿತಪ್ರಜ್ಞ',
    title:{en:'One of steady wisdom',dev:"स्थितप्रज्ञः",kn:"ಸ್ಥಿತಪ್ರಜ್ಞಃ",hi:"स्थितप्रज्ञ — स्थिर ज्ञान वाला"},
    note:{en:"Indifferent to pleasure and pain, free of attachment, fear, anger; senses fully withdrawn. Closing portrait of Ch 2.",dev:"सुख-दुःखयोः समः, सङ्ग-भय-क्रोध-विमुक्तः, सर्वतः सङ्कुचित-इन्द्रियः। द्वितीयाध्यायस्य अन्तिमं चित्रणम्।",kn:"ಸುಖ-ದುಃಖಯೋಃ ಸಮಃ, ಸಂಗ-ಭಯ-ಕ್ರೋಧ-ವಿಮುಕ್ತಃ, ಸರ್ವತಃ ಸಂಕುಚಿತ-ಇಂದ್ರಿಯಃ। ದ್ವಿತೀಯಾಧ್ಯಾಯಸ್ಯ ಅಂತಿಮಂ ಚಿತ್ರಣಮ್।",hi:"सुख-दुख में उदासीन, आसक्ति, भय और क्रोध से मुक्त; इंद्रियाँ पूरी तरह अंतर्मुख। दूसरे अध्याय का समापन-चित्र।"},
    refs:'BG 2.55–72' },
  { id:'daivi_sampad', tier:'dharma',
    en:'Daivī sampad', dev:'दैवी सम्पद्', kn:'ದೈವೀ ಸಂಪತ್',
    title:{en:'Divine endowment',dev:"दैवी सम्पत्",kn:"ದೈವೀ ಸಂಪತ್",hi:"दैवी सम्पद् — दिव्य गुण"},
    note:{en:"Fearlessness, purity of heart, steadfastness in jñāna, dāna, dama, yajña, svādhyāya, tapas, ārjava — leads to mokṣa.",dev:"अभयं सत्त्व-संशुद्धिः ज्ञान-योग-व्यवस्थितिः दानं दमः यज्ञः स्वाध्यायः तपः आर्जवम् — मोक्षाय कल्पते।",kn:"ಅಭಯಂ ಸತ್ತ್ವ-ಸಂಶುದ್ಧಿಃ ಜ್ಞಾನ-ಯೋಗ-ವ್ಯವಸ್ಥಿತಿಃ ದಾನಂ ದಮಃ ಯಜ್ಞಃ ಸ್ವಾಧ್ಯಾಯಃ ತಪಃ ಆರ್ಜವಮ್ — ಮೋಕ್ಷಾಯ ಕಲ್ಪತೇ।",hi:"अभय, हृदय की शुद्धि, ज्ञान, दान, दम, यज्ञ, स्वाध्याय, तप, आर्जव — ये गुण मोक्ष की ओर ले जाते हैं।"},
    refs:'BG 16.1–3 · 16.5' },
  { id:'ahimsa', tier:'dharma',
    en:'Ahiṃsā', dev:'अहिंसा', kn:'ಅಹಿಂಸಾ',
    title:{en:'Non-injury',dev:"अहिंसा",kn:"ಅಹಿಂಸಾ",hi:"अहिंसा"},
    note:{en:"Listed among divine virtues and as a jñāna-aṅga. Not mere abstention but the inner posture of harmlessness.",dev:"दैवी-गुणेषु ज्ञानाङ्गेषु च परिगणिता। न केवलं बाह्य-निवृत्तिः अपि तु अन्तर्भूता अहिंसक-वृत्तिः।",kn:"ದೈವೀ-ಗುಣೇಷು ಜ್ಞಾನಾಂಗೇಷು ಚ ಪರಿಗಣಿತಾ। ನ ಕೇವಲಂ ಬಾಹ್ಯ-ನಿವೃತ್ತಿಃ ಅಪಿ ತು ಅಂತರ್ಭೂತಾ ಅಹಿಂಸಕ-ವೃತ್ತಿಃ।",hi:"दैवी गुणों में और ज्ञान-अंगों में दोनों जगह सूचीबद्ध। केवल हिंसा से बचना नहीं, बल्कि भीतर की अहानिक वृत्ति।"},
    refs:'BG 10.5 · 13.7 · 16.2' },
  { id:'satya', tier:'dharma',
    en:'Satya', dev:'सत्य', kn:'ಸತ್ಯ',
    title:{en:'Truth-speaking',dev:"सत्यम्",kn:"ಸತ್ಯಮ್",hi:"सत्य — सत्य-भाषण"},
    note:{en:"Speech that is true, pleasant, beneficial, not agitating — the vāṅmaya tapas.",dev:"सत्यं प्रियं हितं अनुद्वेगकरं वाक्यम् — एतत् वाङ्मयं तपः।",kn:"ಸತ್ಯಂ ಪ್ರಿಯಂ ಹಿತಂ ಅನುದ್ವೇಗಕರಂ ವಾಕ್ಯಮ್ — ಏತತ್ ವಾಙ್ಮಯಂ ತಪಃ।",hi:"जो वाणी सच्ची हो, सुखद हो, हितकारी हो, उत्तेजना न देने वाली हो — यही वाङ्मय तप है।"},
    refs:'BG 10.4 · 17.15' },
  { id:'samatva_dharma', tier:'dharma',
    en:'Sama-darśana', dev:'समदर्शन', kn:'ಸಮದರ್ಶನ',
    title:{en:'Equality of vision',dev:"समदर्शनम्",kn:"ಸಮದರ್ಶನಮ್",hi:"सम-दर्शन"},
    note:{en:"Seeing the same indwelling Self in a brahmin, a cow, an elephant, a dog, and a dog-eater — the paṇḍita\'s mark.",dev:"विद्या-विनय-सम्पन्ने ब्राह्मणे, गवि, हस्तिनि, शुनि, श्वपाके च समं अन्तर्यामिणं पश्यन्ति पण्डिताः।",kn:"ವಿದ್ಯಾ-ವಿನಯ-ಸಂಪನ್ನೇ ಬ್ರಾಹ್ಮಣೇ, ಗವಿ, ಹಸ್ತಿನಿ, ಶುನಿ, ಶ್ವಪಾಕೇ ಚ ಸಮಂ ಅಂತರ್ಯಾಮಿಣಂ ಪಶ್ಯಂತಿ ಪಂಡಿತಾಃ।",hi:"ब्राह्मण, गाय, हाथी, कुत्ते और श्वपाक — सब में वही अंतर्यामी आत्मा देखना। पंडित का लक्षण।"},
    refs:'BG 5.18' },

  /* — Pravṛtti & Nivṛtti, sāttvika-buddhi's dual knowing — */
  { id:'pravritti_nivritti', tier:'dharma',
    en:'Pravṛtti-Nivṛtti', dev:'प्रवृत्ति-निवृत्ति', kn:'ಪ್ರವೃತ್ತಿ-ನಿವೃತ್ತಿ',
    title:{en:'What to do · what to refrain from',dev:"प्रवृत्ति-निवृत्ती",kn:"ಪ್ರವೃತ್ತಿ-ನಿವೃತ್ತೀ",hi:"प्रवृत्ति और निवृत्ति"},
    note:{en:"Krishna's definition of sāttvika buddhi (18.30): it knows pravṛtti (action to be undertaken) and nivṛtti (action to be abandoned), what is bound and what is freeing, what is fear and what is fearlessness.",dev:"साात्त्विक्या बुद्ध्याः लक्षणं (BG १८.३०) — सा प्रवृत्तिं निवृत्तिं च, बन्धं मोक्षं च, भयम् अभयं च जानाति।",kn:"ಸಾತ್ತ್ವಿಕ್ಯಾ ಬುದ್ಧ್ಯಾಃ ಲಕ್ಷಣಂ (BG ೧೮.೩೦) — ಸಾ ಪ್ರವೃತ್ತಿಂ ನಿವೃತ್ತಿಂ ಚ, ಬಂಧಂ ಮೋಕ್ಷಂ ಚ, ಭಯಮ್ ಅಭಯಂ ಚ ಜಾನಾತಿ।",hi:"कृष्ण की सात्त्विक बुद्धि की परिभाषा (१८.३०): यह जानती है कि क्या करना है (प्रवृत्ति) और क्या छोड़ना है (निवृत्ति), क्या बाँधता है और क्या मुक्त करता, क्या भय है और क्या अभय।"},
    refs:'BG 18.30' },

  /* ---------------- Doṣa (8) ---------------- */
  { id:'kama', tier:'dosha',
    en:'Kāma', dev:'काम', kn:'ಕಾಮ',
    title:{en:'Desire',dev:"कामः",kn:"ಕಾಮಃ",hi:"काम — इच्छा"},
    note:{en:"'this is the enemy here, born of rajas, all-devouring, greatly sinful' — Krishna names kāma as the primary foe.",dev:"\"रजोगुण-समुद्भवः, महाशनः, महापाप्मा, इह वैरी\" — कृष्णः कामं प्रथमं शत्रुं नाम्ना निर्दिशति।",kn:"\"ರಜೋಗುಣ-ಸಮುದ್ಭವಃ, ಮಹಾಶನಃ, ಮಹಾಪಾಪ್ಮಾ, ಇಹ ವೈರೀ\" — ಕೃಷ್ಣಃ ಕಾಮಂ ಪ್ರಥಮಂ ಶತ್ರುಂ ನಾಮ್ನಾ ನಿರ್ದಿಶತಿ।",hi:"‘यह रजोगुण से उत्पन्न, सब कुछ निगलने वाला, महान पापी — इसे ही यहाँ शत्रु जान’ (गीता ३.३७) — कृष्ण काम को प्रमुख शत्रु बताते हैं।"},
    refs:'BG 3.37–39' },
  { id:'krodha', tier:'dosha',
    en:'Krodha', dev:'क्रोध', kn:'ಕ್ರೋಧ',
    title:{en:'Anger',dev:"क्रोधः",kn:"ಕ್ರೋಧಃ",hi:"क्रोध"},
    note:{en:"From kāma-vighāta (blocked desire) arises krodha; from krodha, delusion; from delusion, loss of memory.",dev:"काम-विघातात् क्रोधः उद्भवति; क्रोधात् सम्मोहः; सम्मोहात् स्मृति-विभ्रमः।",kn:"ಕಾಮ-ವಿಘಾತಾತ್ ಕ್ರೋಧಃ ಉದ್ಭವತಿ; ಕ್ರೋಧಾತ್ ಸಂಮೋಹಃ; ಸಂಮೋಹಾತ್ ಸ್ಮೃತಿ-ವಿಭ್ರಮಃ।",hi:"काम के विघात (इच्छा के अधूरे रहने) से क्रोध जन्म लेता है; क्रोध से सम्मोह; सम्मोह से स्मृति का भ्रम; और फिर बुद्धि-नाश।"},
    refs:'BG 2.62–63 · 3.37' },
  { id:'lobha', tier:'dosha',
    en:'Lobha', dev:'लोभ', kn:'ಲೋಭ',
    title:{en:'Greed',dev:"लोभः",kn:"ಲೋಭಃ",hi:"लोभ"},
    note:{en:"One of the three gates of hell, alongside kāma and krodha. To be abandoned at the threshold of the path.",dev:"काम-क्रोधाभ्यां सह नरकस्य त्रिविधं द्वारम्। मार्गारम्भे एव त्यजनीयः।",kn:"ಕಾಮ-ಕ್ರೋಧಾಭ್ಯಾಂ ಸಹ ನರಕಸ್ಯ ತ್ರಿವಿಧಂ ದ್ವಾರಮ್। ಮಾರ್ಗಾರಂಭೇ ಏವ ತ್ಯಜನೀಯಃ।",hi:"काम, क्रोध के साथ — नरक के तीन द्वारों में से एक। मार्ग की दहलीज़ पर ही इसे छोड़ देना है।"},
    refs:'BG 16.21' },
  { id:'moha', tier:'dosha',
    en:'Moha', dev:'मोह', kn:'ಮೋಹ',
    title:{en:'Delusion',dev:"मोहः",kn:"ಮೋಹಃ",hi:"मोह — भ्रांति"},
    note:{en:"Loss of discrimination from anger; the disorientation of the bewildered self. Arjuna\'s starting condition.",dev:"क्रोधात् उद्भूता विवेक-हानिः; विभ्रान्त-आत्मनः दिग्भ्रमः। अर्जुनस्य आदिमा अवस्था।",kn:"ಕ್ರೋಧಾತ್ ಉದ್ಭೂತಾ ವಿವೇಕ-ಹಾನಿಃ; ವಿಭ್ರಾಂತ-ಆತ್ಮನಃ ದಿಗ್ಭ್ರಮಃ। ಅರ್ಜುನಸ್ಯ ಆದಿಮಾ ಅವಸ್ಥಾ।",hi:"क्रोध से विवेक का लोप; भ्रमित आत्मा की दिशा-हीनता। अर्जुन की आरंभिक स्थिति यही थी।"},
    refs:'BG 2.7 · 2.63 · 18.73' },
  { id:'asatsanga', tier:'dosha',
    en:'Asat-saṅga', dev:'असत्सङ्ग', kn:'ಅಸತ್ಸಂಗ',
    title:{en:'Bad association',dev:"असत्सङ्गः",kn:"ಅಸತ್ಸಂಗಃ",hi:"असत्संग — कुसंग"},
    note:{en:"From clinging (saṅga) to objects, kāma arises (BG 2.62). The chain begins with the company we keep.",dev:"विषयेषु सङ्गात् कामः उत्पद्यते (BG २.६२)। शृङ्खला आरभ्यते यैः सह वसामः तेभ्यः एव।",kn:"ವಿಷಯೇಷು ಸಂಗಾತ್ ಕಾಮಃ ಉತ್ಪದ್ಯತೇ (BG ೨.೬೨)। ಶೃಂಖಲಾ ಆರಭ್ಯತೇ ಯೈಃ ಸಹ ವಸಾಮಃ ತೇಭ್ಯಃ ಏವ।",hi:"विषयों के प्रति लगाव (संग) से काम जन्मता है (गीता २.६२)। शृंखला हमारी संगति से शुरू होती है।"},
    refs:'BG 2.62' },
  { id:'avidya', tier:'dosha',
    en:'Avidyā', dev:'अविद्या', kn:'ಅವಿದ್ಯಾ',
    title:{en:'Ignorance',dev:"अविद्या",kn:"ಅವಿದ್ಯಾ",hi:"अविद्या — अज्ञान"},
    note:{en:"Not-knowing Hari as supreme, the jīva as His aṃśa, and the world as His dependent reality. The taproot of bondage.",dev:"हरेः परत्वं, जीवस्य तदंशत्वं, जगतः तत्-परतन्त्र-सत्ता — एतद् अज्ञानम्। बन्धस्य मूल-कारणम्।",kn:"ಹರೇಃ ಪರತ್ವಂ, ಜೀವಸ್ಯ ತದಂಶತ್ವಂ, ಜಗತಃ ತತ್-ಪರತಂತ್ರ-ಸತ್ತಾ — ಏತದ್ ಅಜ್ಞಾನಮ್। ಬಂಧಸ್ಯ ಮೂಲ-ಕಾರಣಮ್।",hi:"हरि को सर्वोच्च, जीव को उनका अंश, और जगत को उनकी निर्भर वास्तविकता न जानना। बंधन की जड़।"},
    refs:'BG 5.15 · 14.8' },
  { id:'dvandva', tier:'dosha',
    en:'Dvandva', dev:'द्वन्द्व', kn:'ದ್ವಂದ್ವ',
    title:{en:'The pairs of opposites',dev:"द्वन्द्वम्",kn:"ದ್ವಂದ್ವಮ್",hi:"द्वंद्व — विपरीत-जोड़े"},
    note:{en:"Pleasure-pain, heat-cold, honor-dishonor — the pairs that disturb until equanimity is established.",dev:"सुख-दुःखे, शीतोष्णे, मानापमाने — यानि द्वन्द्वानि समत्व-प्रतिष्ठायाः पूर्वं क्षोभयन्ति।",kn:"ಸುಖ-ದುಃಖೇ, ಶೀತೋಷ್ಣೇ, ಮಾನಾಪಮಾನೇ — ಯಾನಿ ದ್ವಂದ್ವಾನಿ ಸಮತ್ವ-ಪ್ರತಿಷ್ಠಾಯಾಃ ಪೂರ್ವಂ ಕ್ಷೋಭಯಂತಿ।",hi:"सुख-दुख, सर्दी-गर्मी, मान-अपमान — जो जोड़े समत्व आने तक मन को विचलित करते हैं।"},
    refs:'BG 2.45 · 7.27' },
  { id:'asuri_sampad', tier:'dosha',
    en:'Āsurī sampad', dev:'आसुरी सम्पद्', kn:'ಆಸುರೀ ಸಂಪತ್',
    title:{en:'Demonic endowment',dev:"आसुरी सम्पत्",kn:"ಆಸುರೀ ಸಂಪತ್",hi:"आसुरी सम्पद् — आसुरी गुण"},
    note:{en:"Hypocrisy, arrogance, conceit, anger, harshness, ignorance — the inverse of divine endowment. Leads to bondage.",dev:"दम्भः दर्पः अभिमानः क्रोधः पारुष्यम् अज्ञानम् — दैवी-सम्पदः विपरीतम्। बन्धाय कल्पते।",kn:"ದಂಭಃ ದರ್ಪಃ ಅಭಿಮಾನಃ ಕ್ರೋಧಃ ಪಾರುಷ್ಯಮ್ ಅಜ್ಞಾನಮ್ — ದೈವೀ-ಸಂಪದಃ ವಿಪರೀತಮ್। ಬಂಧಾಯ ಕಲ್ಪತೇ।",hi:"दम्भ, दर्प, अभिमान, क्रोध, कठोरता, अज्ञान — दैवी सम्पद् के विपरीत। बंधन की ओर ले जाती है।"},
