<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f4ead8">
<title>Bhagavad Gītā · Concept KG (Madhva)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600&family=Noto+Sans+Devanagari:wght@400;500;600&family=Noto+Sans+Kannada:wght@400;500;600&family=Tiro+Devanagari+Sanskrit:ital@0;1&family=Tiro+Kannada:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4ead8; --bg-2:#ebdfc7; --ink:#1f1a13; --ink-soft:#4a3f30; --ink-fade:#7a6c54;
  --rule:#d6c599; --rule-soft:#e6d8b0; --paper:#fbf5e6; --paper-2:#f6ecd2;
  --hl:#f9d57a;

  --t-paramartha:#8b1e1a; --t-tattva:#a83f1a; --t-kshetra:#b8702a;
  --t-guna:#c69e2a;       --t-yoga:#7b8d2e;    --t-sadhana:#3f7a4a;
  --t-antahkarana:#2f6e7a;--t-dharma:#3a4a7a;  --t-dosha:#5a3e6a;
  --t-phala:#7a1e5a;      --t-yajna:#6a2e2e;   --t-pratika:#3e3a32;

  --e-is-a:#5a5a5a;       --e-includes:#3a6a3a; --e-leads-to:#2e6a7a;
  --e-opposite-of:#8a3a3a; --e-antidote-to:#3a6a7a; --e-arises-from:#7a4a2a;
  --e-predicates-on:#4a3a7a; --e-transforms-into:#7a5a3a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;min-height:100svh;margin:0;padding:0}
body{
  background:
    radial-gradient(ellipse at 20% -10%, #f9efd9 0%, transparent 55%),
    radial-gradient(ellipse at 110% 110%, #ead9b3 0%, transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:contain;
}
.app{
  position:relative;z-index:1;
  max-width:840px;margin:0 auto;
  min-height:100svh;
  display:flex;flex-direction:column;
}

/* ============ HEADER ============ */
header.top{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;gap:8px;
  padding:max(10px,env(safe-area-inset-top,0)) 14px 10px;
  background:#f4ead8;
  border-bottom:1px solid var(--rule);
}
header .brand{flex:1;min-width:0;display:flex;align-items:baseline;gap:8px;overflow:hidden}
header .brand .name{
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:18px;line-height:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
header .brand .name em{font-style:italic;color:var(--ink-soft);font-weight:500}
header .brand .crumb{
  font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-fade);white-space:nowrap;flex:0 0 auto;
}
header .lang{
  display:flex;gap:0;background:var(--paper);border:1px solid var(--rule);
  border-radius:8px;overflow:hidden;font-size:11px;letter-spacing:.06em;
}
header .lang button{
  background:transparent;border:0;color:var(--ink-soft);
  padding:6px 8px;cursor:pointer;font:inherit;
}
header .lang button.on{background:var(--ink);color:var(--paper)}
header .lang button + button{border-left:1px solid var(--rule)}

/* ============ SUBHEADER / VIEW TABS ============ */
.subhead{
  display:flex;gap:0;border-bottom:1px solid var(--rule);background:#f4ead8;
  position:sticky;top:46px;z-index:9;
}
.subhead button{
  flex:1;padding:10px 4px;background:transparent;border:0;
  font:inherit;color:var(--ink-fade);font-size:12px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;
}
.subhead button.on{color:var(--ink);box-shadow:inset 0 -2px 0 var(--ink)}

/* ============ SEARCH ============ */
.search{padding:10px 14px;background:#f4ead8;border-bottom:1px solid var(--rule-soft);position:sticky;top:84px;z-index:8}
.search input{
  width:100%;padding:8px 10px;border:1px solid var(--rule);border-radius:6px;
  background:var(--paper);font:inherit;font-size:13px;color:var(--ink);
}
.search input:focus{outline:0;border-color:var(--ink-soft)}

/* ============ MAIN ============ */
main{flex:1;padding:8px 0 80px}

/* ============ BROWSE ============ */
.tier-section{padding:10px 14px 4px}
.tier-section .tier-head{
  display:flex;align-items:baseline;gap:8px;margin-bottom:6px;
}
.tier-section .tier-dot{
  display:inline-block;width:10px;height:10px;border-radius:50%;
}
.tier-section .tier-name{
  font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;
}
.tier-section .tier-gloss{font-size:11px;color:var(--ink-fade);letter-spacing:.04em}
.tier-section .tier-count{font-size:11px;color:var(--ink-fade);margin-left:auto}
ul.entry-list{list-style:none;margin:0;padding:0 14px 16px}
ul.entry-list li{
  padding:9px 10px;margin:4px 0;border-radius:8px;
  background:var(--paper);border:1px solid var(--rule-soft);
  display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;
  cursor:pointer;transition:transform .08s, border-color .08s;
}
ul.entry-list li:hover{border-color:var(--rule);transform:translateY(-1px)}
ul.entry-list li .label{
  font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--ink);
}
ul.entry-list li .sub{font-size:11px;color:var(--ink-fade);margin-top:2px}
ul.entry-list li .ref{font-size:10px;color:var(--ink-fade);letter-spacing:.04em}
ul.entry-list li.dev .label,
body.lang-dev ul.entry-list li .label{font-family:'Tiro Devanagari Sanskrit','Noto Sans Devanagari',serif;font-size:18px}
body.lang-kn ul.entry-list li .label{font-family:'Tiro Kannada','Noto Sans Kannada',serif;font-size:18px}
.hl{background:var(--hl);padding:0 1px;border-radius:2px}

/* ============ FOCUS ============ */
.focus-card{
  margin:10px 14px;padding:14px 16px;border-radius:10px;
  background:var(--paper);border:1px solid var(--rule);
}
.focus-card .tier-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-fade);
}
.focus-card .tier-badge::before{
  content:"";display:inline-block;width:8px;height:8px;border-radius:50%;
}
.focus-card h1{
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:28px;
  margin:6px 0 2px;line-height:1.1;
}
body.lang-dev .focus-card h1{font-family:'Tiro Devanagari Sanskrit',serif;font-size:30px}
body.lang-kn  .focus-card h1{font-family:'Tiro Kannada',serif;font-size:30px}
.focus-card .subtitle{font-size:13px;color:var(--ink-soft);font-style:italic;margin-bottom:8px}
.focus-card .note{font-size:14px;line-height:1.5;color:var(--ink);margin:8px 0}
.focus-card .madhva{
  font-size:13px;line-height:1.45;color:var(--ink-soft);
  padding:8px 10px;background:var(--paper-2);border-left:3px solid var(--t-paramartha);
  border-radius:0 6px 6px 0;margin-top:8px;
}
.focus-card .madhva::before{content:"Madhva · "; font-weight:600;color:var(--t-paramartha)}
.focus-card .refs{font-size:11px;letter-spacing:.06em;color:var(--ink-fade);margin-top:10px}

.shloka{
  margin:0 14px 12px;padding:14px 16px;border-radius:10px;
  background:linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
  border:1px solid var(--rule);
}
.shloka .shloka-script{
  font-family:'Tiro Devanagari Sanskrit',serif;font-size:18px;line-height:1.6;white-space:pre-wrap;
  color:var(--ink);
}
body.lang-kn .shloka .shloka-script{font-family:'Tiro Kannada',serif}
body.lang-en .shloka .shloka-script{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px}
.shloka .shloka-ref{font-size:11px;color:var(--ink-fade);margin-top:6px;letter-spacing:.06em;text-align:right}

.relations{margin:0 14px 80px}
.relations h2{
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:16px;
  margin:14px 0 6px;color:var(--ink-soft);
  letter-spacing:.04em;
}
.relations ul{list-style:none;margin:0;padding:0}
.relations li{
  display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;
  padding:8px 10px;margin:3px 0;border-radius:6px;
  background:var(--paper);border:1px solid var(--rule-soft);cursor:pointer;
  transition:transform .08s, border-color .08s;
}
.relations li:hover{border-color:var(--rule);transform:translateX(2px)}
.relations li .edge-type{
  font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;color:#fff;font-weight:500;
}
.relations li .edge-label{font-size:13px;color:var(--ink-soft)}
.relations li .other{
  font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--ink);text-align:right;
}
body.lang-dev .relations li .other{font-family:'Tiro Devanagari Sanskrit',serif;font-size:17px}
body.lang-kn  .relations li .other{font-family:'Tiro Kannada',serif;font-size:17px}

/* ============ MAP (full graph) ============ */
.map-wrap{padding:10px 8px 80px;overflow:auto}
.map-wrap svg{display:block;margin:0 auto;background:var(--paper);border:1px solid var(--rule);border-radius:8px}
.map-node circle{cursor:pointer;transition:r .1s, stroke-width .1s}
.map-node:hover circle{stroke-width:2.5}
.map-node text{font-family:'Cormorant Garamond',serif;font-size:10px;fill:var(--ink);pointer-events:none;text-anchor:middle}
.map-edge{fill:none;stroke-opacity:.45}

/* ============ FOOTER ============ */
footer{
  position:fixed;bottom:0;left:0;right:0;
  padding:8px 14px max(8px,env(safe-area-inset-bottom,0));
  background:rgba(244,234,216,.94);backdrop-filter:blur(8px);
  border-top:1px solid var(--rule);
  font-size:10px;color:var(--ink-fade);letter-spacing:.06em;text-align:center;
}
</style>
</head>
<body class="lang-en">
<div class="app">

<header class="top">
  <div class="brand">
    <span class="name">Bhagavad <em>Gītā</em> · Concept KG</span>
    <span class="crumb">Madhva</span>
  </div>
  <div class="lang" id="lang-tabs">
    <button data-lang="en" class="on">EN</button>
    <button data-lang="dev">देव</button>
    <button data-lang="kn">ಕನ್ನಡ</button>
  </div>
</header>

<nav class="subhead" id="view-tabs">
  <button data-view="browse" class="on">Browse</button>
  <button data-view="focus">Focus</button>
  <button data-view="map">Map</button>
</nav>

<section class="search" id="search-bar">
  <input id="q" type="search" placeholder="Search concepts, tiers, verses…" autocomplete="off" />
</section>

<main>
  <div id="view-browse"></div>
  <div id="view-focus" hidden></div>
  <div id="view-map" hidden></div>
</main>

</div>

<footer>
  <span id="stats"></span>
</footer>

<script>
/* === inlined from data.js === */
/* Bhagavad Gītā Concept Knowledge Graph — Madhva siddhānta reading
 *
 * Author intent: ontology of CONCEPTS taught in the Gītā, organized into 12 tiers,
 *                with every node anchored to a specific verse (or short verse range)
 *                and read through Madhva's commentary tradition (Gītā-bhāṣya +
 *                Bannanje Govindacharya's Kannada exposition).
 *
 * Tri-script: every node has IAST (en), Devanāgarī (dev), Kannada lipi (kn).
 *
 * Tiers (12) — see TIERS array below.
 */

const TIERS = [
  { id:'paramartha',   en:'Paramārtha',    dev:'परमार्थ',      kn:'ಪರಮಾರ್ಥ',     gloss:'Ultimate reality — Hari, the sarvottama' },
  { id:'tattva',       en:'Tattva',        dev:'तत्त्व',         kn:'ತತ್ತ್ವ',         gloss:'Metaphysical categories — jīva, prakṛti, kāla' },
  { id:'kshetra',      en:'Kṣetra-Kṣetrajña', dev:'क्षेत्र-क्षेत्रज्ञ', kn:'ಕ್ಷೇತ್ರ-ಕ್ಷೇತ್ರಜ್ಞ', gloss:'Field & field-knower — body, knower, 24 elements (Ch 13)' },
  { id:'guna',         en:'Guṇa',          dev:'गुण',           kn:'ಗುಣ',          gloss:'The three modes of prakṛti — sattva, rajas, tamas' },
  { id:'yoga',         en:'Yoga',          dev:'योग',           kn:'ಯೋಗ',         gloss:'Paths — karma, jñāna, bhakti, dhyāna, sannyāsa' },
  { id:'sadhana',      en:'Sādhanā',       dev:'साधना',         kn:'ಸಾಧನಾ',         gloss:'Practices — śraddhā, vairāgya, yajña, tapas, tyāga' },
  { id:'antahkarana',  en:'Antaḥkaraṇa',   dev:'अन्तःकरण',      kn:'ಅಂತಃಕರಣ',     gloss:'Inner instrument — manas, buddhi, ahaṅkāra, indriyas' },
  { id:'dharma',       en:'Dharma',        dev:'धर्म',           kn:'ಧರ್ಮ',         gloss:'Ethics — svadharma, niṣkāma-karma, sthita-prajña' },
  { id:'dosha',        en:'Doṣa',          dev:'दोष',           kn:'ದೋಷ',          gloss:'Defects — kāma, krodha, lobha, moha, asat-saṅga' },
  { id:'phala',        en:'Phala',         dev:'फल',            kn:'ಫಲ',           gloss:'Goals & states — mokṣa, paramagati, brāhmī-sthiti' },
  { id:'yajna',        en:'Yajña',         dev:'यज्ञ',           kn:'ಯಜ್ಞ',          gloss:'Sacrifice varieties — dravya, tapo, jñāna, svādhyāya' },
  { id:'pratika',      en:'Pratīka',       dev:'प्रतीक',          kn:'ಪ್ರತೀಕ',        gloss:'Symbols & metaphors — aśvattha, ratha, praṇava' },
];

const TIER_COLOR = {
  paramartha:'#8b1e1a', tattva:'#a83f1a', kshetra:'#b8702a',
  guna:'#c69e2a', yoga:'#7b8d2e', sadhana:'#3f7a4a',
  antahkarana:'#2f6e7a', dharma:'#3a4a7a', dosha:'#5a3e6a',
  phala:'#7a1e5a', yajna:'#6a2e2e', pratika:'#3e3a32',
};

const TIER_INDEX = Object.fromEntries(TIERS.map((t,i)=>[t.id,i]));

/* ============================================================================
 * NODES — concept entries
 * ============================================================================
 * Schema: { id, tier, en, dev, kn, title, note, refs, madhva (optional flag/note) }
 *   - id: stable slug, ascii-only
 *   - en / dev / kn: the label in each script
 *   - title: short subtitle (English; the script-specific HTMLs override)
 *   - note: 2-3 sentence doctrinal note from a Madhva angle
 *   - refs: anchor verse(s) — BG x.y format
 *   - madhva: short note where Madhva's reading is distinctive (optional)
 */

const NODES = [
  /* ---------------- Paramārtha (8) ---------------- */
  { id:'brahman', tier:'paramartha',
    en:'Brahman', dev:'ब्रह्मन्', kn:'ಬ್ರಹ್ಮನ್',
    title:'Brahman — the Supreme',
    note:"For Madhva, Brahman names Viṣṇu/Nārāyaṇa alone — sarvottama, the puruṣottama beyond kṣara and akṣara. Not a generic 'absolute'.",
    refs:'BG 8.3 · 14.27 · 15.18',
    madhva:'Brahman = Viṣṇu (not nirguṇa absolute as in Advaita).' },
  { id:'paramatman', tier:'paramartha',
    en:'Paramātman', dev:'परमात्मन्', kn:'ಪರಮಾತ್ಮನ್',
    title:'Paramātman — the indweller',
    note:"The 'highest Self' standing in every body as the witness, sustainer, ordainer. Distinct from jīva (BG 15.17).",
    refs:'BG 13.22 · 15.17',
    madhva:'Always tri-vidha — different from kṣara (perishable) and akṣara (jīva).' },
  { id:'purushottama', tier:'paramartha',
    en:'Puruṣottama', dev:'पुरुषोत्तम', kn:'ಪುರುಷೋತ್ತಮ',
    title:'Puruṣottama — the supreme person',
    note:"Krishna's self-designation as the puruṣa beyond the perishable and the imperishable. The hermeneutic center of Ch 15.",
    refs:'BG 15.18–19',
    madhva:'Strictly = Hari. Not jīva-paramātman aikya as Advaita reads.' },
  { id:'ksara_purusha', tier:'paramartha',
    en:'Kṣara-puruṣa', dev:'क्षरपुरुष', kn:'ಕ್ಷರಪುರುಷ',
    title:'The perishable puruṣa',
    note:"The collectivity of bound jīvas in saṃsāra — 'all beings' subject to change. Lower step in the Ch 15 ladder.",
    refs:'BG 15.16' },
  { id:'akshara_purusha', tier:'paramartha',
    en:'Akṣara-puruṣa', dev:'अक्षरपुरुष', kn:'ಅಕ್ಷರಪುರುಷ',
    title:'The imperishable puruṣa',
    note:"The kūṭa-stha — for Madhva, Lakṣmī, the eternally-liberated jīva-gaṇa-mukhya. Sarvottama after Hari.",
    refs:'BG 15.16',
    madhva:'Madhva: akṣara = Śrī/Lakṣmī, not impersonal Brahman as Advaita reads.' },
  { id:'avatara', tier:'paramartha',
    en:'Avatāra', dev:'अवतार', kn:'ಅವತಾರ',
    title:'Divine descent',
    note:"Hari assumes form in age after age to restore dharma and protect the sādhus. The body is sva-icchā, not karma-bound.",
    refs:'BG 4.6–8' },
  { id:'svarupa_aikya', tier:'paramartha',
    en:'Svarūpa-aikya', dev:'स्वरूपैक्य', kn:'ಸ್ವರೂಪೈಕ್ಯ',
    title:'Identity of Hari\'s forms',
    note:"Krishna, Viṣṇu, Nārāyaṇa, Vāsudeva — no svarūpa-bheda. One paramātman with multiple manifestation-forms (vyūha).",
    refs:'BG 10.20 · 11.24',
    madhva:'Madhva-distinctive: rejects panentheism, preserves form-realism.' },
  { id:'sarvottamatva', tier:'paramartha',
    en:'Sarvottamatva', dev:'सर्वोत्तमत्व', kn:'ಸರ್ವೋತ್ತಮತ್ವ',
    title:'Hari\'s absolute supremacy',
    note:"The axiom anchoring tāratamya: Hari is highest, no one his equal or superior. Every other being is strictly subordinate.",
    refs:'BG 7.7 · 11.43 · 18.65',
    madhva:'Foundational Madhva siddhānta — pañca-bheda starts here.' },
  { id:'taratamya', tier:'paramartha',
    en:'Tāratamya', dev:'तारतम्य', kn:'ತಾರತಮ್ಯ',
    title:'Gradation of being',
    note:"The strict hierarchy of all reality under Hari — every soul has a definite, irreversible rank. The architectural principle of Madhva metaphysics.",
    refs:'BG 7.7 · 15.16–18',
    madhva:'Distinctively Madhva. Underwrites pañca-bheda and the gradations of mukti.' },
  { id:'pancha_bheda', tier:'paramartha',
    en:'Pañca-bheda', dev:'पञ्चभेद', kn:'ಪಂಚಭೇದ',
    title:'Five real differences',
    note:"Hari-jīva, Hari-jaḍa, jīva-jaḍa, jīva-jīva, jaḍa-jaḍa — five eternal differences that Madhva siddhānta defends as ontologically real.",
    refs:'BG 7.4–5 · 15.7 · 15.16–18',
    madhva:'Madhva-defining. Each bheda is anchored in BG (jīva 15.7, jīva-jīva-bheda implicit in svabhāva 18.41ff).' },

  /* ---------------- Tattva (8) ---------------- */
  { id:'jiva', tier:'tattva',
    en:'Jīva', dev:'जीव', kn:'ಜೀವ',
    title:'The embodied self',
    note:"An eternal aṃśa of Hari (BG 15.7) — real, distinct, plural, never merged with Brahman. Bound by avidyā until released.",
    refs:'BG 15.7',
    madhva:'Jīva-bheda is real (pañca-bheda #1). Plurality of jīvas is eternal.' },
  { id:'isvara', tier:'tattva',
    en:'Īśvara', dev:'ईश्वर', kn:'ಈಶ್ವರ',
    title:'The Lord as ordainer',
    note:"Hari as antaryāmī — stands in every heart and directs (yantra-ārūḍha-māyā) the jīvas as if mounted on a machine.",
    refs:'BG 18.61' },
  { id:'prakriti', tier:'tattva',
    en:'Prakṛti', dev:'प्रकृति', kn:'ಪ್ರಕೃತಿ',
    title:'Material nature',
    note:"Hari's own lower nature — eightfold: earth, water, fire, air, ether, manas, buddhi, ahaṅkāra. The womb of all forms.",
    refs:'BG 7.4–5 · 9.10',
    madhva:'Prakṛti is real, dependent on Hari (not māyā as illusion).' },
  { id:'para_prakriti', tier:'tattva',
    en:'Para-prakṛti', dev:'पराप्रकृति', kn:'ಪರಾಪ್ರಕೃತಿ',
    title:'The higher nature',
    note:"The jīva-bhūta — Hari's higher nature by which the universe is upheld. Distinct from the eightfold material prakṛti.",
    refs:'BG 7.5' },
  { id:'kala', tier:'tattva',
    en:'Kāla', dev:'काल', kn:'ಕಾಲ',
    title:'Time as Hari',
    note:"'I am time, the destroyer of worlds' (BG 11.32). Kāla is Hari's instrumentality of dissolution — not an independent tattva.",
    refs:'BG 10.30 · 11.32' },
  { id:'karma_tattva', tier:'tattva',
    en:'Karma', dev:'कर्म', kn:'ಕರ್ಮ',

  'karma_yoga': { dev:'कर्मण्येवाधिकारस्ते मा फलेषु कदाचन।\nमा कर्मफलहेतुर्भूर्मा ते सङ्गोऽस्त्वकर्मणि॥', iast:'karmaṇy evādhikāras te mā phaleṣu kadācana |\nmā karma-phala-hetur bhūr mā te saṅgo \'stv akarmaṇi ||', kn:'ಕರ್ಮಣ್ಯೇವಾಧಿಕಾರಸ್ತೇ ಮಾ ಫಲೇಷು ಕದಾಚನ।\nಮಾ ಕರ್ಮಫಲಹೇತುರ್ಭೂರ್ಮಾ ತೇ ಸಂಗೋಽಸ್ತ್ವಕರ್ಮಣಿ॥', ref:'BG 2.47' },
  'jnana_yoga': { dev:'न हि ज्ञानेन सदृशं पवित्रमिह विद्यते।\nतत्स्वयं योगसंसिद्धः कालेनात्मनि विन्दति॥', iast:'na hi jñānena sadṛśaṃ pavitram iha vidyate |\ntat svayaṃ yoga-saṃsiddhaḥ kālenātmani vindati ||', kn:'ನ ಹಿ ಜ್ಞಾನೇನ ಸದೃಶಂ ಪವಿತ್ರಮಿಹ ವಿದ್ಯತೇ।\nತತ್ಸ್ವಯಂ ಯೋಗಸಂಸಿದ್ಧಃ ಕಾಲೇನಾತ್ಮನಿ ವಿಂದತಿ॥', ref:'BG 4.38' },
  'bhakti_yoga': { dev:'मन्मना भव मद्भक्तो मद्याजी मां नमस्कुरु।\nमामेवैष्यसि सत्यं ते प्रतिजाने प्रियोऽसि मे॥', iast:'man-manā bhava mad-bhakto mad-yājī māṃ namaskuru |\nmām evaiṣyasi satyaṃ te pratijāne priyo \'si me ||', kn:'ಮನ್ಮನಾ ಭವ ಮದ್ಭಕ್ತೋ ಮದ್ಯಾಜೀ ಮಾಂ ನಮಸ್ಕುರು।\nಮಾಮೇವೈಷ್ಯಸಿ ಸತ್ಯಂ ತೇ ಪ್ರತಿಜಾನೇ ಪ್ರಿಯೋಽಸಿ ಮೇ॥', ref:'BG 18.65' },
  'dhyana_yoga': { dev:'योगी युञ्जीत सततमात्मानं रहसि स्थितः।\nएकाकी यतचित्तात्मा निराशीरपरिग्रहः॥', iast:'yogī yuñjīta satatam ātmānaṃ rahasi sthitaḥ |\nekākī yata-cittātmā nirāśīr aparigrahaḥ ||', kn:'ಯೋಗೀ ಯುಂಜೀತ ಸತತಮಾತ್ಮಾನಂ ರಹಸಿ ಸ್ಥಿತಃ।\nಏಕಾಕೀ ಯತಚಿತ್ತಾತ್ಮಾ ನಿರಾಶೀರಪರಿಗ್ರಹಃ॥', ref:'BG 6.10' },
  'samatva': { dev:'योगस्थः कुरु कर्माणि सङ्गं त्यक्त्वा धनञ्जय।\nसिद्ध्यसिद्ध्योः समो भूत्वा समत्वं योग उच्यते॥', iast:'yoga-sthaḥ kuru karmāṇi saṅgaṃ tyaktvā dhanañjaya |\nsiddhy-asiddhyoḥ samo bhūtvā samatvaṃ yoga ucyate ||', kn:'ಯೋಗಸ್ಥಃ ಕುರು ಕರ್ಮಾಣಿ ಸಂಗಂ ತ್ಯಕ್ತ್ವಾ ಧನಂಜಯ।\nಸಿದ್ಧ್ಯಸಿದ್ಧ್ಯೋಃ ಸಮೋ ಭೂತ್ವಾ ಸಮತ್ವಂ ಯೋಗ ಉಚ್ಯತೇ॥', ref:'BG 2.48' },
  'sharanagati': { dev:'सर्वधर्मान्परित्यज्य मामेकं शरणं व्रज।\nअहं त्वा सर्वपापेभ्यो मोक्षयिष्यामि मा शुचः॥', iast:'sarva-dharmān parityajya mām ekaṃ śaraṇaṃ vraja |\nahaṃ tvā sarva-pāpebhyo mokṣayiṣyāmi mā śucaḥ ||', kn:'ಸರ್ವಧರ್ಮಾನ್ಪರಿತ್ಯಜ್ಯ ಮಾಮೇಕಂ ಶರಣಂ ವ್ರಜ।\nಅಹಂ ತ್ವಾ ಸರ್ವಪಾಪೇಭ್ಯೋ ಮೋಕ್ಷಯಿಷ್ಯಾಮಿ ಮಾ ಶುಚಃ॥', ref:'BG 18.66' },

  'sthitaprajna': { dev:'दुःखेष्वनुद्विग्नमनाः सुखेषु विगतस्पृहः।\nवीतरागभयक्रोधः स्थितधीर्मुनिरुच्यते॥', iast:'duḥkheṣv anudvigna-manāḥ sukheṣu vigata-spṛhaḥ |\nvīta-rāga-bhaya-krodhaḥ sthita-dhīr munir ucyate ||', kn:'ದುಃಖೇಷ್ವನುದ್ವಿಗ್ನಮನಾಃ ಸುಖೇಷು ವಿಗತಸ್ಪೃಹಃ।\nವೀತರಾಗಭಯಕ್ರೋಧಃ ಸ್ಥಿತಧೀರ್ಮುನಿರುಚ್ಯತೇ॥', ref:'BG 2.56' },
  'svadharma': { dev:'श्रेयान्स्वधर्मो विगुणः परधर्मात्स्वनुष्ठितात्।\nस्वधर्मे निधनं श्रेयः परधर्मो भयावहः॥', iast:'śreyān sva-dharmo viguṇaḥ para-dharmāt sv-anuṣṭhitāt |\nsva-dharme nidhanaṃ śreyaḥ para-dharmo bhayāvahaḥ ||', kn:'ಶ್ರೇಯಾನ್ಸ್ವಧರ್ಮೋ ವಿಗುಣಃ ಪರಧರ್ಮಾತ್ಸ್ವನುಷ್ಠಿತಾತ್।\nಸ್ವಧರ್ಮೇ ನಿಧನಂ ಶ್ರೇಯಃ ಪರಧರ್ಮೋ ಭಯಾವಹಃ॥', ref:'BG 3.35' },
  'nishkama_karma': { dev:'कर्मण्येवाधिकारस्ते मा फलेषु कदाचन।', iast:'karmaṇy evādhikāras te mā phaleṣu kadācana |', kn:'ಕರ್ಮಣ್ಯೇವಾಧಿಕಾರಸ್ತೇ ಮಾ ಫಲೇಷು ಕದಾಚನ।', ref:'BG 2.47' },
  'daivi_sampad': { dev:'दैवी सम्पद्विमोक्षाय निबन्धायासुरी मता।\nमा शुचः सम्पदं दैवीमभिजातोऽसि पाण्डव॥', iast:'daivī sampad vimokṣāya nibandhāyāsurī matā |\nmā śucaḥ sampadaṃ daivīm abhijāto \'si pāṇḍava ||', kn:'ದೈವೀ ಸಂಪದ್ವಿಮೋಕ್ಷಾಯ ನಿಬಂಧಾಯಾಸುರೀ ಮತಾ।\nಮಾ ಶುಚಃ ಸಂಪದಂ ದೈವೀಮಭಿಜಾತೋಽಸಿ ಪಾಂಡವ॥', ref:'BG 16.5' },

  'kama': { dev:'काम एष क्रोध एष रजोगुणसमुद्भवः।\nमहाशनो महापाप्मा विद्ध्येनमिह वैरिणम्॥', iast:'kāma eṣa krodha eṣa rajo-guṇa-samudbhavaḥ |\nmahāśano mahā-pāpmā viddhy enam iha vairiṇam ||', kn:'ಕಾಮ ಏಷ ಕ್ರೋಧ ಏಷ ರಜೋಗುಣಸಮುದ್ಭವಃ।\nಮಹಾಶನೋ ಮಹಾಪಾಪ್ಮಾ ವಿದ್ಧ್ಯೇನಮಿಹ ವೈರಿಣಮ್॥', ref:'BG 3.37' },
  'krodha': { dev:'क्रोधाद्भवति सम्मोहः सम्मोहात्स्मृतिविभ्रमः।\nस्मृतिभ्रंशाद् बुद्धिनाशो बुद्धिनाशात्प्रणश्यति॥', iast:'krodhād bhavati sammohaḥ sammohāt smṛti-vibhramaḥ |\nsmṛti-bhraṃśād buddhi-nāśo buddhi-nāśāt praṇaśyati ||', kn:'ಕ್ರೋಧಾದ್ಭವತಿ ಸಮ್ಮೋಹಃ ಸಮ್ಮೋಹಾತ್ಸ್ಮೃತಿವಿಭ್ರಮಃ।\nಸ್ಮೃತಿಭ್ರಂಶಾದ್ ಬುದ್ಧಿನಾಶೋ ಬುದ್ಧಿನಾಶಾತ್ಪ್ರಣಶ್ಯತಿ॥', ref:'BG 2.63' },
  'asatsanga': { dev:'ध्यायतो विषयान्पुंसः सङ्गस्तेषूपजायते।\nसङ्गात्सञ्जायते कामः कामात्क्रोधोऽभिजायते॥', iast:'dhyāyato viṣayān puṃsaḥ saṅgas teṣūpajāyate |\nsaṅgāt sañjāyate kāmaḥ kāmāt krodho \'bhijāyate ||', kn:'ಧ್ಯಾಯತೋ ವಿಷಯಾನ್ಪುಂಸಃ ಸಂಗಸ್ತೇಷೂಪಜಾಯತೇ।\nಸಂಗಾತ್ಸಂಜಾಯತೇ ಕಾಮಃ ಕಾಮಾತ್ಕ್ರೋಧೋಽಭಿಜಾಯತೇ॥', ref:'BG 2.62' },
  'asuri_sampad': { dev:'त्रिविधं नरकस्येदं द्वारं नाशनमात्मनः।\nकामः क्रोधस्तथा लोभस्तस्मादेतत्त्रयं त्यजेत्॥', iast:'tri-vidhaṃ narakasyedaṃ dvāraṃ nāśanam ātmanaḥ |\nkāmaḥ krodhas tathā lobhas tasmād etat trayaṃ tyajet ||', kn:'ತ್ರಿವಿಧಂ ನರಕಸ್ಯೇದಂ ದ್ವಾರಂ ನಾಶನಮಾತ್ಮನಃ।\nಕಾಮಃ ಕ್ರೋಧಸ್ತಥಾ ಲೋಭಸ್ತಸ್ಮಾದೇತತ್ತ್ರಯಂ ತ್ಯಜೇತ್॥', ref:'BG 16.21' },

  'moksha': { dev:'अनाश्रितः कर्मफलं कार्यं कर्म करोति यः।\nस सन्न्यासी च योगी च न निरग्निर्न चाक्रियः॥', iast:'anāśritaḥ karma-phalaṃ kāryaṃ karma karoti yaḥ |\nsa sannyāsī ca yogī ca na niragnir na cākriyaḥ ||', kn:'ಅನಾಶ್ರಿತಃ ಕರ್ಮಫಲಂ ಕಾರ್ಯಂ ಕರ್ಮ ಕರೋತಿ ಯಃ।\nಸ ಸನ್ನ್ಯಾಸೀ ಚ ಯೋಗೀ ಚ ನ ನಿರಗ್ನಿರ್ನ ಚಾಕ್ರಿಯಃ॥', ref:'BG 6.1' },
  'paramagati': { dev:'यद्गत्वा न निवर्तन्ते तद्धाम परमं मम।', iast:'yad gatvā na nivartante tad dhāma paramaṃ mama |', kn:'ಯದ್ಗತ್ವಾ ನ ನಿವರ್ತಂತೇ ತದ್ಧಾಮ ಪರಮಂ ಮಮ।', ref:'BG 15.6' },
  'brahmi_sthiti': { dev:'एषा ब्राह्मी स्थितिः पार्थ नैनां प्राप्य विमुह्यति।\nस्थित्वास्यामन्तकालेऽपि ब्रह्मनिर्वाणमृच्छति॥', iast:'eṣā brāhmī sthitiḥ pārtha naināṃ prāpya vimuhyati |\nsthitvāsyām anta-kāle \'pi brahma-nirvāṇam ṛcchati ||', kn:'ಏಷಾ ಬ್ರಾಹ್ಮೀ ಸ್ಥಿತಿಃ ಪಾರ್ಥ ನೈನಾಂ ಪ್ರಾಪ್ಯ ವಿಮುಹ್ಯತಿ।\nಸ್ಥಿತ್ವಾಸ್ಯಾಮಂತಕಾಲೇಽಪಿ ಬ್ರಹ್ಮನಿರ್ವಾಣಮೃಚ್ಛತಿ॥', ref:'BG 2.72' },

  'jnana_yajna': { dev:'श्रेयान्द्रव्यमयाद्यज्ञाज्ज्ञानयज्ञः परन्तप।\nसर्वं कर्माखिलं पार्थ ज्ञाने परिसमाप्यते॥', iast:'śreyān dravyamayād yajñāj jñāna-yajñaḥ parantapa |\nsarvaṃ karmākhilaṃ pārtha jñāne parisamāpyate ||', kn:'ಶ್ರೇಯಾನ್ದ್ರವ್ಯಮಯಾದ್ಯಜ್ಞಾಜ್ಜ್ಞಾನಯಜ್ಞಃ ಪರಂತಪ।\nಸರ್ವಂ ಕರ್ಮಾಖಿಲಂ ಪಾರ್ಥ ಜ್ಞಾನೇ ಪರಿಸಮಾಪ್ಯತೇ॥', ref:'BG 4.33' },
  'brahmarpana': { dev:'ब्रह्मार्पणं ब्रह्म हविर्ब्रह्माग्नौ ब्रह्मणा हुतम्।\nब्रह्मैव तेन गन्तव्यं ब्रह्मकर्मसमाधिना॥', iast:'brahmārpaṇaṃ brahma havir brahmāgnau brahmaṇā hutam |\nbrahmaiva tena gantavyaṃ brahma-karma-samādhinā ||', kn:'ಬ್ರಹ್ಮಾರ್ಪಣಂ ಬ್ರಹ್ಮ ಹವಿರ್ಬ್ರಹ್ಮಾಗ್ನೌ ಬ್ರಹ್ಮಣಾ ಹುತಮ್।\nಬ್ರಹ್ಮೈವ ತೇನ ಗಂತವ್ಯಂ ಬ್ರಹ್ಮಕರ್ಮಸಮಾಧಿನಾ॥', ref:'BG 4.24' },

  'ashvattha': { dev:'ऊर्ध्वमूलमधःशाखमश्वत्थं प्राहुरव्ययम्।\nछन्दांसि यस्य पर्णानि यस्तं वेद स वेदवित्॥', iast:'ūrdhva-mūlam adhaḥ-śākham aśvatthaṃ prāhur avyayam |\nchandāṃsi yasya parṇāni yas taṃ veda sa vedavit ||', kn:'ಊರ್ಧ್ವಮೂಲಮಧಃಶಾಖಮಶ್ವತ್ಥಂ ಪ್ರಾಹುರವ್ಯಯಮ್।\nಛಂದಾಂಸಿ ಯಸ್ಯ ಪರ್ಣಾನಿ ಯಸ್ತಂ ವೇದ ಸ ವೇದವಿತ್॥', ref:'BG 15.1' },
  'pranava_om': { dev:'ओमित्येकाक्षरं ब्रह्म व्याहरन्मामनुस्मरन्।\nयः प्रयाति त्यजन्देहं स याति परमां गतिम्॥', iast:'om ity ekākṣaraṃ brahma vyāharan mām anusmaran |\nyaḥ prayāti tyajan dehaṃ sa yāti paramāṃ gatim ||', kn:'ಓಮಿತ್ಯೇಕಾಕ್ಷರಂ ಬ್ರಹ್ಮ ವ್ಯಾಹರನ್ಮಾಮನುಸ್ಮರನ್।\nಯಃ ಪ್ರಯಾತಿ ತ್ಯಜನ್ದೇಹಂ ಸ ಯಾತಿ ಪರಮಾಂ ಗತಿಮ್॥', ref:'BG 8.13' },
  'jyotir_jyoti': { dev:'ज्योतिषामपि तज्ज्योतिस्तमसः परमुच्यते।\nज्ञानं ज्ञेयं ज्ञानगम्यं हृदि सर्वस्य विष्ठितम्॥', iast:'jyotiṣām api taj jyotis tamasaḥ param ucyate |\njñānaṃ jñeyaṃ jñāna-gamyaṃ hṛdi sarvasya viṣṭhitam ||', kn:'ಜ್ಯೋತಿಷಾಮಪಿ ತಜ್ಜ್ಯೋತಿಸ್ತಮಸಃ ಪರಮುಚ್ಯತೇ।\nಜ್ಞಾನಂ ಜ್ಞೇಯಂ ಜ್ಞಾನಗಮ್ಯಂ ಹೃದಿ ಸರ್ವಸ್ಯ ವಿಷ್ಠಿತಮ್॥', ref:'BG 13.17' },

  // ===== Added shlokas (mukti-gradations, Madhva schemata, Ch 13/17/18 themes) =====
  'taratamya': { dev:'मत्तः परतरं नान्यत्किञ्चिदस्ति धनञ्जय।\nमयि सर्वमिदं प्रोतं सूत्रे मणिगणा इव॥', iast:"mattaḥ parataraṃ nānyat kiñcid asti dhanañjaya |\nmayi sarvam idaṃ protaṃ sūtre maṇi-gaṇā iva ||", kn:'ಮತ್ತಃ ಪರತರಂ ನಾನ್ಯತ್ಕಿಂಚಿದಸ್ತಿ ಧನಂಜಯ।\nಮಯಿ ಸರ್ವಮಿದಂ ಪ್ರೋತಂ ಸೂತ್ರೇ ಮಣಿಗಣಾ ಇವ॥', ref:'BG 7.7' },
  'pancha_bheda': { dev:'ममैवांशो जीवलोके जीवभूतः सनातनः।', iast:"mamaivāṃśo jīva-loke jīva-bhūtaḥ sanātanaḥ |", kn:'ಮಮೈವಾಂಶೋ ಜೀವಲೋಕೇ ಜೀವಭೂತಃ ಸನಾತನಃ।', ref:'BG 15.7' },
  'jnana_angas': { dev:'अमानित्वमदम्भित्वमहिंसा क्षान्तिरार्जवम्।\nआचार्योपासनं शौचं स्थैर्यमात्मविनिग्रहः॥', iast:"amānitvam adambhitvam ahiṃsā kṣāntir ārjavam |\nācāryopāsanaṃ śaucaṃ sthairyam ātma-vinigrahaḥ ||", kn:'ಅಮಾನಿತ್ವಮದಂಭಿತ್ವಮಹಿಂಸಾ ಕ್ಷಾಂತಿರಾರ್ಜವಮ್।\nಆಚಾರ್ಯೋಪಾಸನಂ ಶೌಚಂ ಸ್ಥೈರ್ಯಮಾತ್ಮವಿನಿಗ್ರಹಃ॥', ref:'BG 13.7' },
  'amanitva': { dev:'अमानित्वमदम्भित्वमहिंसा क्षान्तिरार्जवम्।', iast:"amānitvam adambhitvam ahiṃsā kṣāntir ārjavam |", kn:'ಅಮಾನಿತ್ವಮದಂಭಿತ್ವಮಹಿಂಸಾ ಕ್ಷಾಂತಿರಾರ್ಜವಮ್।', ref:'BG 13.7' },

<script>
/* ============================================================================
   Renderer
   ============================================================================ */
const state = { lang:'en', view:'browse', focusId:null, q:'' };

function setLang(lang){
  state.lang = lang;
  document.body.classList.remove('lang-en','lang-dev','lang-kn');
  document.body.classList.add('lang-'+lang);
  document.querySelectorAll('#lang-tabs button').forEach(b=>{
    b.classList.toggle('on', b.dataset.lang===lang);
  });
  render();
}

function setView(v, id){
  state.view = v;
  if (id) state.focusId = id;
  document.querySelectorAll('#view-tabs button').forEach(b=>{
    b.classList.toggle('on', b.dataset.view===v);
  });
  document.getElementById('view-browse').hidden = v!=='browse';
  document.getElementById('view-focus').hidden  = v!=='focus';
  document.getElementById('view-map').hidden    = v!=='map';
  document.getElementById('search-bar').hidden  = v==='map';
  window.scrollTo({top:0, behavior:'instant'});
  render();
}

function labelOf(n){
  return state.lang==='dev' ? n.dev : state.lang==='kn' ? n.kn : n.en;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function highlight(s, q){
  if (!q) return escapeHtml(s);
  const idx = s.toLowerCase().indexOf(q.toLowerCase());
  if (idx<0) return escapeHtml(s);
  return escapeHtml(s.slice(0,idx)) + '<span class="hl">'+escapeHtml(s.slice(idx,idx+q.length))+'</span>' + escapeHtml(s.slice(idx+q.length));
}

const NODE_BY_ID = Object.fromEntries(NODES.map(n=>[n.id,n]));
const TIER_BY_ID = Object.fromEntries(TIERS.map(t=>[t.id,t]));
const ADJ = {};
NODES.forEach(n => ADJ[n.id] = { out:[], in:[] });
EDGES.forEach(e=>{
  if (!ADJ[e.source] || !ADJ[e.target]) return;
  ADJ[e.source].out.push(e);
  ADJ[e.target].in.push(e);
});

/* ---------- BROWSE ---------- */
function renderBrowse(){
  const root = document.getElementById('view-browse');
  const q = state.q.trim().toLowerCase();
  let html = '';

  const matches = (n) => {
    if (!q) return true;
    const hay = [n.en, n.dev, n.kn, n.title, n.note, n.refs, n.tier].join(' ').toLowerCase();
    return hay.includes(q);
  };

  let total = 0;
  TIERS.forEach(tier=>{
    const nodes = NODES.filter(n => n.tier===tier.id && matches(n));
    if (!nodes.length) return;
    total += nodes.length;
    html += `<section class="tier-section">
      <div class="tier-head">
        <span class="tier-dot" style="background:var(--t-${tier.id})"></span>
        <span class="tier-name">${escapeHtml(state.lang==='dev'?tier.dev:state.lang==='kn'?tier.kn:tier.en)}</span>
        <span class="tier-gloss">${escapeHtml(tier.gloss)}</span>
        <span class="tier-count">${nodes.length}</span>
      </div>
    </section>
    <ul class="entry-list">`;
    nodes.forEach(n=>{
      const lab = labelOf(n);
      html += `<li data-id="${n.id}">
        <div>
          <div class="label">${highlight(lab,q)}</div>
          <div class="sub">${escapeHtml(n.title)}</div>
        </div>
        <div class="ref">${escapeHtml(n.refs)}</div>
      </li>`;
    });
    html += `</ul>`;
  });

  if (!total){
    html = `<div style="padding:40px 20px;text-align:center;color:var(--ink-fade)">No concepts match "${escapeHtml(state.q)}".</div>`;
  }
  root.innerHTML = html;
}

/* ---------- FOCUS ---------- */
function renderFocus(){
  const root = document.getElementById('view-focus');
  const id = state.focusId || NODES[0].id;
  const n = NODE_BY_ID[id];
  if (!n){ root.innerHTML = `<div style="padding:20px">Concept not found.</div>`; return; }
  const tier = TIER_BY_ID[n.tier];

  let html = `<article class="focus-card">
    <span class="tier-badge" style="--tc:var(--t-${tier.id})">
      <style>.focus-card .tier-badge::before{background:var(--t-${tier.id})}</style>
      ${escapeHtml(state.lang==='dev'?tier.dev:state.lang==='kn'?tier.kn:tier.en)}
    </span>
    <h1>${escapeHtml(labelOf(n))}</h1>
    <div class="subtitle">${escapeHtml(n.title)}</div>
    <p class="note">${escapeHtml(n.note)}</p>
    ${n.madhva ? `<div class="madhva">${escapeHtml(n.madhva)}</div>` : ''}
    <div class="refs">${escapeHtml(n.refs)}</div>
  </article>`;

  // shloka card
  const s = SHLOKAS[n.id];
  if (s){
    const scriptText = state.lang==='dev' ? s.dev : state.lang==='kn' ? s.kn : s.iast;
    html += `<section class="shloka">
      <div class="shloka-script">${escapeHtml(scriptText)}</div>
      <div class="shloka-ref">— ${escapeHtml(s.ref)}</div>
    </section>`;
  }

  // relations
  const out = ADJ[n.id]?.out || [];
  const inc = ADJ[n.id]?.in || [];
  if (out.length || inc.length){
    html += `<section class="relations">`;
    if (out.length){
      html += `<h2>Outgoing</h2><ul>`;
      out.forEach(e=>{
        const other = NODE_BY_ID[e.target];
        if (!other) return;
        const colorVar = `--e-${e.type}`;
        html += `<li data-id="${other.id}">
          <span class="edge-type" style="background:var(${colorVar})">${escapeHtml(e.type)}</span>
          <span class="edge-label">${escapeHtml(e.label||'')}</span>
          <span class="other">${escapeHtml(labelOf(other))} →</span>
        </li>`;
      });
      html += `</ul>`;
    }
    if (inc.length){
      html += `<h2>Incoming</h2><ul>`;
      inc.forEach(e=>{
        const other = NODE_BY_ID[e.source];
        if (!other) return;
        const colorVar = `--e-${e.type}`;
        html += `<li data-id="${other.id}">
          <span class="edge-type" style="background:var(${colorVar})">${escapeHtml(e.type)}</span>
          <span class="edge-label">${escapeHtml(e.label||'')}</span>
          <span class="other">← ${escapeHtml(labelOf(other))}</span>
        </li>`;
      });
      html += `</ul>`;
    }
    html += `</section>`;
  }

  root.innerHTML = html;
}

/* ---------- MAP — uses hand-laid KG_POSITIONS if positions.js loaded,
                  falls back to auto-layout otherwise ---------- */
const HAS_HANDLAID = (typeof KG_POSITIONS !== 'undefined') && (typeof KG_TIER_BANDS !== 'undefined');

function renderMap(){
  const root = document.getElementById('view-map');

  if (HAS_HANDLAID) return renderMapHandLaid(root);
  return renderMapAuto(root);
}

function renderMapHandLaid(root){
  const W = 1000, H = 1500;
  const showSet = (typeof KG_SHOW_EDGE_TYPES !== 'undefined') ? KG_SHOW_EDGE_TYPES : null;
  const fontFam = state.lang==='dev'?'Tiro Devanagari Sanskrit':state.lang==='kn'?'Tiro Kannada':'Cormorant Garamond';
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;

  // tier bands (alternating washes, plus optional side-column for yajna)
  KG_TIER_BANDS.forEach((band,bi)=>{
    const x = band.side ? 900 : (band.half==='right' ? W/2 : 0);
    const w = band.side ? 100 : (band.half ? W/2 : W);
    svg += `<rect x="${x}" y="${band.yTop}" width="${w}" height="${band.yBottom-band.yTop}" fill="${bi%2 ? 'rgba(214,197,153,.10)' : 'rgba(230,216,176,.18)'}"/>`;
    const tier = TIER_BY_ID[band.tier];
    if (!tier) return;
    const lab = state.lang==='dev'?tier.dev:state.lang==='kn'?tier.kn:tier.en;
    svg += `<text x="${band.label.x}" y="${band.label.y}" font-family="${fontFam}" font-size="13" fill="var(--ink-soft)" font-weight="600">${escapeHtml(lab)}</text>`;
  });

  // edges (filtered + curved)
  EDGES.forEach(e=>{
    if (showSet && !showSet.has(e.type)) return;
    const a = KG_POSITIONS[e.source]; const b = KG_POSITIONS[e.target];
    if (!a || !b) return;
    const [ax,ay] = a, [bx,by] = b;
    const mx = (ax+bx)/2;
    const my = (ay+by)/2 - Math.abs(by-ay)*0.08;
    svg += `<path class="map-edge" d="M ${ax} ${ay} Q ${mx} ${my} ${bx} ${by}" stroke="var(--e-${e.type})" stroke-width="0.7"/>`;
  });

  // nodes
  NODES.forEach(n=>{
    const p = KG_POSITIONS[n.id]; if (!p) return;
    const [x,y,r] = p;
    const lab = labelOf(n);
    const maxLen = state.lang==='en' ? 16 : 12;
    const shown = lab.length > maxLen ? lab.slice(0,maxLen-1)+'…' : lab;
    svg += `<g class="map-node" data-id="${n.id}">
      <circle cx="${x}" cy="${y}" r="${r}" fill="var(--t-${n.tier})" fill-opacity="0.88" stroke="var(--t-${n.tier})" stroke-width="1.2"/>
      <text x="${x}" y="${y + r + 11}" font-family="${fontFam}" font-size="${state.lang==='en'?10:11}">${escapeHtml(shown)}</text>
    </g>`;
  });

  svg += `</svg>`;
  root.innerHTML = `<div class="map-wrap">${svg}</div>`;
}

function renderMapAuto(root){
  // Fallback: stacked rows by tier order
  const W = 820, leftPad = 100, rightPad = 30;
  const tierGap = 84;
  const H = TIERS.length * tierGap + 80;
  const byTier = Object.fromEntries(TIERS.map(t=>[t.id,[]]));
  NODES.forEach(n => { if (byTier[n.tier]) byTier[n.tier].push(n); });
  const pos = {};
  TIERS.forEach((tier, ti)=>{
    const arr = byTier[tier.id];
    const usable = W - leftPad - rightPad;
    arr.forEach((n,i)=>{
      const x = leftPad + (arr.length===1 ? usable/2 : (i/(arr.length-1))*usable);
      const y = 40 + ti*tierGap + 22;
      pos[n.id] = { x, y, r:9 };
    });
  });
  const fontFam = state.lang==='dev'?'Tiro Devanagari Sanskrit':state.lang==='kn'?'Tiro Kannada':'Cormorant Garamond';
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  TIERS.forEach((tier,ti)=>{
    const y = 40 + ti*tierGap;
    svg += `<rect x="0" y="${y-22}" width="${W}" height="${tierGap}" fill="${ti%2 ? 'rgba(214,197,153,.10)' : 'rgba(230,216,176,.18)'}"/>`;
    const lab = state.lang==='dev'?tier.dev:state.lang==='kn'?tier.kn:tier.en;
    svg += `<text x="10" y="${y+4}" font-family="${fontFam}" font-size="12" fill="var(--ink-soft)" font-weight="600">${escapeHtml(lab)}</text>`;
  });
  EDGES.forEach(e=>{
    const a = pos[e.source]; const b = pos[e.target];
    if (!a || !b) return;
    const mx = (a.x+b.x)/2;
    const my = (a.y+b.y)/2 - Math.abs(b.y-a.y)*0.08;
    svg += `<path class="map-edge" d="M ${a.x} ${a.y} Q ${mx} ${my} ${b.x} ${b.y}" stroke="var(--e-${e.type})" stroke-width="0.7"/>`;
  });
  NODES.forEach(n=>{
    const p = pos[n.id]; if (!p) return;
    const lab = labelOf(n);
    const maxLen = state.lang==='en' ? 14 : 10;
    const shown = lab.length > maxLen ? lab.slice(0,maxLen-1)+'\u2026' : lab;
    svg += `<g class="map-node" data-id="${n.id}">
      <circle cx="${p.x}" cy="${p.y}" r="${p.r}" fill="var(--t-${n.tier})" fill-opacity="0.88" stroke="var(--t-${n.tier})" stroke-width="1.2"/>
      <text x="${p.x}" y="${p.y + p.r + 11}" font-family="${fontFam}" font-size="${state.lang==='en'?10:11}">${escapeHtml(shown)}</text>
    </g>`;
  });
  svg += `</svg>`;
  root.innerHTML = `<div class="map-wrap">${svg}</div>`;
}

/* ---------- DISPATCH ---------- */
function render(){
  if (state.view==='browse') renderBrowse();
  else if (state.view==='focus') renderFocus();
  else if (state.view==='map') renderMap();
  const f = document.getElementById('stats');
  if (f) f.textContent = `${NODES.length} concepts \u00b7 ${EDGES.length} relations \u00b7 ${Object.keys(SHLOKAS).length} shlokas \u00b7 ${TIERS.length} tiers`;
}

/* ---------- WIRING ---------- */
document.getElementById('lang-tabs').addEventListener('click', (ev)=>{
  const b = ev.target.closest('button[data-lang]');
  if (!b) return;
  setLang(b.dataset.lang);
});

document.getElementById('view-tabs').addEventListener('click', (ev)=>{
  const b = ev.target.closest('button[data-view]');
  if (!b) return;
  setView(b.dataset.view);
});

document.getElementById('q').addEventListener('input', (ev)=>{
  state.q = ev.target.value;
  if (state.view!=='browse') setView('browse');
  else render();
});

/* Delegated clicks: Browse list items, Focus relation items, and Map node circles
   all use data-id and route to the Focus view. */
document.addEventListener('click', (ev)=>{
  const li = ev.target.closest('li[data-id]');
  if (li){ setView('focus', li.dataset.id); return; }
  const g = ev.target.closest('g.map-node[data-id]');
  if (g){ setView('focus', g.dataset.id); return; }
});

/* Initial render */
render();
</script>
</body>
</html>
