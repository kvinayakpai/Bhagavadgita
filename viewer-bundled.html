    refs:'BG 16.4 · 16.7–20',
    madhva:{en:'For Madhva, tamoyogya jīvas have this as their eternal disposition.',dev:"माध्व-मते तमोयोग्य-जीवानां एषा नित्या स्वाभाविकी प्रवृत्तिः।",kn:"ಮಾಧ್ವ-ಮತೇ ತಮೋಯೋಗ್ಯ-ಜೀವಾನಾಂ ಏಷಾ ನಿತ್ಯಾ ಸ್ವಾಭಾವಿಕೀ ಪ್ರವೃತ್ತಿಃ।",hi:"मध्व के अनुसार, तमोयोग्य जीवों की यही नित्य प्रवृत्ति है।"} },

  /* ---------------- Phala (8) ---------------- */
  { id:'moksha', tier:'phala',
    en:'Mokṣa', dev:'मोक्ष', kn:'ಮೋಕ್ಷ',
    title:{en:'Liberation',dev:"मोक्षः",kn:"ಮೋಕ್ಷಃ",hi:"मोक्ष — मुक्ति"},
    note:{en:"Release from saṃsāra into Hari's eternal presence. For Madhva: gradations of mokṣa (sālokya, sārṣṭi, sāmīpya, sārūpya, sāyujya).",dev:"संसारात् विनिर्मुक्तिः हरेः नित्यसन्निधिप्राप्तिश्च। माध्वमते मोक्षस्य चतुर्विधं तारतम्यम् — सालोक्य-सार्ष्टि-सामीप्य-सारूप्य-सायुज्यभेदेन।",kn:"ಸಂಸಾರಾತ್ ವಿನಿರ್ಮುಕ್ತಿಃ ಹರೇಃ ನಿತ್ಯಸನ್ನಿಧಿಪ್ರಾಪ್ತಿಶ್ಚ। ಮಾಧ್ವಮತೇ ಮೋಕ್ಷಸ್ಯ ಚತುರ್ವಿಧಂ ತಾರತಮ್ಯಮ್ — ಸಾಲೋಕ್ಯ-ಸಾರ್ಷ್ಟಿ-ಸಾಮೀಪ್ಯ-ಸಾರೂಪ್ಯ-ಸಾಯುಜ್ಯಭೇದೇನ।",hi:"संसार से छुटकारा और हरि की नित्य सन्निधि की प्राप्ति। मध्व के अनुसार: मोक्ष की क्रमिक श्रेणियाँ हैं (सालोक्य, सामीप्य, सारूप्य, सायुज्य)।"},
    refs:'BG 5.24–26 · 18.66',
    madhva:{en:'Mokṣa has tāratamya — not all liberated jīvas attain identical bliss.',dev:"मोक्षेऽपि तारतम्यम् — न सर्वे मुक्ताः समानानन्दभाजः।",kn:"ಮೋಕ್ಷೇಽಪಿ ತಾರತಮ್ಯಮ್ — ನ ಸರ್ವೇ ಮುಕ್ತಾಃ ಸಮಾನಾನಂದಭಾಜಃ।",hi:"मोक्ष में तारतम्य है — सब मुक्त जीव समान आनंद नहीं पाते।"} },
  { id:'paramagati', tier:'phala',
    en:'Paramā gati', dev:'परमा गति', kn:'ಪರಮಾ ಗತಿ',
    title:{en:'The supreme destination',dev:"परमा गतिः",kn:"ಪರಮಾ ಗತಿಃ",hi:"परम गति — सर्वोच्च धाम"},
    note:{en:"'yaṃ prāpya na nivartante tad dhāma paramaṃ mama' — Hari's supreme abode, reaching which one does not return.",dev:"\"यद्गत्वा न निवर्तन्ते तद्धाम परमं मम\" इति। हरेः परमं धाम, यत्प्राप्य पुनरावृत्तिर्न भवति।",kn:"\"ಯದ್ಗತ್ವಾ ನ ನಿವರ್ತಂತೇ ತದ್ಧಾಮ ಪರಮಂ ಮಮ\" ಇತಿ। ಹರೇಃ ಪರಮಂ ಧಾಮ, ಯತ್ಪ್ರಾಪ್ಯ ಪುನರಾವೃತ್ತಿರ್ನ ಭವತಿ।",hi:"‘यं प्राप्य न निवर्तन्ते तद् धाम परमं मम’ — हरि का परम धाम, जिसे पाकर कोई लौटता नहीं।"},
    refs:'BG 15.6 · 8.21' },
  { id:'brahmi_sthiti', tier:'phala',
    en:'Brāhmī sthiti', dev:'ब्राह्मी स्थिति', kn:'ಬ್ರಾಹ್ಮೀ ಸ್ಥಿತಿ',
    title:{en:'Establishment in Brahman',dev:"ब्राह्मी स्थितिः",kn:"ಬ್ರಾಹ್ಮೀ ಸ್ಥಿತಿಃ",hi:"ब्राह्मी स्थिति"},
    note:{en:"'attaining this, one is not deluded even at the hour of death' — the steady state at the close of Ch 2.",dev:"\"एनां प्राप्य अन्तकालेऽपि न विमुह्यति\" — द्वितीयाध्यायान्ते निरूपिता स्थिरा परा निष्ठा।",kn:"\"ಏನಾಂ ಪ್ರಾಪ್ಯ ಅಂತಕಾಲೇಽಪಿ ನ ವಿಮುಹ್ಯತಿ\" — ದ್ವಿತೀಯಾಧ್ಯಾಯಾಂತೇ ನಿರೂಪಿತಾ ಸ್ಥಿರಾ ಪರಾ ನಿಷ್ಠಾ।",hi:"‘इसे पाकर मनुष्य मृत्यु के क्षण में भी मोहित नहीं होता’ — दूसरे अध्याय के अंत में स्थिर अवस्था का चित्रण।"},
    refs:'BG 2.72' },
  { id:'jivanmukti', tier:'phala',
    en:'Jīvanmukti', dev:'जीवन्मुक्ति', kn:'ಜೀವನ್ಮುಕ್ತಿ',
    title:{en:'Liberation while embodied',dev:"जीवन्मुक्तिः",kn:"ಜೀವನ್ಮುಕ್ತಿಃ",hi:"जीवन्मुक्ति — जीते-जी मुक्ति"},
    note:{en:"Living free of saṅga, of ahaṅkāra, of dvandva — Krishna's many portraits across Ch 2, 12, 14, 18.",dev:"देहधारणकाले एव सङ्गाहङ्कारद्वन्द्वविनिर्मुक्तत्वम् — द्वितीय-द्वादश-चतुर्दश-अष्टादशाध्यायेषु कृष्णेन बहुधा निरूपिता।",kn:"ದೇಹಧಾರಣಕಾಲೇ ಏವ ಸಂಗಾಹಂಕಾರದ್ವಂದ್ವವಿನಿರ್ಮುಕ್ತತ್ವಮ್ — ದ್ವಿತೀಯ-ದ್ವಾದಶ-ಚತುರ್ದಶ-ಅಷ್ಟಾದಶಾಧ್ಯಾಯೇಷು ಕೃಷ್ಣೇನ ಬಹುಧಾ ನಿರೂಪಿತಾ।",hi:"संग, अहंकार और द्वंद्व से रहित होकर जीना — कृष्ण ने अध्याय २, १२, १४, १८ में अनेक चित्र दिए हैं।"},
    refs:'BG 5.19–21 · 12.13–19 · 14.22–25' },
  { id:'naishkarmya_siddhi', tier:'phala',
    en:'Naiṣkarmya-siddhi', dev:'नैष्कर्म्यसिद्धि', kn:'ನೈಷ್ಕರ್ಮ್ಯ-ಸಿದ್ಧಿ',
    title:{en:'Perfection beyond action',dev:"नैष्कर्म्यसिद्धिः",kn:"ನೈಷ್ಕರ್ಮ್ಯ-ಸಿದ್ಧಿಃ",hi:"नैष्कर्म्य-सिद्धि"},
    note:{en:"The state in which action no longer binds — having transcended attachment one acts but is not stained.",dev:"या स्थितिः कर्म न बध्नाति — असक्तबुद्धेः कुर्वतोऽपि कर्म न लिप्यते।",kn:"ಯಾ ಸ್ಥಿತಿಃ ಕರ್ಮ ನ ಬಧ್ನಾತಿ — ಅಸಕ್ತಬುದ್ಧೇಃ ಕುರ್ವತೋಽಪಿ ಕರ್ಮ ನ ಲಿಪ್ಯತೇ।",hi:"वह स्थिति जिसमें कर्म अब बाँधता नहीं — आसक्ति से परे होकर मनुष्य कर्म करता है पर लिप्त नहीं होता।"},
    refs:'BG 18.49' },
  { id:'archiradi_marga', tier:'phala',
    en:'Arciradi-mārga', dev:'अर्चिरादिमार्ग', kn:'ಅರ್ಚಿರಾದಿ-ಮಾರ್ಗ',
    title:{en:'The path of light',dev:"अर्चिरादिमार्गः",kn:"ಅರ್ಚಿರಾದಿ-ಮಾರ್ಗಃ",hi:"अर्चिरादि मार्ग — प्रकाश का पथ"},
    note:{en:"The bright path through fire, day, the bright fortnight, six months of the north — at the end of which one does not return.",dev:"अग्निः-ज्योतिः-अहः-शुक्लपक्ष-उत्तरायणक्रमेण देवयानमार्गः — येन प्रयाताः ब्रह्मविदः न पुनरावर्तन्ते।",kn:"ಅಗ್ನಿಃ-ಜ್ಯೋತಿಃ-ಅಹಃ-ಶುಕ್ಲಪಕ್ಷ-ಉತ್ತರಾಯಣಕ್ರಮೇಣ ದೇವಯಾನಮಾರ್ಗಃ — ಯೇನ ಪ್ರಯಾತಾಃ ಬ್ರಹ್ಮವಿದಃ ನ ಪುನರಾವರ್ತಂತೇ।",hi:"अग्नि, दिन, शुक्ल पक्ष, उत्तरायण के छह महीनों से होकर जाने वाला उज्ज्वल पथ — जिसके अंत में लौटना नहीं।"},
    refs:'BG 8.24' },
  { id:'dhumadi_marga', tier:'phala',
    en:'Dhūmādi-mārga', dev:'धूमादिमार्ग', kn:'ಧೂಮಾದಿ-ಮಾರ್ಗ',
    title:{en:'The path of smoke',dev:"धूमादिमार्गः",kn:"ಧೂಮಾದಿ-ಮಾರ್ಗಃ",hi:"धूमादि मार्ग — धुएँ का पथ"},
    note:{en:"The dark path through smoke, night, the dark fortnight — leading to the lunar realm and return to saṃsāra.",dev:"धूमः-रात्रिः-कृष्णपक्ष-दक्षिणायनक्रमेण पितृयाणमार्गः — चन्द्रलोकं प्राप्य पुनः संसारमावर्तते।",kn:"ಧೂಮಃ-ರಾತ್ರಿಃ-ಕೃಷ್ಣಪಕ್ಷ-ದಕ್ಷಿಣಾಯನಕ್ರಮೇಣ ಪಿತೃಯಾಣಮಾರ್ಗಃ — ಚಂದ್ರಲೋಕಂ ಪ್ರಾಪ್ಯ ಪುನಃ ಸಂಸಾರಮಾವರ್ತತೇ।",hi:"धूम, रात्रि, कृष्ण पक्ष का अंधकारमय पथ — चंद्र-लोक तक ले जाकर फिर संसार में लौटा देता है।"},
    refs:'BG 8.25' },
  { id:'sarva_dharman_parityajya', tier:'phala',
    en:'Carama-śloka phala', dev:'चरमश्लोकफल', kn:'ಚರಮಶ್ಲೋಕ-ಫಲ',
    title:{en:'Fruit of surrender',dev:"चरमश्लोकफलम्",kn:"ಚರಮಶ್ಲೋಕ-ಫಲಮ್",hi:"सर्व-धर्मान् परित्यज्य — शरण का फल"},
    note:{en:"'I will release you from all sins; do not grieve' — Krishna's guarantee at 18.66. For Madhva, the crown of the Gītā.",dev:"\"अहं त्वा सर्वपापेभ्यो मोक्षयिष्यामि मा शुचः\" — अष्टादशाध्याये कृष्णस्य प्रत्यक्षाश्वासः। माध्वसम्प्रदाये अयं गीताशास्त्रस्य शिरोभूतः श्लोकः।",kn:"\"ಅಹಂ ತ್ವಾ ಸರ್ವಪಾಪೇಭ್ಯೋ ಮೋಕ್ಷಯಿಷ್ಯಾಮಿ ಮಾ ಶುಚಃ\" — ಅಷ್ಟಾದಶಾಧ್ಯಾಯೇ ಕೃಷ್ಣಸ್ಯ ಪ್ರತ್ಯಕ್ಷಾಶ್ವಾಸಃ। ಮಾಧ್ವಸಂಪ್ರದಾಯೇ ಅಯಂ ಗೀತಾಶಾಸ್ತ್ರಸ್ಯ ಶಿರೋಭೂತಃ ಶ್ಲೋಕಃ।",hi:"‘मैं तुझे सब पापों से छुड़ा दूँगा; शोक मत कर’ — गीता १८.६६ पर कृष्ण की प्रतिज्ञा। मध्व के लिए यह गीता का चूड़ांत-श्लोक है।"},
    refs:'BG 18.66',
    madhva:{en:'The carama-śloka — Madhva\'s direct mokṣa-upadeśa.',dev:"चरमश्लोकः — मध्वाचार्यस्य साक्षात् मोक्षोपदेशः।",kn:"ಚರಮಶ್ಲೋಕಃ — ಮಧ್ವಾಚಾರ್ಯಸ್ಯ ಸಾಕ್ಷಾತ್ ಮೋಕ್ಷೋಪದೇಶಃ।",hi:"चरम-श्लोक — मध्व-परंपरा का सबसे केंद्रीय श्लोक, स्वयं हरि की प्रत्यक्ष प्रतिज्ञा।"} },
  /* — Madhva-distinctive: gradations of mokṣa — */
  { id:'salokya', tier:'phala',
    en:'Sālokya', dev:'सालोक्य', kn:'ಸಾಲೋಕ್ಯ',
    title:{en:'Co-residence in Hari\'s world',dev:"सालोक्यम्",kn:"ಸಾಲೋಕ್ಯಮ್",hi:"सालोक्य — हरि के लोक में सहवास"},
    note:{en:"First grade of mokṣa: dwelling in the same loka as Hari (Vaikuṇṭha) — but not yet in His proximity.",dev:"मोक्षस्य प्रथमं तारतम्यम् — हरेः वैकुण्ठलोके निवासः, परं न तत्सान्निध्यम्।",kn:"ಮೋಕ್ಷಸ್ಯ ಪ್ರಥಮಂ ತಾರತಮ್ಯಮ್ — ಹರೇಃ ವೈಕುಂಠಲೋಕೇ ನಿವಾಸಃ, ಪರಂ ನ ತತ್ಸಾನ್ನಿಧ್ಯಮ್।",hi:"मोक्ष की पहली श्रेणी: हरि के ही लोक (वैकुंठ) में निवास — पर अभी उनकी सन्निधि में नहीं।"},
    refs:'BG 8.21 · 15.6',
    madhva:{en:'Madhva: lowest of four mukti-gradations. Not all liberated jīvas attain identical bliss.',dev:"माध्वमते मुक्तितारतम्ये चतुर्षु अधमम् — न सर्वे मुक्ताः समानानन्दभाजः।",kn:"ಮಾಧ್ವಮತೇ ಮುಕ್ತಿತಾರತಮ್ಯೇ ಚತುರ್ಷು ಅಧಮಮ್ — ನ ಸರ್ವೇ ಮುಕ್ತಾಃ ಸಮಾನಾನಂದಭಾಜಃ।",hi:"मध्व: चार मुक्ति-श्रेणियों में सबसे नीचे। सब मुक्त जीव समान आनंद नहीं पाते।"} },
  { id:'samipya', tier:'phala',
    en:'Sāmīpya', dev:'सामीप्य', kn:'ಸಾಮೀಪ್ಯ',
    title:{en:'Nearness to Hari',dev:"सामीप्यम्",kn:"ಸಾಮೀಪ್ಯಮ್",hi:"सामीप्य — हरि के समीप"},
    note:{en:"Second grade: proximity to Hari in His own abode. Beyond sālokya, not yet sārūpya.",dev:"द्वितीयं तारतम्यम् — हरेः स्वधाम्नि तत्सान्निध्यप्राप्तिः। सालोक्यादुत्तरं सारूप्यात् न्यूनम्।",kn:"ದ್ವಿತೀಯಂ ತಾರತಮ್ಯಮ್ — ಹರೇಃ ಸ್ವಧಾಮ್ನಿ ತತ್ಸಾನ್ನಿಧ್ಯಪ್ರಾಪ್ತಿಃ। ಸಾಲೋಕ್ಯಾದುತ್ತರಂ ಸಾರೂಪ್ಯಾತ್ ನ್ಯೂನಮ್।",hi:"दूसरी श्रेणी: हरि के अपने धाम में उनकी निकटता। सालोक्य से ऊपर, सारूप्य से नीचे।"},
    refs:'BG 11.55',
    madhva:{en:'Madhva: second of four mukti-gradations.',dev:"माध्वमते मुक्तितारतम्ये द्वितीयम्।",kn:"ಮಾಧ್ವಮತೇ ಮುಕ್ತಿತಾರತಮ್ಯೇ ದ್ವಿತೀಯಮ್।",hi:"मध्व: चार श्रेणियों में दूसरी।"} },
  { id:'sarupya', tier:'phala',
    en:'Sārūpya', dev:'सारूप्य', kn:'ಸಾರೂಪ್ಯ',
    title:{en:'Form-likeness to Hari',dev:"सारूप्यम्",kn:"ಸಾರೂಪ್ಯಮ್",hi:"सारूप्य — हरि-सम रूप"},
    note:{en:"Third grade: attaining a form resembling Hari\'s, while preserving distinct jīva-svarūpa.",dev:"तृतीयं तारतम्यम् — हरेः सदृशं रूपं प्राप्नोति, तथापि जीवस्वरूपस्य पृथक्त्वं रक्षति।",kn:"ತೃತೀಯಂ ತಾರತಮ್ಯಮ್ — ಹರೇಃ ಸದೃಶಂ ರೂಪಂ ಪ್ರಾಪ್ನೋತಿ, ತಥಾಪಿ ಜೀವಸ್ವರೂಪಸ್ಯ ಪೃಥಕ್ತ್ವಂ ರಕ್ಷತಿ।",hi:"तीसरी श्रेणी: हरि-सदृश रूप प्राप्त करना — पर अपनी जीव-स्वरूप पहचान बनाए रखते हुए।"},
    refs:'BG 11.55 · 14.2',
    madhva:{en:'Madhva: third of four mukti-gradations. Form likeness — never identity.',dev:"माध्वमते मुक्तितारतम्ये तृतीयम् — रूपसादृश्यमेव, न तु ऐक्यम्।",kn:"ಮಾಧ್ವಮತೇ ಮುಕ್ತಿತಾರತಮ್ಯೇ ತೃತೀಯಮ್ — ರೂಪಸಾದೃಶ್ಯಮೇವ, ನ ತು ಐಕ್ಯಮ್।",hi:"मध्व: चार श्रेणियों में तीसरी। रूप-समानता — कभी तादात्म्य नहीं।"} },
  { id:'sayujya', tier:'phala',
    en:'Sāyujya', dev:'सायुज्य', kn:'ಸಾಯುಜ್ಯ',
    title:{en:'Communion (not absorption)',dev:"सायुज्यम्",kn:"ಸಾಯುಜ್ಯಮ್",hi:"सायुज्य — हरि से गहन योग (न कि तादात्म्य)"},
    note:{en:"Highest grade of mokṣa: deepest communion with Hari, full sa-rasa bliss. For Madhva, NOT identity — the jīva remains an aṃśa distinct from the aṃśin.",dev:"उत्तमं तारतम्यम् — हरिणा सह गाढतमं सान्निध्यं पूर्णसरसानन्दश्च। माध्वमते न ऐक्यम् — जीवः अंशिनः अंशरूपेण भिन्न एव तिष्ठति।",kn:"ಉತ್ತಮಂ ತಾರತಮ್ಯಮ್ — ಹರಿಣಾ ಸಹ ಗಾಢತಮಂ ಸಾನ್ನಿಧ್ಯಂ ಪೂರ್ಣಸರಸಾನಂದಶ್ಚ। ಮಾಧ್ವಮತೇ ನ ಐಕ್ಯಮ್ — ಜೀವಃ ಅಂಶಿನಃ ಅಂಶರೂಪೇಣ ಭಿನ್ನ ಏವ ತಿಷ್ಠತಿ।",hi:"मोक्ष की सर्वोच्च श्रेणी: हरि के साथ गहनतम सान्निध्य, पूर्ण स-रस आनंद। मध्व के लिए यह तादात्म्य नहीं — जीव अंशी से भिन्न अंश ही रहता है।"},
    refs:'BG 5.24–26 · 18.55',
    madhva:{en:'Madhva: fourth and highest grade. Communion not aikya — jīva-paramātman bheda preserved even in mukti.',dev:"माध्वमते मुक्तितारतम्ये चतुर्थं परमं च — सङ्गमः, न तु ऐक्यम्; मुक्तावपि जीव-परमात्मभेदः अबाधितः।",kn:"ಮಾಧ್ವಮತೇ ಮುಕ್ತಿತಾರತಮ್ಯೇ ಚತುರ್ಥಂ ಪರಮಂ ಚ — ಸಂಗಮಃ, ನ ತು ಐಕ್ಯಮ್; ಮುಕ್ತಾವಪಿ ಜೀವ-ಪರಮಾತ್ಮಭೇದಃ ಅಬಾಧಿತಃ।",hi:"मध्व: चौथी और सर्वोच्च श्रेणी। ऐक्य नहीं, सायुज्य — मुक्ति में भी जीव-परमात्म-भेद बना रहता है।"} },

  /* ---------------- Yajña (6) ---------------- */
  { id:'dravya_yajna', tier:'yajna',
    en:'Dravya-yajña', dev:'द्रव्ययज्ञ', kn:'ದ್ರವ್ಯಯಜ್ಞ',
    title:{en:'Sacrifice of substance',dev:"द्रव्ययज्ञः",kn:"ದ್ರವ್ಯಯಜ್ಞಃ",hi:"द्रव्य-यज्ञ — वस्तु का यज्ञ"},
    note:{en:"Offering material wealth — first of Krishna\'s catalogue of yajñas at BG 4.28.",dev:"धन-वस्त्व-अन्नादिद्रव्यार्पणरूपः यज्ञः — चतुर्थाध्यायाष्टाविंशे श्लोके कृष्णोक्तयज्ञानां प्रथमः।",kn:"ಧನ-ವಸ್ತ್ವ-ಅನ್ನಾದಿದ್ರವ್ಯಾರ್ಪಣರೂಪಃ ಯಜ್ಞಃ — ಚತುರ್ಥಾಧ್ಯಾಯಾಷ್ಟಾವಿಂಶೇ ಶ್ಲೋಕೇ ಕೃಷ್ಣೋಕ್ತಯಜ್ಞಾನಾಂ ಪ್ರಥಮಃ।",hi:"भौतिक संपत्ति का अर्पण — कृष्ण की गीता ४.२८ की यज्ञ-सूची में पहला।"},
    refs:'BG 4.28' },
  { id:'tapo_yajna', tier:'yajna',
    en:'Tapo-yajña', dev:'तपोयज्ञ', kn:'ತಪೋಯಜ್ಞ',
    title:{en:'Sacrifice of austerity',dev:"तपोयज्ञः",kn:"ತಪೋಯಜ್ಞಃ",hi:"तपो-यज्ञ — तप का यज्ञ"},
    note:{en:"Offering one\'s tapas — bodily, vocal, mental austerities — as worship.",dev:"कायिक-वाचिक-मानसतपसां हरयेऽर्पणरूपः यज्ञः।",kn:"ಕಾಯಿಕ-ವಾಚಿಕ-ಮಾನಸತಪಸಾಂ ಹರಯೇಽರ್ಪಣರೂಪಃ ಯಜ್ಞಃ।",hi:"अपने तप — शरीर, वाणी और मन का — को पूजा के रूप में अर्पण करना।"},
    refs:'BG 4.28' },
  { id:'yoga_yajna', tier:'yajna',
    en:'Yoga-yajña', dev:'योगयज्ञ', kn:'ಯೋಗಯಜ್ಞ',
    title:{en:'Sacrifice of yoga',dev:"योगयज्ञः",kn:"ಯೋಗಯಜ್ಞಃ",hi:"योग-यज्ञ"},
    note:{en:"Offering one\'s yogic discipline — prāṇa-apāna control, eightfold yoga — as worship of Hari.",dev:"प्राणापानसंयम-अष्टाङ्गयोगादिरूपस्य योगानुष्ठानस्य हरये अर्पणम् — एष योगयज्ञः।",kn:"ಪ್ರಾಣಾಪಾನಸಂಯಮ-ಅಷ್ಟಾಂಗಯೋಗಾದಿರೂಪಸ್ಯ ಯೋಗಾನುಷ್ಠಾನಸ್ಯ ಹರಯೇ ಅರ್ಪಣಮ್ — ಏಷ ಯೋಗಯಜ್ಞಃ।",hi:"अपनी योग-साधना — प्राण-अपान का संयम, अष्टांग योग — को हरि की उपासना के रूप में अर्पण करना।"},
    refs:'BG 4.28–30' },
  { id:'svadhyaya_yajna', tier:'yajna',
    en:'Svādhyāya-jñāna-yajña', dev:'स्वाध्यायज्ञानयज्ञ', kn:'ಸ್ವಾಧ್ಯಾಯ-ಜ್ಞಾನ-ಯಜ್ಞ',
    title:{en:'Sacrifice of study & knowledge',dev:"स्वाध्यायज्ञानयज्ञः",kn:"ಸ್ವಾಧ್ಯಾಯ-ಜ್ಞಾನ-ಯಜ್ಞಃ",hi:"स्वाध्याय-यज्ञ"},
    note:{en:"Recitation of scripture together with the knowledge it discloses — the highest verbal yajña.",dev:"शास्त्रस्वाध्यायः तदुक्तार्थज्ञानसहितः — वाङ्मयेषु यज्ञेषु उत्तमः।",kn:"ಶಾಸ್ತ್ರಸ್ವಾಧ್ಯಾಯಃ ತದುಕ್ತಾರ್ಥಜ್ಞಾನಸಹಿತಃ — ವಾಙ್ಮಯೇಷು ಯಜ್ಞೇಷು ಉತ್ತಮಃ।",hi:"शास्त्र-पाठ और उससे प्रकट होने वाला ज्ञान दोनों मिलकर — सर्वोच्च वाक्-यज्ञ।"},
    refs:'BG 4.28' },
  { id:'jnana_yajna', tier:'yajna',
    en:'Jñāna-yajña', dev:'ज्ञानयज्ञ', kn:'ಜ್ಞಾನಯಜ್ಞ',
    title:{en:'Sacrifice of knowledge',dev:"ज्ञानयज्ञः",kn:"ಜ್ಞಾನಯಜ್ಞಃ",hi:"ज्ञान-यज्ञ"},
    note:{en:"'śreyān dravyamayād yajñāj jñāna-yajñaḥ parantapa' — the sacrifice of knowledge surpasses every material sacrifice.",dev:"\"श्रेयान् द्रव्यमयाद् यज्ञाज्ज्ञानयज्ञः परन्तप\" — द्रव्ययज्ञापेक्षया ज्ञानयज्ञः श्रेष्ठतरः।",kn:"\"ಶ್ರೇಯಾನ್ ದ್ರವ್ಯಮಯಾದ್ ಯಜ್ಞಾಜ್ಜ್ಞಾನಯಜ್ಞಃ ಪರಂತಪ\" — ದ್ರವ್ಯಯಜ್ಞಾಪೇಕ್ಷಯಾ ಜ್ಞಾನಯಜ್ಞಃ ಶ್ರೇಷ್ಠತರಃ।",hi:"‘श्रेयान् द्रव्यमयाद् यज्ञाज् ज्ञान-यज्ञः परंतप’ — ज्ञान-यज्ञ हर भौतिक यज्ञ से श्रेष्ठ।"},
    refs:'BG 4.33' },
  { id:'brahmarpana', tier:'yajna',
    en:'Brahmārpaṇa', dev:'ब्रह्मार्पण', kn:'ಬ್ರಹ್ಮಾರ್ಪಣ',
    title:{en:'Offering all into Brahman',dev:"ब्रह्मार्पणम्",kn:"ಬ್ರಹ್ಮಾರ್ಪಣಮ್",hi:"ब्रह्मार्पण — सब कुछ ब्रह्म को अर्पित"},
    note:{en:"'The act of offering is Brahman; what is offered is Brahman; the offerer is Brahman, the fire is Brahman' — the universal sacramental view.",dev:"\"ब्रह्मार्पणं ब्रह्म हविः ब्रह्माग्नौ ब्रह्मणा हुतम्\" — अर्पणं हविः अग्निः कर्ता च सर्वं ब्रह्मेति विश्वव्यापिनी यज्ञदृष्टिः।",kn:"\"ಬ್ರಹ್ಮಾರ್ಪಣಂ ಬ್ರಹ್ಮ ಹವಿಃ ಬ್ರಹ್ಮಾಗ್ನೌ ಬ್ರಹ್ಮಣಾ ಹುತಮ್\" — ಅರ್ಪಣಂ ಹವಿಃ ಅಗ್ನಿಃ ಕರ್ತಾ ಚ ಸರ್ವಂ ಬ್ರಹ್ಮೇತಿ ವಿಶ್ವವ್ಯಾಪಿನೀ ಯಜ್ಞದೃಷ್ಟಿಃ।",hi:"‘अर्पण ब्रह्म है, आहुति ब्रह्म है, अर्पण करने वाला ब्रह्म है, अग्नि ब्रह्म है’ — सार्वभौमिक यज्ञमय दृष्टि।"},
    refs:'BG 4.24' },

  /* ---------------- Pratīka (6) ---------------- */
  { id:'ashvattha', tier:'pratika',
    en:'Aśvattha-vṛkṣa', dev:'अश्वत्थवृक्ष', kn:'ಅಶ್ವತ್ಥವೃಕ್ಷ',
    title:{en:'The inverted fig-tree',dev:"अश्वत्थवृक्षः",kn:"ಅಶ್ವತ್ಥವೃಕ್ಷಃ",hi:"अश्वत्थ — उल्टा पीपल"},
    note:{en:"Roots above (Hari), branches below (the worlds); fed by the guṇas, sprouting sense-objects. Cut it with the axe of non-attachment.",dev:"ऊर्ध्वमूलः (हरिः) अधःशाखः (लोकाः) संसारवृक्षः — गुणैः सिक्तः, विषयाङ्कुरोपेतः, असङ्गशस्त्रेण छेद्यः।",kn:"ಊರ್ಧ್ವಮೂಲಃ (ಹರಿಃ) ಅಧಃಶಾಖಃ (ಲೋಕಾಃ) ಸಂಸಾರವೃಕ್ಷಃ — ಗುಣೈಃ ಸಿಕ್ತಃ, ವಿಷಯಾಂಕುರೋಪೇತಃ, ಅಸಂಗಶಸ್ತ್ರೇಣ ಛೇದ್ಯಃ।",hi:"जड़ें ऊपर (हरि), शाखाएँ नीचे (लोक); गुणों से पोषित, इंद्रिय-विषयों के पत्ते उगाता। इसे अनासक्ति के कुठार से काटो।"},
    refs:'BG 15.1–3' },
  { id:'ratha_rupaka', tier:'pratika',
    en:'Ratha-rūpaka', dev:'रथरूपक', kn:'ರಥರೂಪಕ',
    title:{en:'The chariot allegory',dev:"रथरूपकम्",kn:"ರಥರೂಪಕಮ್",hi:"रथ-रूपक — रथ का दृष्टांत"},
    note:{en:"Implied throughout Ch 1–2: Krishna the sārathi (charioteer), Arjuna the rathin (warrior on the chariot). Echo of Kaṭha Up.",dev:"प्रथमद्वितीयाध्याययोः सूचितम् — कृष्णः सारथिः, अर्जुनो रथी। कठोपनिषदुक्तरथरूपकस्य प्रतिध्वनिः।",kn:"ಪ್ರಥಮದ್ವಿತೀಯಾಧ್ಯಾಯಯೋಃ ಸೂಚಿತಮ್ — ಕೃಷ್ಣಃ ಸಾರಥಿಃ, ಅರ್ಜುನೋ ರಥೀ। ಕಠೋಪನಿಷದುಕ್ತರಥರೂಪಕಸ್ಯ ಪ್ರತಿಧ್ವನಿಃ।",hi:"गीता के १–२ अध्याय में अनुक्त रूप से उपस्थित: कृष्ण सारथी, अर्जुन रथी। कठ उपनिषद् के रथ-रूपक की प्रतिध्वनि।"},
    refs:'BG 1.21–25 · 18.78' },
  { id:'pranava_om', tier:'pratika',
    en:'Praṇava (Om)', dev:'प्रणव (ॐ)', kn:'ಪ್ರಣವ (ಓಂ)',
    title:{en:'The syllable Om',dev:"प्रणवः (ॐ)",kn:"ಪ್ರಣವಃ (ಓಂ)",hi:"प्रणव ओम्"},
    note:{en:"'oṃ ity ekākṣaraṃ brahma' — uttering Om at the moment of death, remembering Hari, one attains the supreme.",dev:"\"ॐ इत्येकाक्षरं ब्रह्म\" — अन्तकाले ॐकारमुच्चारयन् हरिमनुस्मरन् परमां गतिं प्राप्नोति।",kn:"\"ಓಂ ಇತ್ಯೇಕಾಕ್ಷರಂ ಬ್ರಹ್ಮ\" — ಅಂತಕಾಲೇ ಓಂಕಾರಮುಚ್ಚಾರಯನ್ ಹರಿಮನುಸ್ಮರನ್ ಪರಮಾಂ ಗತಿಂ ಪ್ರಾಪ್ನೋತಿ।",hi:"‘ओम् इत्येकाक्षरं ब्रह्म’ — मृत्यु के क्षण में ‘ओम्’ का उच्चारण और हरि का स्मरण करने वाला परम पद को पाता है।"},
    refs:'BG 8.13 · 17.23' },
  { id:'akshara_a', tier:'pratika',
    en:'Akṣarāṇām akāraḥ', dev:'अक्षराणामकारः', kn:'ಅಕ್ಷರಾಣಾಮಕಾರಃ',
    title:{en:'\'I am the letter A\'',dev:"अक्षराणामकारः",kn:"ಅಕ್ಷರಾಣಾಮಕಾರಃ",hi:"अक्षरों में अ"},
    note:{en:"Among letters, Krishna says, 'I am A' — the source of all phonemes; among compounds, the dvandva.",dev:"\"अक्षराणामकारोऽस्मि\" — सर्ववर्णानां मूलभूतः अकारः अहम् इति कृष्णवचनम्; समासेषु द्वन्द्वसमासश्च।",kn:"\"ಅಕ್ಷರಾಣಾಮಕಾರೋಽಸ್ಮಿ\" — ಸರ್ವವರ್ಣಾನಾಂ ಮೂಲಭೂತಃ ಅಕಾರಃ ಅಹಮ್ ಇತಿ ಕೃಷ್ಣವಚನಮ್; ಸಮಾಸೇಷು ದ್ವಂದ್ವಸಮಾಸಶ್ಚ।",hi:"‘अक्षरों में मैं अ हूँ’ — सब वर्णों का स्रोत; समासों में द्वंद्व सबसे श्रेष्ठ।"},
    refs:'BG 10.33' },
  { id:'jyotir_jyoti', tier:'pratika',
    en:'Jyotiṣām jyotiḥ', dev:'ज्योतिषां ज्योतिः', kn:'ಜ್ಯೋತಿಷಾಂ ಜ್ಯೋತಿಃ',

  'tamas': { dev:'तमस्त्वज्ञानजं विद्धि मोहनं सर्वदेहिनाम्।\nप्रमादालस्यनिद्राभिस्तन्निबध्नाति भारत॥', hi:'तमस्त्वज्ञानजं विद्धि मोहनं सर्वदेहिनाम्।\nप्रमादालस्यनिद्राभिस्तन्निबध्नाति भारत॥', iast:'tamas tv ajñāna-jaṃ viddhi mohanaṃ sarva-dehinām |\npramādālasya-nidrābhis tan nibadhnāti bhārata ||', kn:'ತಮಸ್ತ್ವಜ್ಞಾನಜಂ ವಿದ್ಧಿ ಮೋಹನಂ ಸರ್ವದೇಹಿನಾಮ್।\nಪ್ರಮಾದಾಲಸ್ಯನಿದ್ರಾಭಿಸ್ತನ್ನಿಬಧ್ನಾತಿ ಭಾರತ॥', ref:'BG 14.8' },
  'gunatita': { dev:'समदुःखसुखः स्वस्थः समलोष्टाश्मकाञ्चनः।\nतुल्यप्रियाप्रियो धीरस्तुल्यनिन्दात्मसंस्तुतिः॥', hi:'समदुःखसुखः स्वस्थः समलोष्टाश्मकाञ्चनः।\nतुल्यप्रियाप्रियो धीरस्तुल्यनिन्दात्मसंस्तुतिः॥', iast:'sama-duḥkha-sukhaḥ sva-sthaḥ sama-loṣṭāśma-kāñcanaḥ |\ntulya-priyāpriyo dhīras tulya-nindātma-saṃstutiḥ ||', kn:'ಸಮದುಃಖಸುಖಃ ಸ್ವಸ್ಥಃ ಸಮಲೋಷ್ಟಾಶ್ಮಕಾಂಚನಃ।\nತುಲ್ಯಪ್ರಿಯಾಪ್ರಿಯೋ ಧೀರಸ್ತುಲ್ಯನಿಂದಾತ್ಮಸಂಸ್ತುತಿಃ॥', ref:'BG 14.24' },

  'karma_yoga': { dev:'कर्मण्येवाधिकारस्ते मा फलेषु कदाचन।\nमा कर्मफलहेतुर्भूर्मा ते सङ्गोऽस्त्वकर्मणि॥', hi:'कर्मण्येवाधिकारस्ते मा फलेषु कदाचन।\nमा कर्मफलहेतुर्भूर्मा ते सङ्गोऽस्त्वकर्मणि॥', iast:'karmaṇy evādhikāras te mā phaleṣu kadācana |\nmā karma-phala-hetur bhūr mā te saṅgo \'stv akarmaṇi ||', kn:'ಕರ್ಮಣ್ಯೇವಾಧಿಕಾರಸ್ತೇ ಮಾ ಫಲೇಷು ಕದಾಚನ।\nಮಾ ಕರ್ಮಫಲಹೇತುರ್ಭೂರ್ಮಾ ತೇ ಸಂಗೋಽಸ್ತ್ವಕರ್ಮಣಿ॥', ref:'BG 2.47' },
  'jnana_yoga': { dev:'न हि ज्ञानेन सदृशं पवित्रमिह विद्यते।\nतत्स्वयं योगसंसिद्धः कालेनात्मनि विन्दति॥', hi:'न हि ज्ञानेन सदृशं पवित्रमिह विद्यते।\nतत्स्वयं योगसंसिद्धः कालेनात्मनि विन्दति॥', iast:'na hi jñānena sadṛśaṃ pavitram iha vidyate |\ntat svayaṃ yoga-saṃsiddhaḥ kālenātmani vindati ||', kn:'ನ ಹಿ ಜ್ಞಾನೇನ ಸದೃಶಂ ಪವಿತ್ರಮಿಹ ವಿದ್ಯತೇ।\nತತ್ಸ್ವಯಂ ಯೋಗಸಂಸಿದ್ಧಃ ಕಾಲೇನಾತ್ಮನಿ ವಿಂದತಿ॥', ref:'BG 4.38' },
  'bhakti_yoga': { dev:'मन्मना भव मद्भक्तो मद्याजी मां नमस्कुरु।\nमामेवैष्यसि सत्यं ते प्रतिजाने प्रियोऽसि मे॥', hi:'मन्मना भव मद्भक्तो मद्याजी मां नमस्कुरु।\nमामेवैष्यसि सत्यं ते प्रतिजाने प्रियोऽसि मे॥', iast:'man-manā bhava mad-bhakto mad-yājī māṃ namaskuru |\nmām evaiṣyasi satyaṃ te pratijāne priyo \'si me ||', kn:'ಮನ್ಮನಾ ಭವ ಮದ್ಭಕ್ತೋ ಮದ್ಯಾಜೀ ಮಾಂ ನಮಸ್ಕುರು।\nಮಾಮೇವೈಷ್ಯಸಿ ಸತ್ಯಂ ತೇ ಪ್ರತಿಜಾನೇ ಪ್ರಿಯೋಽಸಿ ಮೇ॥', ref:'BG 18.65' },
  'dhyana_yoga': { dev:'योगी युञ्जीत सततमात्मानं रहसि स्थितः।\nएकाकी यतचित्तात्मा निराशीरपरिग्रहः॥', hi:'योगी युञ्जीत सततमात्मानं रहसि स्थितः।\nएकाकी यतचित्तात्मा निराशीरपरिग्रहः॥', iast:'yogī yuñjīta satatam ātmānaṃ rahasi sthitaḥ |\nekākī yata-cittātmā nirāśīr aparigrahaḥ ||', kn:'ಯೋಗೀ ಯುಂಜೀತ ಸತತಮಾತ್ಮಾನಂ ರಹಸಿ ಸ್ಥಿತಃ।\nಏಕಾಕೀ ಯತಚಿತ್ತಾತ್ಮಾ ನಿರಾಶೀರಪರಿಗ್ರಹಃ॥', ref:'BG 6.10' },
  'samatva': { dev:'योगस्थः कुरु कर्माणि सङ्गं त्यक्त्वा धनञ्जय।\nसिद्ध्यसिद्ध्योः समो भूत्वा समत्वं योग उच्यते॥', hi:'योगस्थः कुरु कर्माणि सङ्गं त्यक्त्वा धनञ्जय।\nसिद्ध्यसिद्ध्योः समो भूत्वा समत्वं योग उच्यते॥', iast:'yoga-sthaḥ kuru karmāṇi saṅgaṃ tyaktvā dhanañjaya |\nsiddhy-asiddhyoḥ samo bhūtvā samatvaṃ yoga ucyate ||', kn:'ಯೋಗಸ್ಥಃ ಕುರು ಕರ್ಮಾಣಿ ಸಂಗಂ ತ್ಯಕ್ತ್ವಾ ಧನಂಜಯ।\nಸಿದ್ಧ್ಯಸಿದ್ಧ್ಯೋಃ ಸಮೋ ಭೂತ್ವಾ ಸಮತ್ವಂ ಯೋಗ ಉಚ್ಯತೇ॥', ref:'BG 2.48' },
  'sharanagati': { dev:'सर्वधर्मान्परित्यज्य मामेकं शरणं व्रज।\nअहं त्वा सर्वपापेभ्यो मोक्षयिष्यामि मा शुचः॥', hi:'सर्वधर्मान्परित्यज्य मामेकं शरणं व्रज।\nअहं त्वा सर्वपापेभ्यो मोक्षयिष्यामि मा शुचः॥', iast:'sarva-dharmān parityajya mām ekaṃ śaraṇaṃ vraja |\nahaṃ tvā sarva-pāpebhyo mokṣayiṣyāmi mā śucaḥ ||', kn:'ಸರ್ವಧರ್ಮಾನ್ಪರಿತ್ಯಜ್ಯ ಮಾಮೇಕಂ ಶರಣಂ ವ್ರಜ।\nಅಹಂ ತ್ವಾ ಸರ್ವಪಾಪೇಭ್ಯೋ ಮೋಕ್ಷಯಿಷ್ಯಾಮಿ ಮಾ ಶುಚಃ॥', ref:'BG 18.66' },

  'sthitaprajna': { dev:'दुःखेष्वनुद्विग्नमनाः सुखेषु विगतस्पृहः।\nवीतरागभयक्रोधः स्थितधीर्मुनिरुच्यते॥', hi:'दुःखेष्वनुद्विग्नमनाः सुखेषु विगतस्पृहः।\nवीतरागभयक्रोधः स्थितधीर्मुनिरुच्यते॥', iast:'duḥkheṣv anudvigna-manāḥ sukheṣu vigata-spṛhaḥ |\nvīta-rāga-bhaya-krodhaḥ sthita-dhīr munir ucyate ||', kn:'ದುಃಖೇಷ್ವನುದ್ವಿಗ್ನಮನಾಃ ಸುಖೇಷು ವಿಗತಸ್ಪೃಹಃ।\nವೀತರಾಗಭಯಕ್ರೋಧಃ ಸ್ಥಿತಧೀರ್ಮುನಿರುಚ್ಯತೇ॥', ref:'BG 2.56' },
  'svadharma': { dev:'श्रेयान्स्वधर्मो विगुणः परधर्मात्स्वनुष्ठितात्।\nस्वधर्मे निधनं श्रेयः परधर्मो भयावहः॥', hi:'श्रेयान्स्वधर्मो विगुणः परधर्मात्स्वनुष्ठितात्।\nस्वधर्मे निधनं श्रेयः परधर्मो भयावहः॥', iast:'śreyān sva-dharmo viguṇaḥ para-dharmāt sv-anuṣṭhitāt |\nsva-dharme nidhanaṃ śreyaḥ para-dharmo bhayāvahaḥ ||', kn:'ಶ್ರೇಯಾನ್ಸ್ವಧರ್ಮೋ ವಿಗುಣಃ ಪರಧರ್ಮಾತ್ಸ್ವನುಷ್ಠಿತಾತ್।\nಸ್ವಧರ್ಮೇ ನಿಧನಂ ಶ್ರೇಯಃ ಪರಧರ್ಮೋ ಭಯಾವಹಃ॥', ref:'BG 3.35' },
  'nishkama_karma': { dev:'कर्मण्येवाधिकारस्ते मा फलेषु कदाचन।', hi:'कर्मण्येवाधिकारस्ते मा फलेषु कदाचन।', iast:'karmaṇy evādhikāras te mā phaleṣu kadācana |', kn:'ಕರ್ಮಣ್ಯೇವಾಧಿಕಾರಸ್ತೇ ಮಾ ಫಲೇಷು ಕದಾಚನ।', ref:'BG 2.47' },
  'daivi_sampad': { dev:'दैवी सम्पद्विमोक्षाय निबन्धायासुरी मता।\nमा शुचः सम्पदं दैवीमभिजातोऽसि पाण्डव॥', hi:'दैवी सम्पद्विमोक्षाय निबन्धायासुरी मता।\nमा शुचः सम्पदं दैवीमभिजातोऽसि पाण्डव॥', iast:'daivī sampad vimokṣāya nibandhāyāsurī matā |\nmā śucaḥ sampadaṃ daivīm abhijāto \'si pāṇḍava ||', kn:'ದೈವೀ ಸಂಪದ್ವಿಮೋಕ್ಷಾಯ ನಿಬಂಧಾಯಾಸುರೀ ಮತಾ।\nಮಾ ಶುಚಃ ಸಂಪದಂ ದೈವೀಮಭಿಜಾತೋಽಸಿ ಪಾಂಡವ॥', ref:'BG 16.5' },

  'kama': { dev:'काम एष क्रोध एष रजोगुणसमुद्भवः।\nमहाशनो महापाप्मा विद्ध्येनमिह वैरिणम्॥', hi:'काम एष क्रोध एष रजोगुणसमुद्भवः।\nमहाशनो महापाप्मा विद्ध्येनमिह वैरिणम्॥', iast:'kāma eṣa krodha eṣa rajo-guṇa-samudbhavaḥ |\nmahāśano mahā-pāpmā viddhy enam iha vairiṇam ||', kn:'ಕಾಮ ಏಷ ಕ್ರೋಧ ಏಷ ರಜೋಗುಣಸಮುದ್ಭವಃ।\nಮಹಾಶನೋ ಮಹಾಪಾಪ್ಮಾ ವಿದ್ಧ್ಯೇನಮಿಹ ವೈರಿಣಮ್॥', ref:'BG 3.37' },
  'krodha': { dev:'क्रोधाद्भवति सम्मोहः सम्मोहात्स्मृतिविभ्रमः।\nस्मृतिभ्रंशाद् बुद्धिनाशो बुद्धिनाशात्प्रणश्यति॥', hi:'क्रोधाद्भवति सम्मोहः सम्मोहात्स्मृतिविभ्रमः।\nस्मृतिभ्रंशाद् बुद्धिनाशो बुद्धिनाशात्प्रणश्यति॥', iast:'krodhād bhavati sammohaḥ sammohāt smṛti-vibhramaḥ |\nsmṛti-bhraṃśād buddhi-nāśo buddhi-nāśāt praṇaśyati ||', kn:'ಕ್ರೋಧಾದ್ಭವತಿ ಸಮ್ಮೋಹಃ ಸಮ್ಮೋಹಾತ್ಸ್ಮೃತಿವಿಭ್ರಮಃ।\nಸ್ಮೃತಿಭ್ರಂಶಾದ್ ಬುದ್ಧಿನಾಶೋ ಬುದ್ಧಿನಾಶಾತ್ಪ್ರಣಶ್ಯತಿ॥', ref:'BG 2.63' },
  'asatsanga': { dev:'ध्यायतो विषयान्पुंसः सङ्गस्तेषूपजायते।\nसङ्गात्सञ्जायते कामः कामात्क्रोधोऽभिजायते॥', hi:'ध्यायतो विषयान्पुंसः सङ्गस्तेषूपजायते।\nसङ्गात्सञ्जायते कामः कामात्क्रोधोऽभिजायते॥', iast:'dhyāyato viṣayān puṃsaḥ saṅgas teṣūpajāyate |\nsaṅgāt sañjāyate kāmaḥ kāmāt krodho \'bhijāyate ||', kn:'ಧ್ಯಾಯತೋ ವಿಷಯಾನ್ಪುಂಸಃ ಸಂಗಸ್ತೇಷೂಪಜಾಯತೇ।\nಸಂಗಾತ್ಸಂಜಾಯತೇ ಕಾಮಃ ಕಾಮಾತ್ಕ್ರೋಧೋಽಭಿಜಾಯತೇ॥', ref:'BG 2.62' },
  'asuri_sampad': { dev:'त्रिविधं नरकस्येदं द्वारं नाशनमात्मनः।\nकामः क्रोधस्तथा लोभस्तस्मादेतत्त्रयं त्यजेत्॥', hi:'त्रिविधं नरकस्येदं द्वारं नाशनमात्मनः।\nकामः क्रोधस्तथा लोभस्तस्मादेतत्त्रयं त्यजेत्॥', iast:'tri-vidhaṃ narakasyedaṃ dvāraṃ nāśanam ātmanaḥ |\nkāmaḥ krodhas tathā lobhas tasmād etat trayaṃ tyajet ||', kn:'ತ್ರಿವಿಧಂ ನರಕಸ್ಯೇದಂ ದ್ವಾರಂ ನಾಶನಮಾತ್ಮನಃ।\nಕಾಮಃ ಕ್ರೋಧಸ್ತಥಾ ಲೋಭಸ್ತಸ್ಮಾದೇತತ್ತ್ರಯಂ ತ್ಯಜೇತ್॥', ref:'BG 16.21' },

  'moksha': { dev:'अनाश्रितः कर्मफलं कार्यं कर्म करोति यः।\nस सन्न्यासी च योगी च न निरग्निर्न चाक्रियः॥', hi:'अनाश्रितः कर्मफलं कार्यं कर्म करोति यः।\nस सन्न्यासी च योगी च न निरग्निर्न चाक्रियः॥', iast:'anāśritaḥ karma-phalaṃ kāryaṃ karma karoti yaḥ |\nsa sannyāsī ca yogī ca na niragnir na cākriyaḥ ||', kn:'ಅನಾಶ್ರಿತಃ ಕರ್ಮಫಲಂ ಕಾರ್ಯಂ ಕರ್ಮ ಕರೋತಿ ಯಃ।\nಸ ಸನ್ನ್ಯಾಸೀ ಚ ಯೋಗೀ ಚ ನ ನಿರಗ್ನಿರ್ನ ಚಾಕ್ರಿಯಃ॥', ref:'BG 6.1' },
  'paramagati': { dev:'यद्गत्वा न निवर्तन्ते तद्धाम परमं मम।', hi:'यद्गत्वा न निवर्तन्ते तद्धाम परमं मम।', iast:'yad gatvā na nivartante tad dhāma paramaṃ mama |', kn:'ಯದ್ಗತ್ವಾ ನ ನಿವರ್ತಂತೇ ತದ್ಧಾಮ ಪರಮಂ ಮಮ।', ref:'BG 15.6' },
  'brahmi_sthiti': { dev:'एषा ब्राह्मी स्थितिः पार्थ नैनां प्राप्य विमुह्यति।\nस्थित्वास्यामन्तकालेऽपि ब्रह्मनिर्वाणमृच्छति॥', hi:'एषा ब्राह्मी स्थितिः पार्थ नैनां प्राप्य विमुह्यति।\nस्थित्वास्यामन्तकालेऽपि ब्रह्मनिर्वाणमृच्छति॥', iast:'eṣā brāhmī sthitiḥ pārtha naināṃ prāpya vimuhyati |\nsthitvāsyām anta-kāle \'pi brahma-nirvāṇam ṛcchati ||', kn:'ಏಷಾ ಬ್ರಾಹ್ಮೀ ಸ್ಥಿತಿಃ ಪಾರ್ಥ ನೈನಾಂ ಪ್ರಾಪ್ಯ ವಿಮುಹ್ಯತಿ।\nಸ್ಥಿತ್ವಾಸ್ಯಾಮಂತಕಾಲೇಽಪಿ ಬ್ರಹ್ಮನಿರ್ವಾಣಮೃಚ್ಛತಿ॥', ref:'BG 2.72' },

  'jnana_yajna': { dev:'श्रेयान्द्रव्यमयाद्यज्ञाज्ज्ञानयज्ञः परन्तप।\nसर्वं कर्माखिलं पार्थ ज्ञाने परिसमाप्यते॥', hi:'श्रेयान्द्रव्यमयाद्यज्ञाज्ज्ञानयज्ञः परन्तप।\nसर्वं कर्माखिलं पार्थ ज्ञाने परिसमाप्यते॥', iast:'śreyān dravyamayād yajñāj jñāna-yajñaḥ parantapa |\nsarvaṃ karmākhilaṃ pārtha jñāne parisamāpyate ||', kn:'ಶ್ರೇಯಾನ್ದ್ರವ್ಯಮಯಾದ್ಯಜ್ಞಾಜ್ಜ್ಞಾನಯಜ್ಞಃ ಪರಂತಪ।\nಸರ್ವಂ ಕರ್ಮಾಖಿಲಂ ಪಾರ್ಥ ಜ್ಞಾನೇ ಪರಿಸಮಾಪ್ಯತೇ॥', ref:'BG 4.33' },
  'brahmarpana': { dev:'ब्रह्मार्पणं ब्रह्म हविर्ब्रह्माग्नौ ब्रह्मणा हुतम्।\nब्रह्मैव तेन गन्तव्यं ब्रह्मकर्मसमाधिना॥', hi:'ब्रह्मार्पणं ब्रह्म हविर्ब्रह्माग्नौ ब्रह्मणा हुतम्।\nब्रह्मैव तेन गन्तव्यं ब्रह्मकर्मसमाधिना॥', iast:'brahmārpaṇaṃ brahma havir brahmāgnau brahmaṇā hutam |\nbrahmaiva tena gantavyaṃ brahma-karma-samādhinā ||', kn:'ಬ್ರಹ್ಮಾರ್ಪಣಂ ಬ್ರಹ್ಮ ಹವಿರ್ಬ್ರಹ್ಮಾಗ್ನೌ ಬ್ರಹ್ಮಣಾ ಹುತಮ್।\nಬ್ರಹ್ಮೈವ ತೇನ ಗಂತವ್ಯಂ ಬ್ರಹ್ಮಕರ್ಮಸಮಾಧಿನಾ॥', ref:'BG 4.24' },

  'ashvattha': { dev:'ऊर्ध्वमूलमधःशाखमश्वत्थं प्राहुरव्ययम्।\nछन्दांसि यस्य पर्णानि यस्तं वेद स वेदवित्॥', hi:'ऊर्ध्वमूलमधःशाखमश्वत्थं प्राहुरव्ययम्।\nछन्दांसि यस्य पर्णानि यस्तं वेद स वेदवित्॥', iast:'ūrdhva-mūlam adhaḥ-śākham aśvatthaṃ prāhur avyayam |\nchandāṃsi yasya parṇāni yas taṃ veda sa vedavit ||', kn:'ಊರ್ಧ್ವಮೂಲಮಧಃಶಾಖಮಶ್ವತ್ಥಂ ಪ್ರಾಹುರವ್ಯಯಮ್।\nಛಂದಾಂಸಿ ಯಸ್ಯ ಪರ್ಣಾನಿ ಯಸ್ತಂ ವೇದ ಸ ವೇದವಿತ್॥', ref:'BG 15.1' },
  'pranava_om': { dev:'ओमित्येकाक्षरं ब्रह्म व्याहरन्मामनुस्मरन्।\nयः प्रयाति त्यजन्देहं स याति परमां गतिम्॥', hi:'ओमित्येकाक्षरं ब्रह्म व्याहरन्मामनुस्मरन्।\nयः प्रयाति त्यजन्देहं स याति परमां गतिम्॥', iast:'om ity ekākṣaraṃ brahma vyāharan mām anusmaran |\nyaḥ prayāti tyajan dehaṃ sa yāti paramāṃ gatim ||', kn:'ಓಮಿತ್ಯೇಕಾಕ್ಷರಂ ಬ್ರಹ್ಮ ವ್ಯಾಹರನ್ಮಾಮನುಸ್ಮರನ್।\nಯಃ ಪ್ರಯಾತಿ ತ್ಯಜನ್ದೇಹಂ ಸ ಯಾತಿ ಪರಮಾಂ ಗತಿಮ್॥', ref:'BG 8.13' },
  'jyotir_jyoti': { dev:'ज्योतिषामपि तज्ज्योतिस्तमसः परमुच्यते।\nज्ञानं ज्ञेयं ज्ञानगम्यं हृदि सर्वस्य विष्ठितम्॥', hi:'ज्योतिषामपि तज्ज्योतिस्तमसः परमुच्यते।\nज्ञानं ज्ञेयं ज्ञानगम्यं हृदि सर्वस्य विष्ठितम्॥', iast:'jyotiṣām api taj jyotis tamasaḥ param ucyate |\njñānaṃ jñeyaṃ jñāna-gamyaṃ hṛdi sarvasya viṣṭhitam ||', kn:'ಜ್ಯೋತಿಷಾಮಪಿ ತಜ್ಜ್ಯೋತಿಸ್ತಮಸಃ ಪರಮುಚ್ಯತೇ।\nಜ್ಞಾನಂ ಜ್ಞೇಯಂ ಜ್ಞಾನಗಮ್ಯಂ ಹೃದಿ ಸರ್ವಸ್ಯ ವಿಷ್ಠಿತಮ್॥', ref:'BG 13.17' },

  // ===== Added shlokas (mukti-gradations, Madhva schemata, Ch 13/17/18 themes) =====
  'taratamya': { dev:'मत्तः परतरं नान्यत्किञ्चिदस्ति धनञ्जय।\nमयि सर्वमिदं प्रोतं सूत्रे मणिगणा इव॥', hi:'मत्तः परतरं नान्यत्किञ्चिदस्ति धनञ्जय।\nमयि सर्वमिदं प्रोतं सूत्रे मणिगणा इव॥', iast:"mattaḥ parataraṃ nānyat kiñcid asti dhanañjaya |\nmayi sarvam idaṃ protaṃ sūtre maṇi-gaṇā iva ||", kn:'ಮತ್ತಃ ಪರತರಂ ನಾನ್ಯತ್ಕಿಂಚಿದಸ್ತಿ ಧನಂಜಯ।\nಮಯಿ ಸರ್ವಮಿದಂ ಪ್ರೋತಂ ಸೂತ್ರೇ ಮಣಿಗಣಾ ಇವ॥', ref:'BG 7.7' },
  'pancha_bheda': { dev:'ममैवांशो जीवलोके जीवभूतः सनातनः।', hi:'ममैवांशो जीवलोके जीवभूतः सनातनः।', iast:"mamaivāṃśo jīva-loke jīva-bhūtaḥ sanātanaḥ |", kn:'ಮಮೈವಾಂಶೋ ಜೀವಲೋಕೇ ಜೀವಭೂತಃ ಸನಾತನಃ।', ref:'BG 15.7' },
  'jnana_angas': { dev:'अमानित्वमदम्भित्वमहिंसा क्षान्तिरार्जवम्।\nआचार्योपासनं शौचं स्थैर्यमात्मविनिग्रहः॥', hi:'अमानित्वमदम्भित्वमहिंसा क्षान्तिरार्जवम्।\nआचार्योपासनं शौचं स्थैर्यमात्मविनिग्रहः॥', iast:"amānitvam adambhitvam ahiṃsā kṣāntir ārjavam |\nācāryopāsanaṃ śaucaṃ sthairyam ātma-vinigrahaḥ ||", kn:'ಅಮಾನಿತ್ವಮದಂಭಿತ್ವಮಹಿಂಸಾ ಕ್ಷಾಂತಿರಾರ್ಜವಮ್।\nಆಚಾರ್ಯೋಪಾಸನಂ ಶೌಚಂ ಸ್ಥೈರ್ಯಮಾತ್ಮವಿನಿಗ್ರಹಃ॥', ref:'BG 13.7' },
  'amanitva': { dev:'अमानित्वमदम्भित्वमहिंसा क्षान्तिरार्जवम्।', hi:'अमानित्वमदम्भित्वमहिंसा क्षान्तिरार्जवम्।', iast:"amānitvam adambhitvam ahiṃsā kṣāntir ārjavam |", kn:'ಅಮಾನಿತ್ವಮದಂಭಿತ್ವಮಹಿಂಸಾ ಕ್ಷಾಂತಿರಾರ್ಜವಮ್।', ref:'BG 13.7' },
  'ananya_yoga': { dev:'अनन्याश्चिन्तयन्तो मां ये जनाः पर्युपासते।\nतेषां नित्याभियुक्तानां योगक्षेमं वहाम्यहम्॥', hi:'अनन्याश्चिन्तयन्तो मां ये जनाः पर्युपासते।\nतेषां नित्याभियुक्तानां योगक्षेमं वहाम्यहम्॥', iast:"ananyāś cintayanto māṃ ye janāḥ paryupāsate |\nteṣāṃ nityābhiyuktānāṃ yoga-kṣemaṃ vahāmy aham ||", kn:'ಅನನ್ಯಾಶ್ಚಿಂತಯಂತೋ ಮಾಂ ಯೇ ಜನಾಃ ಪರ್ಯುಪಾಸತೇ।\nತೇಷಾಂ ನಿತ್ಯಾಭಿಯುಕ್ತಾನಾಂ ಯೋಗಕ್ಷೇಮಂ ವಹಾಮ್ಯಹಮ್॥', ref:'BG 9.22' },
  'sattvika_shraddha': { dev:'त्रिविधा भवति श्रद्धा देहिनां सा स्वभावजा।\nसात्त्विकी राजसी चैव तामसी चेति तां शृणु॥', hi:'त्रिविधा भवति श्रद्धा देहिनां सा स्वभावजा।\nसात्त्विकी राजसी चैव तामसी चेति तां शृणु॥', iast:"tri-vidhā bhavati śraddhā dehināṃ sā svabhāva-jā |\nsāttvikī rājasī caiva tāmasī ceti tāṃ śṛṇu ||", kn:'ತ್ರಿವಿಧಾ ಭವತಿ ಶ್ರದ್ಧಾ ದೇಹಿನಾಂ ಸಾ ಸ್ವಭಾವಜಾ।\nಸಾತ್ತ್ವಿಕೀ ರಾಜಸೀ ಚೈವ ತಾಮಸೀ ಚೇತಿ ತಾಂ ಶೃಣು॥', ref:'BG 17.2' },
  'sattvika_ahara': { dev:'आयुःसत्त्वबलारोग्यसुखप्रीतिविवर्धनाः।\nरस्याः स्निग्धाः स्थिरा हृद्या आहाराः सात्त्विकप्रियाः॥', hi:'आयुःसत्त्वबलारोग्यसुखप्रीतिविवर्धनाः।\nरस्याः स्निग्धाः स्थिरा हृद्या आहाराः सात्त्विकप्रियाः॥', iast:"āyuḥ-sattva-balārogya-sukha-prīti-vivardhanāḥ |\nrasyāḥ snigdhāḥ sthirā hṛdyā āhārāḥ sāttvika-priyāḥ ||", kn:'ಆಯುಃಸತ್ತ್ವಬಲಾರೋಗ್ಯಸುಖಪ್ರೀತಿವಿವರ್ಧನಾಃ।\nರಸ್ಯಾಃ ಸ್ನಿಗ್ಧಾಃ ಸ್ಥಿರಾ ಹೃದ್ಯಾ ಆಹಾರಾಃ ಸಾತ್ತ್ವಿಕಪ್ರಿಯಾಃ॥', ref:'BG 17.8' },
  'pravritti_nivritti': { dev:'प्रवृत्तिं च निवृत्तिं च कार्याकार्ये भयाभये।\nबन्धं मोक्षं च या वेत्ति बुद्धिः सा पार्थ सात्त्विकी॥', hi:'प्रवृत्तिं च निवृत्तिं च कार्याकार्ये भयाभये।\nबन्धं मोक्षं च या वेत्ति बुद्धिः सा पार्थ सात्त्विकी॥', iast:"pravṛttiṃ ca nivṛttiṃ ca kāryākārye bhayābhaye |\nbandhaṃ mokṣaṃ ca yā vetti buddhiḥ sā pārtha sāttvikī ||", kn:'ಪ್ರವೃತ್ತಿಂ ಚ ನಿವೃತ್ತಿಂ ಚ ಕಾರ್ಯಾಕಾರ್ಯೇ ಭಯಾಭಯೇ।\nಬಂಧಂ ಮೋಕ್ಷಂ ಚ ಯಾ ವೇತ್ತಿ ಬುದ್ಧಿಃ ಸಾ ಪಾರ್ಥ ಸಾತ್ತ್ವಿಕೀ॥', ref:'BG 18.30' },
  'sayujya': { dev:'विद्याविनयसम्पन्ने ब्राह्मणे गवि हस्तिनि।\nशुनि चैव श्वपाके च पण्डिताः समदर्शिनः॥', hi:'विद्याविनयसम्पन्ने ब्राह्मणे गवि हस्तिनि।\nशुनि चैव श्वपाके च पण्डिताः समदर्शिनः॥', iast:"vidyā-vinaya-sampanne brāhmaṇe gavi hastini |\nśuni caiva śva-pāke ca paṇḍitāḥ sama-darśinaḥ ||", kn:'ವಿದ್ಯಾವಿನಯಸಂಪನ್ನೇ ಬ್ರಾಹ್ಮಣೇ ಗವಿ ಹಸ್ತಿನಿ।\nಶುನಿ ಚೈವ ಶ್ವಪಾಕೇ ಚ ಪಂಡಿತಾಃ ಸಮದರ್ಶಿನಃ॥', ref:'BG 5.18' },
  'samipya': { dev:'भक्त्या त्वनन्यया शक्य अहमेवंविधोऽर्जुन।\nज्ञातुं द्रष्टुं च तत्त्वेन प्रवेष्टुं च परन्तप॥', hi:'भक्त्या त्वनन्यया शक्य अहमेवंविधोऽर्जुन।\nज्ञातुं द्रष्टुं च तत्त्वेन प्रवेष्टुं च परन्तप॥', iast:"bhaktyā tv ananyayā śakya aham evaṃ-vidho 'rjuna |\njñātuṃ draṣṭuṃ ca tattvena praveṣṭuṃ ca parantapa ||", kn:'ಭಕ್ತ್ಯಾ ತ್ವನನ್ಯಯಾ ಶಕ್ಯ ಅಹಮೇವಂವಿಧೋಽರ್ಜುನ।\nಜ್ಞಾತುಂ ದ್ರಷ್ಟುಂ ಚ ತತ್ತ್ವೇನ ಪ್ರವೇಷ್ಟುಂ ಚ ಪರಂತಪ॥', ref:'BG 11.54' },
  'salokya': { dev:'ये तु धर्म्यामृतमिदं यथोक्तं पर्युपासते।\nश्रद्दधाना मत्परमा भक्तास्तेऽतीव मे प्रियाः॥', hi:'ये तु धर्म्यामृतमिदं यथोक्तं पर्युपासते।\nश्रद्दधाना मत्परमा भक्तास्तेऽतीव मे प्रियाः॥', iast:"ye tu dharmyāmṛtam idaṃ yathoktaṃ paryupāsate |\nśraddadhānā mat-paramā bhaktās te 'tīva me priyāḥ ||", kn:'ಯೇ ತು ಧರ್ಮ್ಯಾಮೃತಮಿದಂ ಯಥೋಕ್ತಂ ಪರ್ಯುಪಾಸತೇ।\nಶ್ರದ್ದಧಾನಾ ಮತ್ಪರಮಾ ಭಕ್ತಾಸ್ತೇಽತೀವ ಮೇ ಪ್ರಿಯಾಃ॥', ref:'BG 12.20' },
  'sarupya': { dev:'इदं ज्ञानमुपाश्रित्य मम साधर्म्यमागताः।\nसर्गेऽपि नोपजायन्ते प्रलये न व्यथन्ति च॥', hi:'इदं ज्ञानमुपाश्रित्य मम साधर्म्यमागताः।\nसर्गेऽपि नोपजायन्ते प्रलये न व्यथन्ति च॥', iast:"idaṃ jñānam upāśritya mama sādharmyam āgatāḥ |\nsarge 'pi nopajāyante pralaye na vyathanti ca ||", kn:'ಇದಂ ಜ್ಞಾನಮುಪಾಶ್ರಿತ್ಯ ಮಮ ಸಾಧರ್ಮ್ಯಮಾಗತಾಃ।\nಸರ್ಗೇಽಪಿ ನೋಪಜಾಯಂತೇ ಪ್ರಲಯೇ ನ ವ್ಯಥಂತಿ ಚ॥', ref:'BG 14.2' },
  'aksharam_param_brahma': { dev:'अक्षरं ब्रह्म परमं स्वभावोऽध्यात्ममुच्यते।', hi:'अक्षरं ब्रह्म परमं स्वभावोऽध्यात्ममुच्यते।', iast:"akṣaraṃ brahma paramaṃ svabhāvo 'dhyātmam ucyate |", kn:'ಅಕ್ಷರಂ ಬ್ರಹ್ಮ ಪರಮಂ ಸ್ವಭಾವೋಽಧ್ಯಾತ್ಮಮುಚ್ಯತೇ।', ref:'BG 8.3' },
  'karma_tattva': { dev:'न हि कश्चित्क्षणमपि जातु तिष्ठत्यकर्मकृत्।\nकार्यते ह्यवशः कर्म सर्वः प्रकृतिजैर्गुणैः॥', hi:'न हि कश्चित्क्षणमपि जातु तिष्ठत्यकर्मकृत्।\nकार्यते ह्यवशः कर्म सर्वः प्रकृतिजैर्गुणैः॥', iast:"na hi kaścit kṣaṇam api jātu tiṣṭhaty akarma-kṛt |\nkāryate hy avaśaḥ karma sarvaḥ prakṛti-jair guṇaiḥ ||", kn:'ನ ಹಿ ಕಶ್ಚಿತ್ಕ್ಷಣಮಪಿ ಜಾತು ತಿಷ್ಠತ್ಯಕರ್ಮಕೃತ್।\nಕಾರ್ಯತೇ ಹ್ಯವಶಃ ಕರ್ಮ ಸರ್ವಃ ಪ್ರಕೃತಿಜೈರ್ಗುಣೈಃ॥', ref:'BG 3.5' },

  'icchā_dveṣa': { dev:"इच्छा द्वेषः सुखं दुःखं सङ्घातश्चेतना धृतिः।\nएतत्क्षेत्रं समासेन सविकारमुदाहृतम्॥", hi:"इच्छा द्वेषः सुखं दुःखं सङ्घातश्चेतना धृतिः।\nएतत्क्षेत्रं समासेन सविकारमुदाहृतम्॥", iast:"icchā dveṣaḥ sukhaṃ duḥkhaṃ saṅghātaś cetanā dhṛtiḥ |\netat kṣetraṃ samāsena sa-vikāram udāhṛtam ||", kn:"ಇಚ್ಛಾ ದ್ವೇಷಃ ಸುಖಂ ದುಃಖಂ ಸಂಘಾತಶ್ಚೇತನಾ ಧೃತಿಃ।\nಏತತ್ಕ್ಷೇತ್ರಂ ಸಮಾಸೇನ ಸವಿಕಾರಮುದಾಹೃತಮ್॥", ref:"BG 13.6" },

  'kshetra_jnana': { dev:"क्षेत्रज्ञं चापि मां विद्धि सर्वक्षेत्रेषु भारत।\nक्षेत्रक्षेत्रज्ञयोर्ज्ञानं यत्तज्ज्ञानं मतं मम॥", hi:"क्षेत्रज्ञं चापि मां विद्धि सर्वक्षेत्रेषु भारत।\nक्षेत्रक्षेत्रज्ञयोर्ज्ञानं यत्तज्ज्ञानं मतं मम॥", iast:"kṣetrajñaṃ cāpi māṃ viddhi sarva-kṣetreṣu bhārata |\nkṣetra-kṣetrajñayor jñānaṃ yat taj jñānaṃ mataṃ mama ||", kn:"ಕ್ಷೇತ್ರಜ್ಞಂ ಚಾಪಿ ಮಾಂ ವಿದ್ಧಿ ಸರ್ವಕ್ಷೇತ್ರೇಷು ಭಾರತ।\nಕ್ಷೇತ್ರಕ್ಷೇತ್ರಜ್ಞಯೋರ್ಜ್ಞಾನಂ ಯತ್ತಜ್ಜ್ಞಾನಂ ಮತಂ ಮಮ॥", ref:"BG 13.2" },
  'sattvika_jnana': { dev:"सर्वभूतेषु येनैकं भावमव्ययमीक्षते।\nअविभक्तं विभक्तेषु तज्ज्ञानं विद्धि सात्त्विकम्॥", hi:"सर्वभूतेषु येनैकं भावमव्ययमीक्षते।\nअविभक्तं विभक्तेषु तज्ज्ञानं विद्धि सात्त्विकम्॥", iast:"sarva-bhūteṣu yenaikaṃ bhāvam avyayam īkṣate |\navibhaktaṃ vibhakteṣu taj jñānaṃ viddhi sāttvikam ||", kn:"ಸರ್ವಭೂತೇಷು ಯೇನೈಕಂ ಭಾವಮವ್ಯಯಮೀಕ್ಷತೇ।\nಅವಿಭಕ್ತಂ ವಿಭಕ್ತೇಷು ತಜ್ಜ್ಞಾನಂ ವಿದ್ಧಿ ಸಾತ್ತ್ವಿಕಮ್॥", ref:"BG 18.20" },
  'sattvika_karma': { dev:"नियतं सङ्गरहितमरागद्वेषतः कृतम्।\nअफलप्रेप्सुना कर्म यत्तत्सात्त्विकमुच्यते॥", hi:"नियतं सङ्गरहितमरागद्वेषतः कृतम्।\nअफलप्रेप्सुना कर्म यत्तत्सात्त्विकमुच्यते॥", iast:"niyataṃ saṅga-rahitam arāga-dveṣataḥ kṛtam |\naphala-prepsunā karma yat tat sāttvikam ucyate ||", kn:"ನಿಯತಂ ಸಂಗರಹಿತಮರಾಗದ್ವೇಷತಃ ಕೃತಮ್।\nಅಫಲಪ್ರೇಪ್ಸುನಾ ಕರ್ಮ ಯತ್ತತ್ಸಾತ್ತ್ವಿಕಮುಚ್ಯತೇ॥", ref:"BG 18.23" },
  'sattvika_karta': { dev:"मुक्तसङ्गोऽनहंवादी धृत्युत्साहसमन्वितः।\nसिद्ध्यसिद्ध्योर्निर्विकारः कर्ता सात्त्विक उच्यते॥", hi:"मुक्तसङ्गोऽनहंवादी धृत्युत्साहसमन्वितः।\nसिद्ध्यसिद्ध्योर्निर्विकारः कर्ता सात्त्विक उच्यते॥", iast:"mukta-saṅgo 'nahaṃ-vādī dhṛty-utsāha-samanvitaḥ |\nsiddhy-asiddhyor nirvikāraḥ kartā sāttvika ucyate ||", kn:"ಮುಕ್ತಸಂಗೋಽನಹಂವಾದೀ ಧೃತ್ಯುತ್ಸಾಹಸಮನ್ವಿತಃ।\nಸಿದ್ಧ್ಯಸಿದ್ಧ್ಯೋರ್ನಿರ್ವಿಕಾರಃ ಕರ್ತಾ ಸಾತ್ತ್ವಿಕ ಉಚ್ಯತೇ॥", ref:"BG 18.26" },
  'triguna_atita': { dev:"त्रैगुण्यविषया वेदा निस्त्रैगुण्यो भवार्जुन।\nनिर्द्वन्द्वो नित्यसत्त्वस्थो निर्योगक्षेम आत्मवान्॥", hi:"त्रैगुण्यविषया वेदा निस्त्रैगुण्यो भवार्जुन।\nनिर्द्वन्द्वो नित्यसत्त्वस्थो निर्योगक्षेम आत्मवान्॥", iast:"trai-guṇya-viṣayā vedā nistrai-guṇyo bhavārjuna |\nnirdvandvo nitya-sattva-stho niryoga-kṣema ātmavān ||", kn:"ತ್ರೈಗುಣ್ಯವಿಷಯಾ ವೇದಾ ನಿಸ್ತ್ರೈಗುಣ್ಯೋ ಭವಾರ್ಜುನ।\nನಿರ್ದ್ವಂದ್ವೋ ನಿತ್ಯಸತ್ತ್ವಸ್ಥೋ ನಿರ್ಯೋಗಕ್ಷೇಮ ಆತ್ಮವಾನ್॥", ref:"BG 2.45" },
  'rajasa_shraddha': { dev:"यजन्ते सात्त्विका देवान्यक्षरक्षांसि राजसाः।\nप्रेतान्भूतगणांश्चान्ये यजन्ते तामसा जनाः॥", hi:"यजन्ते सात्त्विका देवान्यक्षरक्षांसि राजसाः।\nप्रेतान्भूतगणांश्चान्ये यजन्ते तामसा जनाः॥", iast:"yajante sāttvikā devān yakṣa-rakṣāṃsi rājasāḥ |\npretān bhūta-gaṇāṃś cānye yajante tāmasā janāḥ ||", kn:"ಯಜಂತೇ ಸಾತ್ತ್ವಿಕಾ ದೇವಾನ್ಯಕ್ಷರಕ್ಷಾಂಸಿ ರಾಜಸಾಃ।\nಪ್ರೇತಾನ್ಭೂತಗಣಾಂಶ್ಚಾನ್ಯೇ ಯಜಂತೇ ತಾಮಸಾ ಜನಾಃ॥", ref:"BG 17.4" },
  'tamasa_shraddha': { dev:"यजन्ते सात्त्विका देवान्यक्षरक्षांसि राजसाः।\nप्रेतान्भूतगणांश्चान्ये यजन्ते तामसा जनाः॥", hi:"यजन्ते सात्त्विका देवान्यक्षरक्षांसि राजसाः।\nप्रेतान्भूतगणांश्चान्ये यजन्ते तामसा जनाः॥", iast:"yajante sāttvikā devān yakṣa-rakṣāṃsi rājasāḥ |\npretān bhūta-gaṇāṃś cānye yajante tāmasā janāḥ ||", kn:"ಯಜಂತೇ ಸಾತ್ತ್ವಿಕಾ ದೇವಾನ್ಯಕ್ಷರಕ್ಷಾಂಸಿ ರಾಜಸಾಃ।\nಪ್ರೇತಾನ್ಭೂತಗಣಾಂಶ್ಚಾನ್ಯೇ ಯಜಂತೇ ತಾಮಸಾ ಜನಾಃ॥", ref:"BG 17.4" },
  'sannyasa_yoga': { dev:"सन्न्यासः कर्मयोगश्च निःश्रेयसकरावुभौ।\nतयोस्तु कर्मसन्न्यासात्कर्मयोगो विशिष्यते॥", hi:"सन्न्यासः कर्मयोगश्च निःश्रेयसकरावुभौ।\nतयोस्तु कर्मसन्न्यासात्कर्मयोगो विशिष्यते॥", iast:"sannyāsaḥ karma-yogaś ca niḥśreyasa-karāv ubhau |\ntayos tu karma-sannyāsāt karma-yogo viśiṣyate ||", kn:"ಸನ್ನ್ಯಾಸಃ ಕರ್ಮಯೋಗಶ್ಚ ನಿಃಶ್ರೇಯಸಕರಾವುಭೌ।\nತಯೋಸ್ತು ಕರ್ಮಸನ್ನ್ಯಾಸಾತ್ಕರ್ಮಯೋಗೋ ವಿಶಿಷ್ಯತೇ॥", ref:"BG 5.2" },
  'buddhi_yoga': { dev:"दूरेण ह्यवरं कर्म बुद्धियोगाद्धनञ्जय।\nबुद्धौ शरणमन्विच्छ कृपणाः फलहेतवः॥", hi:"दूरेण ह्यवरं कर्म बुद्धियोगाद्धनञ्जय।\nबुद्धौ शरणमन्विच्छ कृपणाः फलहेतवः॥", iast:"dūreṇa hy avaraṃ karma buddhi-yogād dhanañjaya |\nbuddhau śaraṇam anviccha kṛpaṇāḥ phala-hetavaḥ ||", kn:"ದೂರೇಣ ಹ್ಯವರಂ ಕರ್ಮ ಬುದ್ಧಿಯೋಗಾದ್ಧನಂಜಯ।\nಬುದ್ಧೌ ಶರಣಮನ್ವಿಚ್ಛ ಕೃಪಣಾಃ ಫಲಹೇತವಃ॥", ref:"BG 2.49" },
  'abhyasa_vairagya': { dev:"असंशयं महाबाहो मनो दुर्निग्रहं चलम्।\nअभ्यासेन तु कौन्तेय वैराग्येण च गृह्यते॥", hi:"असंशयं महाबाहो मनो दुर्निग्रहं चलम्।\nअभ्यासेन तु कौन्तेय वैराग्येण च गृह्यते॥", iast:"asaṃśayaṃ mahā-bāho mano dur-nigrahaṃ calam |\nabhyāsena tu kaunteya vairāgyeṇa ca gṛhyate ||", kn:"ಅಸಂಶಯಂ ಮಹಾಬಾಹೋ ಮನೋ ದುರ್ನಿಗ್ರಹಂ ಚಲಮ್।\nಅಭ್ಯಾಸೇನ ತು ಕೌಂತೇಯ ವೈರಾಗ್ಯೇಣ ಚ ಗೃಹ್ಯತೇ॥", ref:"BG 6.35" },
  'shraddha': { dev:"त्रिविधा भवति श्रद्धा देहिनां सा स्वभावजा।\nसात्त्विकी राजसी चैव तामसी चेति तां शृणु॥", hi:"त्रिविधा भवति श्रद्धा देहिनां सा स्वभावजा।\nसात्त्विकी राजसी चैव तामसी चेति तां शृणु॥", iast:"tri-vidhā bhavati śraddhā dehināṃ sā svabhāva-jā |\nsāttvikī rājasī caiva tāmasī ceti tāṃ śṛṇu ||", kn:"ತ್ರಿವಿಧಾ ಭವತಿ ಶ್ರದ್ಧಾ ದೇಹಿನಾಂ ಸಾ ಸ್ವಭಾವಜಾ।\nಸಾತ್ತ್ವಿಕೀ ರಾಜಸೀ ಚೈವ ತಾಮಸೀ ಚೇತಿ ತಾಂ ಶೃಣು॥", ref:"BG 17.2" },
  'vairagya': { dev:"असंशयं महाबाहो मनो दुर्निग्रहं चलम्।\nअभ्यासेन तु कौन्तेय वैराग्येण च गृह्यते॥", hi:"असंशयं महाबाहो मनो दुर्निग्रहं चलम्।\nअभ्यासेन तु कौन्तेय वैराग्येण च गृह्यते॥", iast:"asaṃśayaṃ mahā-bāho mano dur-nigrahaṃ calam |\nabhyāsena tu kaunteya vairāgyeṇa ca gṛhyate ||", kn:"ಅಸಂಶಯಂ ಮಹಾಬಾಹೋ ಮನೋ ದುರ್ನಿಗ್ರಹಂ ಚಲಮ್।\nಅಭ್ಯಾಸೇನ ತು ಕೌಂತೇಯ ವೈರಾಗ್ಯೇಣ ಚ ಗೃಹ್ಯತೇ॥", ref:"BG 6.35" },
  'abhyasa': { dev:"यतो यतो निश्चरति मनश्चञ्चलमस्थिरम्।\nततस्ततो नियम्यैतदात्मन्येव वशं नयेत्॥", hi:"यतो यतो निश्चरति मनश्चञ्चलमस्थिरम्।\nततस्ततो नियम्यैतदात्मन्येव वशं नयेत्॥", iast:"yato yato niścarati manaś cañcalam asthiram |\ntatas tato niyamyaitad ātmany eva vaśaṃ nayet ||", kn:"ಯತೋ ಯತೋ ನಿಶ್ಚರತಿ ಮನಶ್ಚಂಚಲಮಸ್ಥಿರಮ್।\nತತಸ್ತತೋ ನಿಯಮ್ಯೈತದಾತ್ಮನ್ಯೇವ ವಶಂ ನಯೇತ್॥", ref:"BG 6.26" },
  'tapas': { dev:"देवद्विजगुरुप्राज्ञपूजनं शौचमार्जवम्।\nब्रह्मचर्यमहिंसा च शारीरं तप उच्यते॥", hi:"देवद्विजगुरुप्राज्ञपूजनं शौचमार्जवम्।\nब्रह्मचर्यमहिंसा च शारीरं तप उच्यते॥", iast:"deva-dvija-guru-prājña-pūjanaṃ śaucam ārjavam |\nbrahmacaryam ahiṃsā ca śārīraṃ tapa ucyate ||", kn:"ದೇವದ್ವಿಜಗುರುಪ್ರಾಜ್ಞಪೂಜನಂ ಶೌಚಮಾರ್ಜವಮ್।\nಬ್ರಹ್ಮಚರ್ಯಮಹಿಂಸಾ ಚ ಶಾರೀರಂ ತಪ ಉಚ್ಯತೇ॥", ref:"BG 17.14" },
  'dana': { dev:"दातव्यमिति यद्दानं दीयतेऽनुपकारिणे।\nदेशे काले च पात्रे च तद्दानं सात्त्विकं स्मृतम्॥", hi:"दातव्यमिति यद्दानं दीयतेऽनुपकारिणे।\nदेशे काले च पात्रे च तद्दानं सात्त्विकं स्मृतम्॥", iast:"dātavyam iti yad dānaṃ dīyate 'nupakāriṇe |\ndeśe kāle ca pātre ca tad dānaṃ sāttvikaṃ smṛtam ||", kn:"ದಾತವ್ಯಮಿತಿ ಯದ್ದಾನಂ ದೀಯತೇಽನುಪಕಾರಿಣೇ।\nದೇಶೇ ಕಾಲೇ ಚ ಪಾತ್ರೇ ಚ ತದ್ದಾನಂ ಸಾತ್ತ್ವಿಕಂ ಸ್ಮೃತಮ್॥", ref:"BG 17.20" },
  'tyaga': { dev:"काम्यानां कर्मणां न्यासं सन्न्यासं कवयो विदुः।\nसर्वकर्मफलत्यागं प्राहुस्त्यागं विचक्षणाः॥", hi:"काम्यानां कर्मणां न्यासं सन्न्यासं कवयो विदुः।\nसर्वकर्मफलत्यागं प्राहुस्त्यागं विचक्षणाः॥", iast:"kāmyānāṃ karmaṇāṃ nyāsaṃ sannyāsaṃ kavayo viduḥ |\nsarva-karma-phala-tyāgaṃ prāhus tyāgaṃ vicakṣaṇāḥ ||", kn:"ಕಾಮ್ಯಾನಾಂ ಕರ್ಮಣಾಂ ನ್ಯಾಸಂ ಸನ್ನ್ಯಾಸಂ ಕವಯೋ ವಿದುಃ।\nಸರ್ವಕರ್ಮಫಲತ್ಯಾಗಂ ಪ್ರಾಹುಸ್ತ್ಯಾಗಂ ವಿಚಕ್ಷಣಾಃ॥", ref:"BG 18.2" },
  'indriya_nigraha': { dev:"यदा संहरते चायं कूर्मोऽङ्गानीव सर्वशः।\nइन्द्रियाणीन्द्रियार्थेभ्यस्तस्य प्रज्ञा प्रतिष्ठिता॥", hi:"यदा संहरते चायं कूर्मोऽङ्गानीव सर्वशः।\nइन्द्रियाणीन्द्रियार्थेभ्यस्तस्य प्रज्ञा प्रतिष्ठिता॥", iast:"yadā saṃharate cāyaṃ kūrmo 'ṅgānīva sarvaśaḥ |\nindriyāṇīndriyārthebhyas tasya prajñā pratiṣṭhitā ||", kn:"ಯದಾ ಸಂಹರತೇ ಚಾಯಂ ಕೂರ್ಮೋಽಂಗಾನೀವ ಸರ್ವಶಃ।\nಇಂದ್ರಿಯಾಣೀಂದ್ರಿಯಾರ್ಥೇಭ್ಯಸ್ತಸ್ಯ ಪ್ರಜ್ಞಾ ಪ್ರತಿಷ್ಠಿತಾ॥", ref:"BG 2.58" },
  'samadhi': { dev:"श्रुतिविप्रतिपन्ना ते यदा स्थास्यति निश्चला।\nसमाधावचला बुद्धिस्तदा योगमवाप्स्यसि॥", hi:"श्रुतिविप्रतिपन्ना ते यदा स्थास्यति निश्चला।\nसमाधावचला बुद्धिस्तदा योगमवाप्स्यसि॥", iast:"śruti-vipratipannā te yadā sthāsyati niścalā |\nsamādhāv acalā buddhis tadā yogam avāpsyasi ||", kn:"ಶ್ರುತಿವಿಪ್ರತಿಪನ್ನಾ ತೇ ಯದಾ ಸ್ಥಾಸ್ಯತಿ ನಿಶ್ಚಲಾ।\nಸಮಾಧಾವಚಲಾ ಬುದ್ಧಿಸ್ತದಾ ಯೋಗಮವಾಪ್ಸ್ಯಸಿ॥", ref:"BG 2.53" },
  'svadhyaya': { dev:"अनुद्वेगकरं वाक्यं सत्यं प्रियहितं च यत्।\nस्वाध्यायाभ्यसनं चैव वाङ्मयं तप उच्यते॥", hi:"अनुद्वेगकरं वाक्यं सत्यं प्रियहितं च यत्।\nस्वाध्यायाभ्यसनं चैव वाङ्मयं तप उच्यते॥", iast:"anudvega-karaṃ vākyaṃ satyaṃ priya-hitaṃ ca yat |\nsvādhyāyābhyasanaṃ caiva vāṅmayaṃ tapa ucyate ||", kn:"ಅನುದ್ವೇಗಕರಂ ವಾಕ್ಯಂ ಸತ್ಯಂ ಪ್ರಿಯಹಿತಂ ಚ ಯತ್।\nಸ್ವಾಧ್ಯಾಯಾಭ್ಯಸನಂ ಚೈವ ವಾಙ್ಮಯಂ ತಪ ಉಚ್ಯತೇ॥", ref:"BG 17.15" },
  'arjava': { dev:"अमानित्वमदम्भित्वमहिंसा क्षान्तिरार्जवम्।\nआचार्योपासनं शौचं स्थैर्यमात्मविनिग्रहः॥", hi:"अमानित्वमदम्भित्वमहिंसा क्षान्तिरार्जवम्।\nआचार्योपासनं शौचं स्थैर्यमात्मविनिग्रहः॥", iast:"amānitvam adambhitvam ahiṃsā kṣāntir ārjavam |\nācāryopāsanaṃ śaucaṃ sthairyam ātma-vinigrahaḥ ||", kn:"ಅಮಾನಿತ್ವಮದಂಭಿತ್ವಮಹಿಂಸಾ ಕ್ಷಾಂತಿರಾರ್ಜವಮ್।\nಆಚಾರ್ಯೋಪಾಸನಂ ಶೌಚಂ ಸ್ಥೈರ್ಯಮಾತ್ಮವಿನಿಗ್ರಹಃ॥", ref:"BG 13.7" },
  'shauca': { dev:"अमानित्वमदम्भित्वमहिंसा क्षान्तिरार्जवम्।\nआचार्योपासनं शौचं स्थैर्यमात्मविनिग्रहः॥", hi:"अमानित्वमदम्भित्वमहिंसा क्षान्तिरार्जवम्।\nआचार्योपासनं शौचं स्थैर्यमात्मविनिग्रहः॥", iast:"amānitvam adambhitvam ahiṃsā kṣāntir ārjavam |\nācāryopāsanaṃ śaucaṃ sthairyam ātma-vinigrahaḥ ||", kn:"ಅಮಾನಿತ್ವಮದಂಭಿತ್ವಮಹಿಂಸಾ ಕ್ಷಾಂತಿರಾರ್ಜವಮ್।\nಆಚಾರ್ಯೋಪಾಸನಂ ಶೌಚಂ ಸ್ಥೈರ್ಯಮಾತ್ಮವಿನಿಗ್ರಹಃ॥", ref:"BG 13.7" },
  'ksanti': { dev:"अमानित्वमदम्भित्वमहिंसा क्षान्तिरार्जवम्।\nआचार्योपासनं शौचं स्थैर्यमात्मविनिग्रहः॥", hi:"अमानित्वमदम्भित्वमहिंसा क्षान्तिरार्जवम्।\nआचार्योपासनं शौचं स्थैर्यमात्मविनिग्रहः॥", iast:"amānitvam adambhitvam ahiṃsā kṣāntir ārjavam |\nācāryopāsanaṃ śaucaṃ sthairyam ātma-vinigrahaḥ ||", kn:"ಅಮಾನಿತ್ವಮದಂಭಿತ್ವಮಹಿಂಸಾ ಕ್ಷಾಂತಿರಾರ್ಜವಮ್।\nಆಚಾರ್ಯೋಪಾಸನಂ ಶೌಚಂ ಸ್ಥೈರ್ಯಮಾತ್ಮವಿನಿಗ್ರಹಃ॥", ref:"BG 13.7" },
  'vivikta_seva': { dev:"मयि चानन्ययोगेन भक्तिरव्यभिचारिणी।\nविविक्तदेशसेवित्वमरतिर्जनसंसदि॥", hi:"मयि चानन्ययोगेन भक्तिरव्यभिचारिणी।\nविविक्तदेशसेवित्वमरतिर्जनसंसदि॥", iast:"mayi cānanya-yogena bhaktir avyabhicāriṇī |\nvivikta-deśa-sevitvam aratir jana-saṃsadi ||", kn:"ಮಯಿ ಚಾನನ್ಯಯೋಗೇನ ಭಕ್ತಿರವ್ಯಭಿಚಾರಿಣೀ।\nವಿವಿಕ್ತದೇಶಸೇವಿತ್ವಮರತಿರ್ಜನಸಂಸದಿ॥", ref:"BG 13.10" },
  'adhyatma_jnana_nityatvam': { dev:"अध्यात्मज्ञाननित्यत्वं तत्त्वज्ञानार्थदर्शनम्।\nएतज्ज्ञानमिति प्रोक्तमज्ञानं यदतोऽन्यथा॥", hi:"अध्यात्मज्ञाननित्यत्वं तत्त्वज्ञानार्थदर्शनम्।\nएतज्ज्ञानमिति प्रोक्तमज्ञानं यदतोऽन्यथा॥", iast:"adhyātma-jñāna-nityatvaṃ tattva-jñānārtha-darśanam |\netaj jñānam iti proktam ajñānaṃ yad ato 'nyathā ||", kn:"ಅಧ್ಯಾತ್ಮಜ್ಞಾನನಿತ್ಯತ್ವಂ ತತ್ತ್ವಜ್ಞಾನಾರ್ಥದರ್ಶನಮ್।\nಏತಜ್ಜ್ಞಾನಮಿತಿ ಪ್ರೋಕ್ತಮಜ್ಞಾನಂ ಯದತೋಽನ್ಯಥಾ॥", ref:"BG 13.11" },
  'tattva_jnanartha_darshanam': { dev:"अध्यात्मज्ञाननित्यत्वं तत्त्वज्ञानार्थदर्शनम्।\nएतज्ज्ञानमिति प्रोक्तमज्ञानं यदतोऽन्यथा॥", hi:"अध्यात्मज्ञाननित्यत्वं तत्त्वज्ञानार्थदर्शनम्।\nएतज्ज्ञानमिति प्रोक्तमज्ञानं यदतोऽन्यथा॥", iast:"adhyātma-jñāna-nityatvaṃ tattva-jñānārtha-darśanam |\netaj jñānam iti proktam ajñānaṃ yad ato 'nyathā ||", kn:"ಅಧ್ಯಾತ್ಮಜ್ಞಾನನಿತ್ಯತ್ವಂ ತತ್ತ್ವಜ್ಞಾನಾರ್ಥದರ್ಶನಮ್।\nಏತಜ್ಜ್ಞಾನಮಿತಿ ಪ್ರೋಕ್ತಮಜ್ಞಾನಂ ಯದತೋಽನ್ಯಥಾ॥", ref:"BG 13.11" },
  'manas': { dev:"चञ्चलं हि मनः कृष्ण प्रमाथि बलवद् दृढम्।\nतस्याहं निग्रहं मन्ये वायोरिव सुदुष्करम्॥", hi:"चञ्चलं हि मनः कृष्ण प्रमाथि बलवद् दृढम्।\nतस्याहं निग्रहं मन्ये वायोरिव सुदुष्करम्॥", iast:"cañcalaṃ hi manaḥ kṛṣṇa pramāthi balavad dṛḍham |\ntasyāhaṃ nigrahaṃ manye vāyor iva suduṣkaram ||", kn:"ಚಂಚಲಂ ಹಿ ಮನಃ ಕೃಷ್ಣ ಪ್ರಮಾಥಿ ಬಲವದ್ ದೃಢಮ್।\nತಸ್ಯಾಹಂ ನಿಗ್ರಹಂ ಮನ್ಯೇ ವಾಯೋರಿವ ಸುದುಷ್ಕರಮ್॥", ref:"BG 6.34" },
  'buddhi': { dev:"प्रवृत्तिं च निवृत्तिं च कार्याकार्ये भयाभये।\nबन्धं मोक्षं च या वेत्ति बुद्धिः सा पार्थ साात्त्विकी॥", hi:"प्रवृत्तिं च निवृत्तिं च कार्याकार्ये भयाभये।\nबन्धं मोक्षं च या वेत्ति बुद्धिः सा पार्थ साात्त्विकी॥", iast:"pravṛttiṃ ca nivṛttiṃ ca kāryākārye bhayābhaye |\nbandhaṃ mokṣaṃ ca yā vetti buddhiḥ sā pārtha sāttvikī ||", kn:"ಪ್ರವೃತ್ತಿಂ ಚ ನಿವೃತ್ತಿಂ ಚ ಕಾರ್ಯಾಕಾರ್ಯೇ ಭಯಾಭಯೇ।\nಬಂಧಂ ಮೋಕ್ಷಂ ಚ ಯಾ ವೇತ್ತಿ ಬುದ್ಧಿಃ ಸಾ ಪಾರ್ಥ ಸಾತ್ತ್ವಿಕೀ॥", ref:"BG 18.30" },
  'ahankara': { dev:"प्रकृतेः क्रियमाणानि गुणैः कर्माणि सर्वशः।\nअहङ्कारविमूढात्मा कर्ताहमिति मन्यते॥", hi:"प्रकृतेः क्रियमाणानि गुणैः कर्माणि सर्वशः।\nअहङ्कारविमूढात्मा कर्ताहमिति मन्यते॥", iast:"prakṛteḥ kriyamāṇāni guṇaiḥ karmāṇi sarvaśaḥ |\nahaṅkāra-vimūḍhātmā kartāham iti manyate ||", kn:"ಪ್ರಕೃತೇಃ ಕ್ರಿಯಮಾಣಾನಿ ಗುಣೈಃ ಕರ್ಮಾಣಿ ಸರ್ವಶಃ।\nಅಹಂಕಾರವಿಮೂಢಾತ್ಮಾ ಕರ್ತಾಹಮಿತಿ ಮನ್ಯತೇ॥", ref:"BG 3.27" },
  'citta': { dev:"अन्तकाले च मामेव स्मरन्मुक्त्वा कलेवरम्।\nयः प्रयाति स मद्भावं याति नास्त्यत्र संशयः॥", hi:"अन्तकाले च मामेव स्मरन्मुक्त्वा कलेवरम्।\nयः प्रयाति स मद्भावं याति नास्त्यत्र संशयः॥", iast:"anta-kāle ca mām eva smaran muktvā kalevaram |\nyaḥ prayāti sa mad-bhāvaṃ yāti nāsty atra saṃśayaḥ ||", kn:"ಅಂತಕಾಲೇ ಚ ಮಾಮೇವ ಸ್ಮರನ್ಮುಕ್ತ್ವಾ ಕಲೇವರಮ್।\nಯಃ ಪ್ರಯಾತಿ ಸ ಮದ್ಭಾವಂ ಯಾತಿ ನಾಸ್ತ್ಯತ್ರ ಸಂಶಯಃ॥", ref:"BG 8.7" },
  'antaryamin': { dev:"ईश्वरः सर्वभूतानां हृद्देशेऽर्जुन तिष्ठति।\nभ्रामयन्सर्वभूतानि यन्त्रारूढानि मायया॥", hi:"ईश्वरः सर्वभूतानां हृद्देशेऽर्जुन तिष्ठति।\nभ्रामयन्सर्वभूतानि यन्त्रारूढानि मायया॥", iast:"īśvaraḥ sarva-bhūtānāṃ hṛd-deśe ’rjuna tiṣṭhati |\nbhrāmayan sarva-bhūtāni yantrārūḍhāni māyayā ||", kn:"ಈಶ್ವರಃ ಸರ್ವಭೂತಾನಾಂ ಹೃದ್ದೇಶೇಽರ್ಜುನ ತಿಷ್ಠತಿ।\nಭ್ರಾಮಯನ್ಸರ್ವಭೂತಾನಿ ಯಂತ್ರಾರೂಢಾನಿ ಮಾಯಯಾ॥", ref:"BG 18.61" },
  'jnanendriyas_karmendriyas': { dev:"तत्त्ववित्तु महाबाहो गुणकर्मविभागयोः।\nइन्द्रियाणीन्द्रियार्थेषु वर्तन्त इति धारयन्॥", hi:"तत्त्ववित्तु महाबाहो गुणकर्मविभागयोः।\nइन्द्रियाणीन्द्रियार्थेषु वर्तन्त इति धारयन्॥", iast:"tattva-vit tu mahā-bāho guṇa-karma-vibhāgayoḥ |\nindriyāṇīndriyārtheṣu vartanta iti dhārayan ||", kn:"ತತ್ತ್ವವಿತ್ತು ಮಹಾಬಾಹೋ ಗುಣಕರ್ಮವಿಭಾಗಯೋಃ।\nಇಂದ್ರಿಯಾಣೀಂದ್ರಿಯಾರ್ಥೇಷು ವರ್ತಂತ ಇತಿ ಧಾರಯನ್॥", ref:"BG 3.28" },
  'varnashrama': { dev:"चातुर्वर्ण्यं मया सृष्टं गुणकर्मविभागशः।\nतस्य कर्तारमपि मां विद्ध्यकर्तारमव्ययम्॥", hi:"चातुर्वर्ण्यं मया सृष्टं गुणकर्मविभागशः।\nतस्य कर्तारमपि मां विद्ध्यकर्तारमव्ययम्॥", iast:"cātur-varṇyaṃ mayā sṛṣṭaṃ guṇa-karma-vibhāgaśaḥ |\ntasya kartāram api māṃ viddhy akartāram avyayam ||", kn:"ಚಾತುರ್ವರ್ಣ್ಯಂ ಮಯಾ ಸೃಷ್ಟಂ ಗುಣಕರ್ಮವಿಭಾಗಶಃ।\nತಸ್ಯ ಕರ್ತಾರಮಪಿ ಮಾಂ ವಿದ್ಧ್ಯಕರ್ತಾರಮವ್ಯಯಮ್॥", ref:"BG 4.13" },
  'ahimsa': { dev:"अहिंसा समता तुष्टिस्तपो दानं यशोऽयशः।\nभवन्ति भावा भूतानां मत्त एव पृथग्विधाः॥", hi:"अहिंसा समता तुष्टिस्तपो दानं यशोऽयशः।\nभवन्ति भावा भूतानां मत्त एव पृथग्विधाः॥", iast:"ahiṃsā samatā tuṣṭis tapo dānaṃ yaśo ’yaśaḥ |\nbhavanti bhāvā bhūtānāṃ matta eva pṛthag-vidhāḥ ||", kn:"ಅಹಿಂಸಾ ಸಮತಾ ತುಷ್ಟಿಸ್ತಪೋ ದಾನಂ ಯಶೋಽಯಶಃ।\nಭವಂತಿ ಭಾವಾ ಭೂತಾನಾಂ ಮತ್ತ ಏವ ಪೃಥಗ್ವಿಧಾಃ॥", ref:"BG 10.5" },
  'satya': { dev:"बुद्धिर्ज्ञानमसम्मोहः क्षमा सत्यं दमः शमः।\nसुखं दुःखं भवोऽभावो भयं चाभयमेव च॥", hi:"बुद्धिर्ज्ञानमसम्मोहः क्षमा सत्यं दमः शमः।\nसुखं दुःखं भवोऽभावो भयं चाभयमेव च॥", iast:"buddhir jñānam asammohaḥ kṣamā satyaṃ damaḥ śamaḥ |\nsukhaṃ duḥkhaṃ bhavo ’bhāvo bhayaṃ cābhayam eva ca ||", kn:"ಬುದ್ಧಿರ್ಜ್ಞಾನಮಸಮ್ಮೋಹಃ ಕ್ಷಮಾ ಸತ್ಯಂ ದಮಃ ಶಮಃ।\nಸುಖಂ ದುಃಖಂ ಭವೋಽಭಾವೋ ಭಯಂ ಚಾಭಯಮೇವ ಚ॥", ref:"BG 10.4" },
  'samatva_dharma': { dev:"विद्याविनयसम्पन्ने ब्राह्मणे गवि हस्तिनि।\nशुनि चैव श्वपाके च पण्डिताः समदर्शिनः॥", hi:"विद्याविनयसम्पन्ने ब्राह्मणे गवि हस्तिनि।\nशुनि चैव श्वपाके च पण्डिताः समदर्शिनः॥", iast:"vidyā-vinaya-sampanne brāhmaṇe gavi hastini |\nśuni caiva śva-pāke ca paṇḍitāḥ sama-darśinaḥ ||", kn:"ವಿದ್ಯಾವಿನಯಸಂಪನ್ನೇ ಬ್ರಾಹ್ಮಣೇ ಗವಿ ಹಸ್ತಿನಿ।\nಶುನಿ ಚೈವ ಶ್ವಪಾಕೇ ಚ ಪಂಡಿತಾಃ ಸಮದರ್ಶಿನಃ॥", ref:"BG 5.18" },
  'lobha': { dev:"त्रिविधं नरकस्येदं द्वारं नाशनमात्मनः।\nकामः क्रोधस्तथा लोभस्तस्मादेतत्त्रयं त्यजेत्॥", hi:"त्रिविधं नरकस्येदं द्वारं नाशनमात्मनः।\nकामः क्रोधस्तथा लोभस्तस्मादेतत्त्रयं त्यजेत्॥", iast:"tri-vidhaṃ narakasyedaṃ dvāraṃ nāśanam ātmanaḥ |\nkāmaḥ krodhas tathā lobhas tasmād etat trayaṃ tyajet ||", kn:"ತ್ರಿವಿಧಂ ನರಕಸ್ಯೇದಂ ದ್ವಾರಂ ನಾಶನಮಾತ್ಮನಃ।\nಕಾಮಃ ಕ್ರೋಧಸ್ತಥಾ ಲೋಭಸ್ತಸ್ಮಾದೇತತ್ತ್ರಯಂ ತ್ಯಜೇತ್॥", ref:"BG 16.21" },
  'moha': { dev:"कार्पण्यदोषोपहतस्वभावः पृच्छामि त्वां धर्मसम्मूढचेताः।\nयच्छ्रेयः स्यान्निश्चितं ब्रूहि तन्मे शिष्यस्तेऽहं शाधि मां त्वां प्रपन्नम्॥", hi:"कार्पण्यदोषोपहतस्वभावः पृच्छामि त्वां धर्मसम्मूढचेताः।\nयच्छ्रेयः स्यान्निश्चितं ब्रूहि तन्मे शिष्यस्तेऽहं शाधि मां त्वां प्रपन्नम्॥", iast:"kārpaṇya-doṣopahata-svabhāvaḥ pṛcchāmi tvāṃ dharma-sammūḍha-cetāḥ |\nyac-chreyaḥ syān niścitaṃ brūhi tan me śiṣyas te ’haṃ śādhi māṃ tvāṃ prapannam ||", kn:"ಕಾರ್ಪಣ್ಯದೋಷೋಪಹತಸ್ವಭಾವಃ ಪೃಚ್ಛಾಮಿ ತ್ವಾಂ ಧರ್ಮಸಮ್ಮೂಢಚೇತಾಃ।\nಯಚ್ಛ್ರೇಯಃ ಸ್ಯಾನ್ನಿಶ್ಚಿತಂ ಬ್ರೂಹಿ ತನ್ಮೇ ಶಿಷ್ಯಸ್ತೇಽಹಂ ಶಾಧಿ ಮಾಂ ತ್ವಾಂ ಪ್ರಪನ್ನಮ್॥", ref:"BG 2.7" },
  'avidya': { dev:"नादत्ते कस्यचित्पापं न चैव सुकृतं विभुः।\nअज्ञानेनावृतं ज्ञानं तेन मुह्यन्ति जन्तवः॥", hi:"नादत्ते कस्यचित्पापं न चैव सुकृतं विभुः।\nअज्ञानेनावृतं ज्ञानं तेन मुह्यन्ति जन्तवः॥", iast:"nādatte kasyacit pāpaṃ na caiva sukṛtaṃ vibhuḥ |\najñānenāvṛtaṃ jñānaṃ tena muhyanti jantavaḥ ||", kn:"ನಾದತ್ತೇ ಕಸ್ಯಚಿತ್ಪಾಪಂ ನ ಚೈವ ಸುಕೃತಂ ವಿಭುಃ।\nಅಜ್ಞಾನೇನಾವೃತಂ ಜ್ಞಾನಂ ತೇನ ಮುಹ್ಯಂತಿ ಜಂತವಃ॥", ref:"BG 5.15" },
  'dvandva': { dev:"त्रैगुण्यविषया वेदा निस्त्रैगुण्यो भवार्जुन।\nनिर्द्वन्द्वो नित्यसत्त्वस्थो निर्योगक्षेम आत्मवान्॥", hi:"त्रैगुण्यविषया वेदा निस्त्रैगुण्यो भवार्जुन।\nनिर्द्वन्द्वो नित्यसत्त्वस्थो निर्योगक्षेम आत्मवान्॥", iast:"trai-guṇya-viṣayā vedā nis-trai-guṇyo bhavārjuna |\nnir-dvandvo nitya-sattva-stho niryoga-kṣema ātmavān ||", kn:"ತ್ರೈಗುಣ್ಯವಿಷಯಾ ವೇದಾ ನಿಸ್ತ್ರೈಗುಣ್ಯೋ ಭವಾರ್ಜುನ।\nನಿರ್ದ್ವಂದ್ವೋ ನಿತ್ಯಸತ್ತ್ವಸ್ಥೋ ನಿರ್ಯೋಗಕ್ಷೇಮ ಆತ್ಮವಾನ್॥", ref:"BG 2.45" },
  'jivanmukti': { dev:"इहैव तैर्जितः सर्गो येषां साम्ये स्थितं मनः।\nनिर्दोषं हि समं ब्रह्म तस्माद्ब्रह्मणि ते स्थिताः॥", hi:"इहैव तैर्जितः सर्गो येषां साम्ये स्थितं मनः।\nनिर्दोषं हि समं ब्रह्म तस्माद्ब्रह्मणि ते स्थिताः॥", iast:"ihaiva tair jitaḥ sargo yeṣāṃ sāmye sthitaṃ manaḥ |\nnirdoṣaṃ hi samaṃ brahma tasmād brahmaṇi te sthitāḥ ||", kn:"ಇಹೈವ ತೈರ್ಜಿತಃ ಸರ್ಗೋ ಯೇಷಾಂ ಸಾಮ್ಯೇ ಸ್ಥಿತಂ ಮನಃ।\nನಿರ್ದೋಷಂ ಹಿ ಸಮಂ ಬ್ರಹ್ಮ ತಸ್ಮಾದ್ಬ್ರಹ್ಮಣಿ ತೇ ಸ್ಥಿತಾಃ॥", ref:"BG 5.19" },
  'naishkarmya_siddhi': { dev:"असक्तबुद्धिः सर्वत्र जितात्मा विगतस्पृहः।\nनैष्कर्म्यसिद्धिं परमां सन्न्यासेनाधिगच्छति॥", hi:"असक्तबुद्धिः सर्वत्र जितात्मा विगतस्पृहः।\nनैष्कर्म्यसिद्धिं परमां सन्न्यासेनाधिगच्छति॥", iast:"asakta-buddhiḥ sarvatra jitātmā vigata-spṛhaḥ |\nnaiṣkarmya-siddhiṃ paramāṃ sannyāsenādhigacchati ||", kn:"ಅಸಕ್ತಬುದ್ಧಿಃ ಸರ್ವತ್ರ ಜಿತಾತ್ಮಾ ವಿಗತಸ್ಪೃಹಃ।\nನೈಷ್ಕರ್ಮ್ಯಸಿದ್ಧಿಂ ಪರಮಾಂ ಸನ್ನ್ಯಾಸೇನಾಧಿಗಚ್ಛತಿ॥", ref:"BG 18.49" },
  'archiradi_marga': { dev:"अग्निर्ज्योतिरहः शुक्लः षण्मासा उत्तरायणम्।\nतत्र प्रयाता गच्छन्ति ब्रह्म ब्रह्मविदो जनाः॥", hi:"अग्निर्ज्योतिरहः शुक्लः षण्मासा उत्तरायणम्।\nतत्र प्रयाता गच्छन्ति ब्रह्म ब्रह्मविदो जनाः॥", iast:"agnir jyotir ahaḥ śuklaḥ ṣaṇ-māsā uttarāyaṇam |\ntatra prayātā gacchanti brahma brahma-vido janāḥ ||", kn:"ಅಗ್ನಿರ್ಜ್ಯೋತಿರಹಃ ಶುಕ್ಲಃ ಷಣ್ಮಾಸಾ ಉತ್ತರಾಯಣಮ್।\nತತ್ರ ಪ್ರಯಾತಾ ಗಚ್ಛಂತಿ ಬ್ರಹ್ಮ ಬ್ರಹ್ಮವಿದೋ ಜನಾಃ॥", ref:"BG 8.24" },
  'dhumadi_marga': { dev:"धूमो रात्रिस्तथा कृष्णः षण्मासा दक्षिणायनम्।\nतत्र चान्द्रमसं ज्योतिर्योगी प्राप्य निवर्तते॥", hi:"धूमो रात्रिस्तथा कृष्णः षण्मासा दक्षिणायनम्।\nतत्र चान्द्रमसं ज्योतिर्योगी प्राप्य निवर्तते॥", iast:"dhūmo rātris tathā kṛṣṇaḥ ṣaṇ-māsā dakṣiṇāyanam |\ntatra cāndramasaṃ jyotir yogī prāpya nivartate ||", kn:"ಧೂಮೋ ರಾತ್ರಿಸ್ತಥಾ ಕೃಷ್ಣಃ ಷಣ್ಮಾಸಾ ದಕ್ಷಿಣಾಯನಮ್।\nತತ್ರ ಚಾಂದ್ರಮಸಂ ಜ್ಯೋತಿರ್ಯೋಗೀ ಪ್ರಾಪ್ಯ ನಿವರ್ತತೇ॥", ref:"BG 8.25" },
  'sarva_dharman_parityajya': { dev:"सर्वधर्मान्परित्यज्य मामेकं शरणं व्रज।\nअहं त्वा सर्वपापेभ्यो मोक्षयिष्यामि मा शुचः॥", hi:"सर्वधर्मान्परित्यज्य मामेकं शरणं व्रज।\nअहं त्वा सर्वपापेभ्यो मोक्षयिष्यामि मा शुचः॥", iast:"sarva-dharmān parityajya mām ekaṃ śaraṇaṃ vraja |\nahaṃ tvā sarva-pāpebhyo mokṣayiṣyāmi mā śucaḥ ||", kn:"ಸರ್ವಧರ್ಮಾನ್ಪರಿತ್ಯಜ್ಯ ಮಾಮೇಕಂ ಶರಣಂ ವ್ರಜ।\nಅಹಂ ತ್ವಾ ಸರ್ವಪಾಪೇಭ್ಯೋ ಮೋಕ್ಷಯಿಷ್ಯಾಮಿ ಮಾ ಶುಚಃ॥", ref:"BG 18.66" },

  'predicates-on':   { en:'PREDICATES-ON',   dev:'विषयीकरोति',    kn:'ವಿಷಯೀಕರಿಸುತ್ತದೆ', hi:'के बारे में' },
  'transforms-into': { en:'TRANSFORMS-INTO', dev:'परिणमते',       kn:'ಪರಿಣಮಿಸುತ್ತದೆ', hi:'में बदलता है' },
  'grounded-in':     { en:'GROUNDED-IN',     dev:'प्रतिष्ठितम्',  kn:'ಪ್ರತಿಷ್ಠಿತ', hi:'पर आधारित' },
  // search + nav chrome
  searchPlaceholder: { en:'Search concepts, tiers, verses…', dev:'सम्मतान्, स्तरान्, श्लोकान् अन्विष्यतु…', kn:'ಪರಿಕಲ್ಪನೆ, ಸ್ತರ, ಶ್ಲೋಕಗಳನ್ನು ಹುಡುಕಿ…', hi:'अवधारणा, स्तर, श्लोक खोजें…' },
  navBrowse:         { en:'Browse',           dev:'सूची',           kn:'ಸೂಚಿ', hi:'सूची' },
  navFocus:          { en:'Focus',            dev:'विवरणम्',        kn:'ವಿವರಣೆ', hi:'विवरण' },
  navMap:            { en:'Map',              dev:'मानचित्रम्',     kn:'ನಕ್ಷೆ', hi:'नक्शा' },
  // Masthead — uses innerHTML so EN can keep the italic Gītā.
  brandName:         { en:'Bhagavad <em>Gītā</em> · Concept KG', dev:'भगवद्गीता · संकल्पना-कोशः', kn:'ಭಗವದ್ಗೀತಾ · ಸಂಕಲ್ಪನಾ-ಕೋಶ', hi:'भगवद् <em>गीता</em> · अवधारणा कोश' },
  brandCrumb:        { en:'Madhva',           dev:'माध्व',          kn:'ಮಾಧ್ವ', hi:'माध्व' },
};
function UI(key){
  const row = UI_STRINGS[key];
  if (!row) return key;
  return row[state.lang] || row.en;
}

function setLang(lang){
  state.lang = lang;
  document.body.classList.remove('lang-en','lang-dev','lang-kn','lang-hi');
  document.body.classList.add('lang-'+lang);
  document.querySelectorAll('#lang-tabs button').forEach(b=>{
    b.classList.toggle('on', b.dataset.lang===lang);
  });
  // Refresh static chrome strings whose markup is outside the rendered views.
  const qEl = document.getElementById('q');
  if (qEl) qEl.placeholder = UI('searchPlaceholder');
  document.querySelectorAll('#view-tabs button[data-view]').forEach(b=>{
    const k = b.dataset.view==='browse' ? 'navBrowse'
            : b.dataset.view==='focus'  ? 'navFocus'
            : b.dataset.view==='map'    ? 'navMap' : null;
    if (k) b.textContent = UI(k);
  });
  // Masthead brand strings
  const brandNameEl = document.querySelector('header .brand .name');
  if (brandNameEl) brandNameEl.innerHTML = UI('brandName');
  const brandCrumbEl = document.querySelector('header .brand .crumb');
  if (brandCrumbEl) brandCrumbEl.textContent = UI('brandCrumb');
  render();
}

function setView(v, id){
  state.view = v;
  if (id) state.focusId = id;
  document.querySelectorAll('#view-tabs button').forEach(b=>{
    b.classList.toggle('on', b.dataset.view===v);
  });
  document.getElementById('view-browse').hidden = v!=='browse';
  document.getElementById('view-focus').hidden  = v!=='focus';
  document.getElementById('view-map').hidden    = v!=='map';
  document.getElementById('search-bar').hidden  = v==='map';
  window.scrollTo({top:0, behavior:'instant'});
  render();
}

function labelOf(n){
  return state.lang==='hi' ? (n.hi || n.dev) : state.lang==='dev' ? n.dev : state.lang==='kn' ? n.kn : n.en;
}

/* getActive: read a field that may be either a flat string (English-only) OR a
   tri-script object {en, dev, kn}. Returns the active-language string when
   available; falls back to English when a script is missing. */
function getActive(field){
  if (field == null) return '';
  if (typeof field === 'string') return field;
  if (typeof field === 'object'){
    return field[state.lang] || field.en || field.dev || field.kn || '';
  }
  return String(field);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function highlight(s, q){
  if (!q) return escapeHtml(s);
  const idx = s.toLowerCase().indexOf(q.toLowerCase());
  if (idx<0) return escapeHtml(s);
  return escapeHtml(s.slice(0,idx)) + '<span class="hl">'+escapeHtml(s.slice(idx,idx+q.length))+'</span>' + escapeHtml(s.slice(idx+q.length));
}

const NODE_BY_ID = Object.fromEntries(NODES.map(n=>[n.id,n]));
const TIER_BY_ID = Object.fromEntries(TIERS.map(t=>[t.id,t]));
const ADJ = {};
NODES.forEach(n => ADJ[n.id] = { out:[], in:[] });
EDGES.forEach(e=>{
  if (!ADJ[e.source] || !ADJ[e.target]) return;
  ADJ[e.source].out.push(e);
  ADJ[e.target].in.push(e);
});

/* ---------- BROWSE ---------- */
function renderBrowse(){
  const root = document.getElementById('view-browse');
  const q = state.q.trim().toLowerCase();
  let html = '';

  const flat = (v) => {
    if (v == null) return '';
    if (typeof v === 'string') return v;
    if (typeof v === 'object') return [v.en, v.dev, v.kn].filter(Boolean).join(' ');
    return String(v);
  };
  const matches = (n) => {
    if (!q) return true;
    const hay = [n.en, n.dev, n.kn, flat(n.title), flat(n.note), n.refs, n.tier].join(' ').toLowerCase();
    return hay.includes(q);
  };

  let total = 0;
  TIERS.forEach(tier=>{
    const nodes = NODES.filter(n => n.tier===tier.id && matches(n));
    if (!nodes.length) return;
    total += nodes.length;
    html += `<section class="tier-section">
      <div class="tier-head">
        <span class="tier-dot" style="background:var(--t-${tier.id})"></span>
        <span class="tier-name">${escapeHtml(state.lang==='hi'?(tier.hi||tier.dev):state.lang==='dev'?tier.dev:state.lang==='kn'?tier.kn:tier.en)}</span>
        <span class="tier-gloss">${escapeHtml(tier.gloss)}</span>
        <span class="tier-count">${nodes.length}</span>
      </div>
    </section>
    <ul class="entry-list">`;
    nodes.forEach(n=>{
      const lab = labelOf(n);
      html += `<li data-id="${n.id}">
        <div>
          <div class="label">${highlight(lab,q)}</div>
          <div class="sub">${escapeHtml(getActive(n.title))}</div>
        </div>
        <div class="ref">${escapeHtml(n.refs)}</div>
      </li>`;
    });
    html += `</ul>`;
  });

  if (!total){
    html = `<div style="padding:40px 20px;text-align:center;color:var(--ink-fade)">${escapeHtml(UI('noMatch'))} "${escapeHtml(state.q)}".</div>`;
  }
  root.innerHTML = html;
}

/* ---------- FOCUS ---------- */
function renderFocus(){
  const root = document.getElementById('view-focus');
  const id = state.focusId || NODES[0].id;
  const n = NODE_BY_ID[id];
  if (!n){ root.innerHTML = `<div style="padding:20px">${escapeHtml(UI('conceptNotFound'))}</div>`; return; }
  const tier = TIER_BY_ID[n.tier];

  const s = SHLOKAS[n.id];
  const shlokaText = s ? (state.lang==='hi' ? (s.hi||s.dev) : state.lang==='dev' ? s.dev : state.lang==='kn' ? s.kn : s.iast) : '';
  const shlokaInline = s ? `<div class="focus-shloka">
      <div class="shloka-script">${escapeHtml(shlokaText)}</div>
      <div class="shloka-ref">— ${escapeHtml(s.ref)}</div>
    </div>` : '';

  let html = `<article class="focus-card">
    <span class="tier-badge" style="--tc:var(--t-${tier.id})">
      <style>.focus-card .tier-badge::before{background:var(--t-${tier.id})}</style>
      ${escapeHtml(state.lang==='hi'?(tier.hi||tier.dev):state.lang==='dev'?tier.dev:state.lang==='kn'?tier.kn:tier.en)}
    </span>
    <h1>${escapeHtml(labelOf(n))}</h1>
    <div class="subtitle">${escapeHtml(getActive(n.title))}</div>
    <p class="note">${escapeHtml(getActive(n.note))}</p>
    ${n.madhva ? `<div class="madhva"><span class="madhva-prefix">${escapeHtml(UI('madhva'))} · </span>${escapeHtml(getActive(n.madhva))}</div>` : ''}
    ${shlokaInline}
    <div class="refs">${escapeHtml(n.refs)}</div>
  </article>`;

  // relations
  const out = ADJ[n.id]?.out || [];
  const inc = ADJ[n.id]?.in || [];
  if (out.length || inc.length){
    html += `<section class="relations">`;
    if (out.length){
      html += `<h2>${escapeHtml(UI('outgoing'))}</h2><ul>`;
      out.forEach(e=>{
        const other = NODE_BY_ID[e.target];
        if (!other) return;
        const colorVar = `--e-${e.type}`;
        html += `<li data-id="${other.id}">
          <span class="edge-type" style="background:var(${colorVar})">${escapeHtml(UI(e.type))}</span>
          <span class="edge-label">${escapeHtml(getActive(e.label))}</span>
          <span class="other">${escapeHtml(labelOf(other))} →</span>
        </li>`;
      });
      html += `</ul>`;
    }
    if (inc.length){
      html += `<h2>${escapeHtml(UI('incoming'))}</h2><ul>`;
      inc.forEach(e=>{
        const other = NODE_BY_ID[e.source];
        if (!other) return;
        const colorVar = `--e-${e.type}`;
        html += `<li data-id="${other.id}">
          <span class="edge-type" style="background:var(${colorVar})">${escapeHtml(UI(e.type))}</span>
          <span class="edge-label">${escapeHtml(getActive(e.label))}</span>
          <span class="other">← ${escapeHtml(labelOf(other))}</span>
        </li>`;
      });
      html += `</ul>`;
    }
    html += `</section>`;
  }

  root.innerHTML = html;
}

/* ---------- MAP — uses hand-laid KG_POSITIONS if positions.js loaded,
                  falls back to auto-layout otherwise ---------- */
const HAS_HANDLAID = (typeof KG_POSITIONS !== 'undefined') && (typeof KG_TIER_BANDS !== 'undefined');

function renderMap(){
  const root = document.getElementById('view-map');

  if (HAS_HANDLAID) return renderMapHandLaid(root);
  return renderMapAuto(root);
}

function renderMapHandLaid(root){
  const W = 1000, H = 1500;
  const showSet = (typeof KG_SHOW_EDGE_TYPES !== 'undefined') ? KG_SHOW_EDGE_TYPES : null;
  const fontFam = state.lang==='hi'?'Tiro Devanagari Hindi':state.lang==='dev'?'Tiro Devanagari Sanskrit':state.lang==='kn'?'Tiro Kannada':'Cormorant Garamond';
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;

  // tier bands (alternating washes, plus optional side-column for yajna)
  KG_TIER_BANDS.forEach((band,bi)=>{
    const x = band.side ? 900 : (band.half==='right' ? W/2 : 0);
    const w = band.side ? 100 : (band.half ? W/2 : W);
    svg += `<rect x="${x}" y="${band.yTop}" width="${w}" height="${band.yBottom-band.yTop}" fill="${bi%2 ? 'rgba(214,197,153,.10)' : 'rgba(230,216,176,.18)'}"/>`;
    const tier = TIER_BY_ID[band.tier];
    if (!tier) return;
    const lab = state.lang==='hi'?(tier.hi||tier.dev):state.lang==='dev'?tier.dev:state.lang==='kn'?tier.kn:tier.en;
    svg += `<text x="${band.label.x}" y="${band.label.y}" font-family="${fontFam}" font-size="13" fill="var(--ink-soft)" font-weight="600">${escapeHtml(lab)}</text>`;
  });

  // edges (filtered + curved)
  EDGES.forEach(e=>{
    if (showSet && !showSet.has(e.type)) return;
    const a = KG_POSITIONS[e.source]; const b = KG_POSITIONS[e.target];
    if (!a || !b) return;
    const [ax,ay] = a, [bx,by] = b;
    const mx = (ax+bx)/2;
    const my = (ay+by)/2 - Math.abs(by-ay)*0.08;
    svg += `<path class="map-edge" d="M ${ax} ${ay} Q ${mx} ${my} ${bx} ${by}" stroke="var(--e-${e.type})" stroke-width="0.7"/>`;
  });

  // nodes
  NODES.forEach(n=>{
    const p = KG_POSITIONS[n.id]; if (!p) return;
    const [x,y,r] = p;
    const lab = labelOf(n);
    const maxLen = state.lang==='en' ? 16 : 12;
    const shown = lab.length > maxLen ? lab.slice(0,maxLen-1)+'…' : lab;
    svg += `<g class="map-node" data-id="${n.id}">
      <circle cx="${x}" cy="${y}" r="${r}" fill="var(--t-${n.tier})" fill-opacity="0.88" stroke="var(--t-${n.tier})" stroke-width="1.2"/>
      <text x="${x}" y="${y + r + 11}" font-family="${fontFam}" font-size="${state.lang==='en'?10:11}">${escapeHtml(shown)}</text>
    </g>`;
  });

  svg += `</svg>`;
  root.innerHTML = `<div class="map-wrap">${svg}</div>`;
}

function renderMapAuto(root){
  // Fallback: stacked rows by tier order
  const W = 820, leftPad = 100, rightPad = 30;
  const tierGap = 84;
  const H = TIERS.length * tierGap + 80;
  const byTier = Object.fromEntries(TIERS.map(t=>[t.id,[]]));
  NODES.forEach(n => { if (byTier[n.tier]) byTier[n.tier].push(n); });
  const pos = {};
  TIERS.forEach((tier, ti)=>{
    const arr = byTier[tier.id];
    const usable = W - leftPad - rightPad;
    arr.forEach((n,i)=>{
      const x = leftPad + (arr.length===1 ? usable/2 : (i/(arr.length-1))*usable);
      const y = 40 + ti*tierGap + 22;
      pos[n.id] = { x, y, r:9 };
    });
  });
  const fontFam = state.lang==='hi'?'Tiro Devanagari Hindi':state.lang==='dev'?'Tiro Devanagari Sanskrit':state.lang==='kn'?'Tiro Kannada':'Cormorant Garamond';
  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  TIERS.forEach((tier,ti)=>{
    const y = 40 + ti*tierGap;
    svg += `<rect x="0" y="${y-22}" width="${W}" height="${tierGap}" fill="${ti%2 ? 'rgba(214,197,153,.10)' : 'rgba(230,216,176,.18)'}"/>`;
    const lab = state.lang==='hi'?(tier.hi||tier.dev):state.lang==='dev'?tier.dev:state.lang==='kn'?tier.kn:tier.en;
    svg += `<text x="10" y="${y+4}" font-family="${fontFam}" font-size="12" fill="var(--ink-soft)" font-weight="600">${escapeHtml(lab)}</text>`;
  });
  EDGES.forEach(e=>{
    const a = pos[e.source]; const b = pos[e.target];
    if (!a || !b) return;
    const mx = (a.x+b.x)/2;
    const my = (a.y+b.y)/2 - Math.abs(b.y-a.y)*0.08;
    svg += `<path class="map-edge" d="M ${a.x} ${a.y} Q ${mx} ${my} ${b.x} ${b.y}" stroke="var(--e-${e.type})" stroke-width="0.7"/>`;
  });
  NODES.forEach(n=>{
    const p = pos[n.id]; if (!p) return;
    const lab = labelOf(n);
    const maxLen = state.lang==='en' ? 14 : 10;
    const shown = lab.length > maxLen ? lab.slice(0,maxLen-1)+'…' : lab;
    svg += `<g class="map-node" data-id="${n.id}">
      <circle cx="${p.x}" cy="${p.y}" r="${p.r}" fill="var(--t-${n.tier})" fill-opacity="0.88" stroke="var(--t-${n.tier})" stroke-width="1.2"/>
      <text x="${p.x}" y="${p.y + p.r + 11}" font-family="${fontFam}" font-size="${state.lang==='en'?10:11}">${escapeHtml(shown)}</text>
    </g>`;
  });
  svg += `</svg>`;
  root.innerHTML = `<div class="map-wrap">${svg}</div>`;
}

/* ---------- DISPATCH ---------- */
function render(){
  if (state.view==='browse') renderBrowse();
  else if (state.view==='focus') renderFocus();
  else if (state.view==='map') renderMap();
  const f = document.getElementById('stats');
  if (f) f.textContent = `${NODES.length} ${UI('concepts')} · ${EDGES.length} ${UI('relations')} · ${Object.keys(SHLOKAS).length} ${UI('shlokas')} · ${TIERS.length} ${UI('tiers')}`;
}

/* ---------- WIRING ---------- */
document.getElementById('lang-tabs').addEventListener('click', (ev)=>{
  const b = ev.target.closest('button[data-lang]');
  if (!b) return;
  setLang(b.dataset.lang);
});

document.getElementById('view-tabs').addEventListener('click', (ev)=>{
  const b = ev.target.closest('button[data-view]');
  if (!b) return;
  setView(b.dataset.view);
});

document.getElementById('q').addEventListener('input', (ev)=>{
  state.q = ev.target.value;
  if (state.view!=='browse') setView('browse');
  else render();
});

/* Delegated clicks: Browse list items, Focus relation items, and Map node circles
   all use data-id and route to the Focus view. */
document.addEventListener('click', (ev)=>{
  const li = ev.target.closest('li[data-id]');
  if (li){ setView('focus', li.dataset.id); return; }
  const g = ev.target.closest('g.map-node[data-id]');
  if (g){ setView('focus', g.dataset.id); return; }
});

/* Initial render */
render();
</script>
</body>
</html>
